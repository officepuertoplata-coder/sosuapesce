<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Händler Admin – Converdino</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--wa:#25D366;--g2:#1b4332;--g3:#40916c;--gold:#f4a100;--red:#dc2626;--bg:#f0f2f0;--card:#fff;--border:#e5e7eb;--mu:#6b7280;--txt:#1a1a1a;--r:10px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}
nav{background:var(--g2);color:#fff;display:flex;align-items:center;gap:4px;padding:0 16px;height:52px;position:sticky;top:0;z-index:100;}
.nav-brand{font-weight:900;font-size:.95rem;margin-right:10px;display:flex;align-items:center;gap:6px;}
.nav-slug{background:var(--gold);color:#000;font-size:.6rem;font-weight:800;padding:2px 6px;border-radius:4px;}
.tbtn{background:none;border:none;color:rgba(255,255,255,.75);cursor:pointer;padding:5px 10px;border-radius:6px;font-size:.8rem;font-weight:700;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;}
.tbtn:hover,.tbtn.active{background:rgba(255,255,255,.15);color:#fff;}
.tbtn-out{color:var(--gold)!important;margin-left:auto;}
.main{max-width:1100px;margin:0 auto;padding:20px;}
.page{display:none;}.page.active{display:block;}
.sec-hd{background:var(--g2);color:#fff;border-radius:var(--r) var(--r) 0 0;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;}
.sec-hd h2{font-size:.9rem;font-weight:700;}
.sec-body{background:var(--card);border-radius:0 0 var(--r) var(--r);box-shadow:0 1px 4px rgba(0,0,0,.08);}
.box{background:var(--card);border-radius:var(--r);box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;}
th{padding:9px 14px;text-align:left;font-size:.68rem;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);}
td{padding:10px 14px;font-size:.84rem;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f9fafb;}
.msg{text-align:center;color:var(--mu);padding:28px;font-size:.85rem;}
.badge{display:inline-block;padding:3px 8px;border-radius:10px;font-size:.68rem;font-weight:700;}
.b-on{background:#dcfce7;color:#15803d;}.b-off{background:#fef9c3;color:#a16207;}
.codetag{background:#f3f4f6;border-radius:4px;padding:2px 6px;font-family:monospace;font-size:.76rem;color:var(--g2);}
.btn{border:none;padding:6px 12px;border-radius:7px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;}
.btn-g{background:var(--g3);color:#fff;}.btn-g:hover{background:var(--g2);}
.btn-gold{background:var(--gold);color:#000;}
.btn-out{background:#f3f4f6;color:var(--txt);border:1px solid var(--border);}
.btn-red{background:transparent;color:var(--red);border:1px solid var(--red);}.btn-red:hover{background:var(--red);color:#fff;}
.btn-sm{padding:4px 9px;font-size:.73rem;}
.fgrp{margin-bottom:12px;}
.fgrp label{display:block;font-size:.68rem;font-weight:800;color:var(--mu);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px;}
.fgrp input,.fgrp select,.fgrp textarea{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:7px;font-size:.88rem;outline:none;font-family:'Nunito',sans-serif;}
.fgrp input:focus,.fgrp select:focus{border-color:var(--g3);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;padding:14px;}
.pc{border:1.5px solid var(--border);border-radius:10px;overflow:hidden;}
.pc img{width:100%;height:130px;object-fit:cover;}
.pc-ph{height:80px;background:#f0fdf4;display:flex;align-items:center;justify-content:center;font-size:2rem;}
.pc-b{padding:11px;}
.pc-name{font-weight:800;font-size:.88rem;color:var(--g2);margin-bottom:3px;}
.pc-price{font-size:.95rem;font-weight:900;color:var(--gold);margin-bottom:6px;}
.tag{font-size:.65rem;font-weight:800;padding:2px 7px;border-radius:10px;display:inline-block;margin-bottom:6px;}
.tag-buy{background:#dcfce7;color:#15803d;}.tag-ask{background:#fef9c3;color:#a16207;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:14px;padding:26px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:.95rem;font-weight:900;color:var(--g2);margin-bottom:18px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--g2);color:#fff;padding:10px 20px;border-radius:40px;font-size:.85rem;box-shadow:0 4px 16px rgba(0,0,0,.25);transition:transform .25s;z-index:999;}
.toast.show{transform:translateX(-50%) translateY(0);}
.err{color:var(--red);font-size:.78rem;margin-top:4px;}
.loading{text-align:center;padding:30px;color:var(--mu);font-size:.85rem;}
@media(max-width:640px){.grid2{grid-template-columns:1fr;}.prod-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">🏪 <span id="navName">Admin</span> <span class="nav-slug" id="navSlug"></span></div>
  <button class="tbtn active" onclick="showPage('dashboard',this)">📊 Dashboard</button>
  <button class="tbtn" onclick="showPage('products',this)">📦 Produkte</button>
  <button class="tbtn" onclick="showPage('partners',this)">🤝 Partner</button>
  <a href="hub.html" class="tbtn">← Hub</a>
  <button class="tbtn tbtn-out" onclick="doLogout()">Ausloggen</button>
</nav>

<div class="main">

  <!-- DASHBOARD -->
  <div class="page active" id="page-dashboard">
    <h1 style="font-size:1.2rem;font-weight:900;margin-bottom:18px;">📊 Händler Dashboard</h1>
    <div class="box">
      <div class="sec-hd"><h2>Händler Info</h2></div>
      <div id="merchantInfo" class="loading">Lade Händlerdaten...</div>
    </div>
  </div>

  <!-- PRODUKTE -->
  <div class="page" id="page-products">
    <h1 style="font-size:1.2rem;font-weight:900;margin-bottom:18px;">📦 Produkte</h1>
    <div class="box">
      <div class="sec-hd">
        <h2>Produktverwaltung</h2>
        <button class="btn btn-out btn-sm" style="color:#fff;background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);" onclick="openProdModal()">+ Neues Produkt</button>
      </div>
      <div id="productsList" class="loading">Lade Produkte...</div>
    </div>
  </div>

  <!-- PARTNER -->
  <div class="page" id="page-partners">
    <h1 style="font-size:1.2rem;font-weight:900;margin-bottom:18px;">🤝 Partner</h1>

    <!-- Neuer Partner -->
    <div class="box" style="margin-bottom:20px;">
      <div class="sec-hd">
        <h2>Neuen Partner anlegen</h2>
        <button class="btn btn-out btn-sm" style="color:#fff;background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);" onclick="togglePForm()">+ Neu</button>
      </div>
      <div id="pForm" style="display:none;padding:20px;">
        <div class="grid2">
          <div class="fgrp"><label>Name *</label><input id="np-name" placeholder="Vor- und Nachname"></div>
          <div class="fgrp"><label>WhatsApp / Telefon</label><input id="np-phone" placeholder="+43..."></div>
          <div class="fgrp"><label>E-Mail</label><input id="np-email" type="email" placeholder="email@firma.com"></div>
          <div class="fgrp"><label>Provision</label>
            <div style="display:flex;gap:8px;">
              <select id="np-ctype" style="width:140px;padding:9px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:.88rem;outline:none;">
                <option value="percentage">% Prozent</option>
                <option value="fixed">€ Fix</option>
              </select>
              <input id="np-cval" type="number" value="10" min="0" step="0.5" placeholder="10" style="flex:1;padding:9px 11px;border:1.5px solid var(--border);border-radius:7px;font-size:.88rem;outline:none;">
            </div>
          </div>
        </div>
        <div class="err" id="np-err"></div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
          <button class="btn btn-out" onclick="togglePForm()">Abbrechen</button>
          <button class="btn btn-g" onclick="savePartner()">✅ Partner anlegen</button>
        </div>
      </div>
    </div>

    <!-- Partner Liste -->
    <div class="box">
      <div class="sec-hd">
        <h2>Partner-Liste</h2>
        <button class="btn btn-out btn-sm" style="color:#fff;background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);" onclick="loadPartners()">↺</button>
      </div>
      <div class="sec-body">
        <table>
          <thead><tr><th>Name</th><th>Ref-Code</th><th>Telefon</th><th>Provision</th><th>Status</th><th>Aktionen</th></tr></thead>
          <tbody id="partnersList"><tr><td colspan="6" class="msg">Lade...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

</div><!-- /main -->

<!-- PRODUKT MODAL -->
<div class="modal-bg" id="prodModal">
  <div class="modal">
    <h3 id="prodModalTitle">➕ Neues Produkt</h3>
    <input type="hidden" id="p-id">
    <div class="fgrp"><label>Produktname *</label><input id="p-name" placeholder="z.B. Frischer Dorado 1kg"></div>
    <div class="grid2">
      <div class="fgrp"><label>Preis *</label><input id="p-price" type="number" step="0.01" min="0" placeholder="0.00"></div>
      <div class="fgrp"><label>Einheit (z.B. kg, Stück)</label><input id="p-unit" placeholder="Stück"></div>
    </div>
    <div class="grid2">
      <div class="fgrp"><label>Status</label>
        <select id="p-avail"><option value="true">✅ Verfügbar</option><option value="false">❌ Deaktiviert</option></select>
      </div>
      <div class="fgrp"><label>Verkaufstyp</label>
        <select id="p-purch"><option value="true">🛒 Direkt kaufbar</option><option value="false">📋 Nur anfragbar</option></select>
      </div>
    </div>
    <div class="fgrp"><label>Kurzbeschreibung</label><input id="p-short" placeholder="Kurze Beschreibung"></div>
    <div class="fgrp"><label>Stripe Payment Link</label><input id="p-stripe" placeholder="https://buy.stripe.com/..."></div>
    <div class="fgrp"><label>Bild URL (optional)</label><input id="p-img" placeholder="https://..."></div>
    <div class="err" id="p-err"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);">
      <button class="btn btn-out" onclick="closeProdModal()">Abbrechen</button>
      <button class="btn btn-g" onclick="saveProduct()">💾 Speichern</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var API = 'https://converto-server-production.up.railway.app';
var KEY = 'converto_auth_v2';
var merchant = null;
var slug = '';
var products = [];
var partners = [];

(async function boot() {
  var auth = null;
  try { auth = JSON.parse(localStorage.getItem(KEY)||'null'); } catch(e){}
  if (!auth || !auth.role) { location.href = 'login.html?redirect=' + encodeURIComponent(location.href); return; }
  if (auth.loggedInAt && Date.now() - new Date(auth.loggedInAt).getTime() > 43200000) {
    localStorage.removeItem(KEY); location.href = 'login.html'; return;
  }
  slug = auth.slug || new URLSearchParams(location.search).get('m') || (auth.merchants && auth.merchants[0] && auth.merchants[0].slug) || '';
  if (!slug) { location.href = 'hub.html'; return; }
  document.getElementById('navSlug').textContent = slug;
  try {
    var r = await fetch(API + '/api/merchants/' + slug);
    var d = await r.json();
    if (d && d.id) {
      merchant = d;
      document.getElementById('navName').textContent = merchant.name || slug;
      document.getElementById('merchantInfo').innerHTML =
        '<div style="padding:18px;font-size:.88rem;line-height:2.2;">' +
        '<b>Name:</b> ' + (merchant.name||'—') + ' &nbsp;&middot;&nbsp; ' +
        '<b>Slug:</b> <span class="codetag">' + (merchant.slug||'—') + '</span><br>' +
        '<b>Währung:</b> ' + (merchant.currency||'EUR') + ' &nbsp;&middot;&nbsp; ' +
        '<b>WhatsApp:</b> ' + (merchant.wa_number||merchant.whatsapp_number||'—') + '<br>' +
        '<b>Landingpage:</b> <a href="http://converdino.com/' + merchant.slug + '" target="_blank" style="color:var(--g3);">converdino.com/' + merchant.slug + '</a>' +
        '</div>';
    } else throw new Error('Kein Händler gefunden');
  } catch(e) {
    document.getElementById('merchantInfo').innerHTML = '<div style="padding:18px;color:var(--red);">❌ ' + e.message + '</div>';
    document.getElementById('navName').textContent = slug;
  }
  await loadProducts();
  await loadPartners();
})();

function doLogout() { localStorage.removeItem(KEY); location.href = 'login.html'; }

function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tbtn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('page-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');}, 3000);
}

function fmtNum(n) { return (parseFloat(n)||0).toLocaleString('de-AT',{minimumFractionDigits:2,maximumFractionDigits:2}); }

// ── PRODUKTE ──────────────────────────────────────────────
async function loadProducts() {
  if (!merchant) return;
  document.getElementById('productsList').innerHTML = '<div class="loading">Lade...</div>';
  try {
    var r = await fetch(API + '/api/products/' + merchant.id);
    products = await r.json() || [];
    renderProducts();
  } catch(e) {
    document.getElementById('productsList').innerHTML = '<div class="loading" style="color:var(--red);">Fehler: ' + e.message + '</div>';
  }
}

function renderProducts() {
  var el = document.getElementById('productsList');
  if (!products.length) { el.innerHTML = '<div class="loading">Noch keine Produkte.</div>'; return; }
  var cur = merchant ? (merchant.currency || 'EUR') : 'EUR';
  var html = '<div class="prod-grid">';
  for (var i = 0; i < products.length; i++) {
    var p = products[i];
    var pid = p.id;
    var img = p.image_url ? '<img src="' + p.image_url + '" alt="Produkt">' : '<div class="pc-ph">&#128722;</div>';
    var typ = p.purchasable !== false ? '<span class="tag tag-buy">&#128722; Kaufbar</span>' : '<span class="tag tag-ask">&#128203; Anfrage</span>';
    var avl = p.available !== false ? '<span class="badge b-on">Aktiv</span>' : '<span class="badge b-off">Inaktiv</span>';
    var dsc = p.short_description ? '<div style="font-size:.76rem;color:var(--mu);margin:5px 0;">' + p.short_description + '</div>' : '';
    html += '<div class="pc">' + img + '<div class="pc-b">'
      + '<div class="pc-name">' + (p.name||'—') + '</div>'
      + '<div class="pc-price">' + fmtNum(p.price) + ' ' + cur + '</div>'
      + typ + ' ' + avl + dsc
      + '<div style="display:flex;gap:6px;margin-top:8px;">'
      + '<button class="btn btn-gold btn-sm" style="flex:1;" onclick="editProduct(\`' + pid + '\`)">&#9999; Bearbeiten</button>'
      + '<button class="btn btn-red btn-sm" onclick="deleteProduct(\`' + pid + '\`)">&#128465;</button>'
      + '</div></div></div>';
  }
  html += '</div>';
  el.innerHTML = html;
}

function openProdModal() {
  ['p-id','p-name','p-price','p-unit','p-short','p-stripe','p-img'].forEach(function(id){
    var el = document.getElementById(id); if (el) el.value = '';
  });
  document.getElementById('p-avail').value = 'true';
  document.getElementById('p-purch').value = 'true';
  document.getElementById('p-err').textContent = '';
  document.getElementById('prodModalTitle').textContent = '+ Neues Produkt';
  document.getElementById('prodModal').classList.add('open');
}

function editProduct(id) {
  var p = null;
  for (var i = 0; i < products.length; i++) { if (products[i].id === id) { p = products[i]; break; } }
  if (!p) return;
  document.getElementById('p-id').value     = p.id;
  document.getElementById('p-name').value   = p.name||'';
  document.getElementById('p-price').value  = p.price||'';
  document.getElementById('p-unit').value   = p.unit_label||p.unit||'';
  document.getElementById('p-short').value  = p.short_description||'';
  document.getElementById('p-stripe').value = p.stripe_link||'';
  document.getElementById('p-img').value    = p.image_url||'';
  document.getElementById('p-avail').value  = p.available===false ? 'false' : 'true';
  document.getElementById('p-purch').value  = p.purchasable===false ? 'false' : 'true';
  document.getElementById('p-err').textContent = '';
  document.getElementById('prodModalTitle').textContent = 'Produkt bearbeiten';
  document.getElementById('prodModal').classList.add('open');
}

function closeProdModal() { document.getElementById('prodModal').classList.remove('open'); }

async function saveProduct() {
  var name = document.getElementById('p-name').value.trim();
  if (!name) { document.getElementById('p-err').textContent = 'Name ist Pflicht'; return; }
  if (!merchant) { document.getElementById('p-err').textContent = 'Kein Händler'; return; }
  var pid  = document.getElementById('p-id').value;
  var unit = document.getElementById('p-unit').value.trim() || 'Stück';
  var body = {
    merchant_id: merchant.id, name: name,
    price: parseFloat(document.getElementById('p-price').value)||0,
    unit_label: unit, unit: unit,
    short_description: document.getElementById('p-short').value.trim()||null,
    stripe_link: document.getElementById('p-stripe').value.trim()||null,
    image_url: document.getElementById('p-img').value.trim()||null,
    available: document.getElementById('p-avail').value === 'true',
    purchasable: document.getElementById('p-purch').value === 'true',
    status: 'active', sort_order: 1
  };
  try {
    var r = await fetch(API + '/api/products/' + (pid||''), {
      method: pid ? 'PUT' : 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    var d = await r.json();
    if (d.error) { document.getElementById('p-err').textContent = d.error; return; }
    closeProdModal();
    showToast('Produkt gespeichert!');
    await loadProducts();
  } catch(e) { document.getElementById('p-err').textContent = e.message; }
}

async function deleteProduct(id) {
  if (!confirm('Produkt loeschen?')) return;
  await fetch(API + '/api/products/' + id, {method:'DELETE'});
  showToast('Geloescht');
  await loadProducts();
}

// ── PARTNER ───────────────────────────────────────────────
function togglePForm() {
  var f = document.getElementById('pForm');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
  document.getElementById('np-err').textContent = '';
}

async function loadPartners() {
  if (!merchant) return;
  document.getElementById('partnersList').innerHTML = '<tr><td colspan="6" class="msg">Lade...</td></tr>';
  try {
    var r = await fetch(API + '/api/partners/' + merchant.id);
    partners = await r.json() || [];
    renderPartners();
  } catch(e) {
    document.getElementById('partnersList').innerHTML = '<tr><td colspan="6" class="msg" style="color:var(--red);">Fehler: ' + e.message + '</td></tr>';
  }
}

function renderPartners() {
  var tbody = document.getElementById('partnersList');
  if (!partners.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="msg">Noch keine Partner. Klicke + Neu.</td></tr>';
    return;
  }
  var cur = merchant ? (merchant.currency || 'EUR') : 'EUR';
  var rows = '';
  for (var i = 0; i < partners.length; i++) {
    var p = partners[i];
    var pid = p.id;
    var pst = p.status || 'active';
    var comm = pst === 'percentage' ? (p.commission_value||0) + '%' : fmtNum(p.commission_value) + ' ' + cur;
    var badge = pst === 'active' ? '<span class="badge b-on">Aktiv</span>' : '<span class="badge b-off">Pausiert</span>';
    var tog = pst === 'active' ? '&#9208;' : '&#9654;';
    var safeName = (p.name||'').replace(/["']/g,'');
    rows += '<tr>'
      + '<td><strong>' + (p.name||'—') + '</strong><br><small style="color:var(--mu)">' + (p.email||'') + '</small></td>'
      + '<td><span class="codetag">' + (p.referral_code||'—') + '</span></td>'
      + '<td>' + (p.phone||'—') + '</td>'
      + '<td>' + comm + '</td>'
      + '<td>' + badge + '</td>'
      + '<td style="white-space:nowrap;">'
      + '<button class="btn btn-out btn-sm" onclick="togglePartner(\`' + pid + '\`,\`' + pst + '\`)">' + tog + '</button> '
      + '<button class="btn btn-red btn-sm" onclick="delPartner(\`' + pid + '\`,\`' + safeName + '\`)">&#128465;</button>'
      + '</td></tr>';
  }
  tbody.innerHTML = rows;
}

async function savePartner() {
  var name = document.getElementById('np-name').value.trim();
  if (!name) { document.getElementById('np-err').textContent = 'Name ist Pflicht'; return; }
  if (!merchant) { document.getElementById('np-err').textContent = 'Kein Haendler'; return; }
  document.getElementById('np-err').textContent = '';
  try {
    var r = await fetch(API + '/api/partners', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        merchant_id: merchant.id,
        name: name,
        phone: document.getElementById('np-phone').value.trim()||null,
        email: document.getElementById('np-email').value.trim()||null,
        commission_type: document.getElementById('np-ctype').value,
        commission_value: parseFloat(document.getElementById('np-cval').value)||10
      })
    });
    var d = await r.json();
    if (!d.success) { document.getElementById('np-err').textContent = d.error||'Fehler'; return; }
    showToast('Partner angelegt: ' + d.partner.name + ' · Code: ' + d.partner.referral_code);
    document.getElementById('np-name').value = '';
    document.getElementById('np-phone').value = '';
    document.getElementById('np-email').value = '';
    document.getElementById('pForm').style.display = 'none';
    await loadPartners();
  } catch(e) { document.getElementById('np-err').textContent = e.message; }
}

async function togglePartner(id, status) {
  var s = status === 'active' ? 'paused' : 'active';
  await fetch(API + '/api/partners/' + id, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:s})});
  showToast(s === 'active' ? 'Aktiv' : 'Pausiert');
  await loadPartners();
}

async function delPartner(id, name) {
  if (!confirm('Partner loeschen?')) return;
  await fetch(API + '/api/partners/' + id, {method:'DELETE'});
  showToast('Geloescht');
  await loadPartners();
}
</script>
