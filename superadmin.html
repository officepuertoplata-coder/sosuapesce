<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Superadmin – Converdino</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--wa:#25D366;--bg:#0a1f12;--card:#111f15;--card2:#162a1a;--border:rgba(37,211,102,0.15);--txt:#e8f5ec;--muted:#5d8a6a;--gold:#f4a100;--red:#ef4444;--purple:#8b5cf6;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}
nav{background:rgba(10,31,18,0.95);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:100;}
.nav-logo{font-weight:900;font-size:1.1rem;color:var(--wa);margin-right:20px;}
.nav-logo span{color:var(--txt);}
.tab{padding:0 16px;height:56px;display:flex;align-items:center;border:none;background:none;color:var(--muted);font-size:.85rem;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:var(--wa);border-bottom-color:var(--wa);}
.nav-right{margin-left:auto;display:flex;gap:8px;}
.btn-nav{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:8px;cursor:pointer;font-size:.78rem;font-family:'Nunito',sans-serif;}
.btn-nav:hover{border-color:var(--wa);color:var(--txt);}
.main{max-width:1100px;margin:0 auto;padding:28px 24px;}
.page{display:none;}.page.active{display:block;}
/* TABLE */
.table-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px;}
.table-hd{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.table-hd h2{font-size:.95rem;font-weight:800;}
table{width:100%;border-collapse:collapse;}
th{padding:10px 16px;text-align:left;font-size:.68rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border);}
td{padding:12px 16px;font-size:.85rem;border-bottom:1px solid rgba(37,211,102,0.06);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(37,211,102,0.03);}
.badge{display:inline-flex;padding:3px 9px;border-radius:20px;font-size:.68rem;font-weight:700;}
.b-active{background:rgba(37,211,102,0.15);color:var(--wa);}
.b-inactive{background:rgba(239,68,68,0.12);color:var(--red);}
.b-super{background:rgba(139,92,246,0.15);color:#c4b5fd;}
.b-staff{background:rgba(244,161,0,0.12);color:var(--gold);}
.b-merchant{background:rgba(37,211,102,0.12);color:var(--wa);}
/* FORM */
.form-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;}
.form-overlay.open{display:flex;}
.form-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.form-box h3{font-size:1rem;font-weight:800;margin-bottom:20px;}
.fgrp{margin-bottom:14px;}
.fgrp label{display:block;font-size:.65rem;font-weight:800;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px;}
.fgrp input,.fgrp select,.fgrp textarea{width:100%;padding:9px 12px;background:var(--card2);border:1.5px solid rgba(37,211,102,0.1);border-radius:8px;color:var(--txt);font-size:.88rem;font-family:'Nunito',sans-serif;outline:none;transition:border-color .2s;}
.fgrp input:focus,.fgrp select:focus{border-color:var(--wa);}
.fgrp select option{background:var(--card2);}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;}
.btn{padding:9px 18px;border-radius:8px;border:none;font-size:.85rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;}
.btn-primary{background:var(--wa);color:#fff;}
.btn-primary:hover{background:var(--wa-d);}
.btn-ghost{background:var(--card2);color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--txt);}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red);}
.btn-danger:hover{background:var(--red);color:#fff;}
.btn-sm{padding:5px 10px;font-size:.76rem;}
.btn-icon{background:none;border:none;cursor:pointer;font-size:14px;padding:4px;color:var(--muted);}
.btn-icon:hover{color:var(--txt);}
.err{color:var(--red);font-size:.78rem;margin-top:8px;}
/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;background:var(--wa);color:#fff;padding:10px 18px;border-radius:10px;font-size:.85rem;font-weight:700;transform:translateY(80px);opacity:0;transition:all .3s;z-index:999;}
#toast.show{transform:translateY(0);opacity:1;}
/* Checkboxes for merchant access */
.merchant-checks{display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto;background:var(--card2);border:1.5px solid rgba(37,211,102,0.1);border-radius:8px;padding:10px;}
.merchant-check-item{display:flex;align-items:center;gap:8px;font-size:.85rem;cursor:pointer;}
.merchant-check-item input{accent-color:var(--wa);}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Con<span>verdino</span></div>
  <button class="tab active" onclick="switchTab('merchants',this)">🏪 Händler</button>
  <button class="tab" onclick="switchTab('users',this)">👥 Benutzer</button>
  <div class="nav-right">
    <button class="btn-nav" onclick="window.location.href='hub.html'">← Hub</button>
    <button class="btn-nav" onclick="doLogout()">Ausloggen</button>
  </div>
</nav>

<div class="main">

  <!-- HÄNDLER TAB -->
  <div class="page active" id="tab-merchants">
    <div class="table-card">
      <div class="table-hd">
        <h2>🏪 Alle Händler</h2>
        <button class="btn btn-primary btn-sm" onclick="openMerchantForm()">+ Neuer Händler</button>
      </div>
      <table>
        <thead><tr><th>Name</th><th>Slug</th><th>Status</th><th>Währung</th><th>WhatsApp</th><th>Aktionen</th></tr></thead>
        <tbody id="merchantsTable"><tr><td colspan="6" style="text-align:center;padding:30px;color:var(--muted);">Lade...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- BENUTZER TAB -->
  <div class="page" id="tab-users">
    <div class="table-card">
      <div class="table-hd">
        <h2>👥 Benutzer & Zugänge</h2>
        <button class="btn btn-primary btn-sm" onclick="openUserForm()">+ Neuer Benutzer</button>
      </div>
      <table>
        <thead><tr><th>Name</th><th>Username</th><th>Rolle</th><th>Händler</th><th>Status</th><th>Letzter Login</th><th>Aktionen</th></tr></thead>
        <tbody id="usersTable"><tr><td colspan="7" style="text-align:center;padding:30px;color:var(--muted);">Lade...</td></tr></tbody>
      </table>
    </div>
  </div>

</div>

<!-- MERCHANT FORM -->
<div class="form-overlay" id="merchantForm">
  <div class="form-box">
    <h3 id="merchantFormTitle">🏪 Neuer Händler</h3>
    <input type="hidden" id="m-id">
    <div class="fgrp"><label>Name *</label><input id="m-name" placeholder="z.B. Sosua Pescado"></div>
    <div class="fgrp"><label>Slug * (URL-freundlich, nur Kleinbuchstaben)</label><input id="m-slug" placeholder="z.B. sosuapesce" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9-]/g,'')"></div>
    <div class="fgrp"><label>Admin-Passwort *</label><input type="password" id="m-password" placeholder="Sicheres Passwort"></div>
    <div class="fgrp"><label>Währung</label>
      <select id="m-currency"><option value="EUR">€ Euro</option><option value="USD">$ US Dollar</option><option value="RD$">RD$ Dominikanischer Peso</option></select>
    </div>
    <div class="fgrp"><label>WhatsApp Nummer</label><input id="m-wa" placeholder="+43..."></div>
    <div class="fgrp"><label>Beschreibung (optional)</label><textarea id="m-desc" rows="2" placeholder="Kurze Beschreibung"></textarea></div>
    <div class="err" id="mErr"></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeMerchantForm()">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveMerchant()">💾 Speichern</button>
    </div>
  </div>
</div>

<!-- USER FORM -->
<div class="form-overlay" id="userForm">
  <div class="form-box">
    <h3 id="userFormTitle">👥 Neuer Benutzer</h3>
    <input type="hidden" id="u-id">
    <div class="fgrp"><label>Name</label><input id="u-name" placeholder="Vollständiger Name"></div>
    <div class="fgrp"><label>Username * (Login-Name)</label><input id="u-username" placeholder="z.B. alexander" oninput="this.value=this.value.toLowerCase().replace(/\s/g,'')"></div>
    <div class="fgrp"><label>Passwort *</label><input type="password" id="u-password" placeholder="Sicheres Passwort"></div>
    <div class="fgrp"><label>Rolle *</label>
      <select id="u-role" onchange="onRoleChange()">
        <option value="staff">👔 Mitarbeiter (Staff)</option>
        <option value="merchant">🏪 Händler</option>
        <option value="superadmin">👑 Superadmin</option>
      </select>
    </div>
    <div id="merchantSelectDiv" class="fgrp">
      <label>Händler-Zugriff (Mehrfachauswahl für Mitarbeiter)</label>
      <div class="merchant-checks" id="merchantCheckboxes"></div>
    </div>
    <div id="singleMerchantDiv" class="fgrp" style="display:none;">
      <label>Händler</label>
      <select id="u-merchant"><option value="">— Händler wählen —</option></select>
    </div>
    <div class="fgrp"><label>E-Mail (optional)</label><input type="email" id="u-email" placeholder="email@firma.com"></div>
    <div class="err" id="uErr"></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeUserForm()">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveUser()">💾 Speichern</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = 'https://converto-server-production.up.railway.app';
const KEY = 'converto_auth_v2';
let allMerchants = [];
let allUsers = [];
let auth = null;

window.onload = async function() {
  try { auth = JSON.parse(localStorage.getItem(KEY) || 'null'); } catch(e) {}
  if (!auth || auth.role !== 'superadmin') {
    window.location.href = 'login.html';
    return;
  }
  loadMerchants();
  loadUsers();
};

function doLogout() { localStorage.removeItem(KEY); window.location.href = 'login.html'; }

function switchTab(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
}

function showToast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err ? 'var(--red)' : 'var(--wa)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function fmtDate(d) { return d ? new Date(d).toLocaleDateString('de-AT') : '—'; }

// ── HÄNDLER ────────────────────────────────────────────────
async function loadMerchants() {
  try {
    const r = await fetch(API + '/api/merchants');
    allMerchants = await r.json();
    const tbody = document.getElementById('merchantsTable');
    tbody.innerHTML = allMerchants.length
      ? allMerchants.map(m => `
        <tr>
          <td><strong>${m.name}</strong></td>
          <td><code style="background:var(--card2);padding:2px 8px;border-radius:4px;font-size:.78rem;">${m.slug}</code></td>
          <td><span class="badge ${m.status === 'active' ? 'b-active' : 'b-inactive'}">${m.status || 'active'}</span></td>
          <td>${m.currency || '—'}</td>
          <td>${m.wa_number || m.whatsapp_number || '—'}</td>
          <td style="white-space:nowrap;">
            <button class="btn-icon" onclick="editMerchant('${m.id}')" title="Bearbeiten">✏️</button>
            <button class="btn btn-ghost btn-sm" onclick="loginAsMerchant('${m.slug}')" title="Als Händler anzeigen">👁️</button>
          </td>
        </tr>`).join('')
      : '<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--muted);">Keine Händler gefunden</td></tr>';
  } catch(e) { showToast('Fehler beim Laden', true); }
}

function loginAsMerchant(slug) {
  const m = allMerchants.find(x => x.slug === slug);
  if (!m) return;
  const tempAuth = { ...auth, merchantId: m.id, merchantName: m.name, slug: m.slug };
  localStorage.setItem(KEY, JSON.stringify(tempAuth));
  window.location.href = 'hub.html';
}

function openMerchantForm(id) {
  document.getElementById('m-id').value = '';
  document.getElementById('m-name').value = '';
  document.getElementById('m-slug').value = '';
  document.getElementById('m-password').value = '';
  document.getElementById('m-currency').value = 'EUR';
  document.getElementById('m-wa').value = '';
  document.getElementById('m-desc').value = '';
  document.getElementById('mErr').textContent = '';
  document.getElementById('merchantFormTitle').textContent = '🏪 Neuer Händler';
  document.getElementById('merchantForm').classList.add('open');
}

function editMerchant(id) {
  const m = allMerchants.find(x => x.id === id);
  if (!m) return;
  document.getElementById('m-id').value = m.id;
  document.getElementById('m-name').value = m.name || '';
  document.getElementById('m-slug').value = m.slug || '';
  document.getElementById('m-password').value = '';
  document.getElementById('m-currency').value = m.currency || 'EUR';
  document.getElementById('m-wa').value = m.wa_number || m.whatsapp_number || '';
  document.getElementById('m-desc').value = m.description || '';
  document.getElementById('merchantFormTitle').textContent = '✏️ Händler bearbeiten';
  document.getElementById('mErr').textContent = '';
  document.getElementById('merchantForm').classList.add('open');
}

function closeMerchantForm() { document.getElementById('merchantForm').classList.remove('open'); }

async function saveMerchant() {
  const id = document.getElementById('m-id').value;
  const name = document.getElementById('m-name').value.trim();
  const slug = document.getElementById('m-slug').value.trim();
  const password = document.getElementById('m-password').value;

  if (!name || !slug) { document.getElementById('mErr').textContent = 'Name und Slug erforderlich'; return; }
  if (!id && !password) { document.getElementById('mErr').textContent = 'Passwort für neuen Händler erforderlich'; return; }

  const payload = { name, slug, currency: document.getElementById('m-currency').value, wa_number: document.getElementById('m-wa').value, description: document.getElementById('m-desc').value };
  if (password) payload.admin_password = password;

  try {
    const url = id ? `${API}/api/merchants/${id}` : `${API}/api/merchants`;
    const r = await fetch(url, { method: id ? 'PUT' : 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    const data = await r.json();
    if (!data.success) { document.getElementById('mErr').textContent = data.error; return; }
    closeMerchantForm();
    showToast(id ? '✅ Händler aktualisiert' : '✅ Händler angelegt');
    loadMerchants();
    // Auth merchants updaten
    const rAll = await fetch(API + '/api/merchants');
    const merchants = await rAll.json();
    auth.merchants = merchants;
    localStorage.setItem(KEY, JSON.stringify(auth));
  } catch(e) { document.getElementById('mErr').textContent = 'Verbindungsfehler'; }
}

// ── BENUTZER ───────────────────────────────────────────────
async function loadUsers() {
  try {
    const r = await fetch(API + '/api/users');
    allUsers = await r.json();
    const tbody = document.getElementById('usersTable');
    tbody.innerHTML = allUsers.length
      ? allUsers.map(u => {
          const roleBadge = { superadmin: 'b-super', staff: 'b-staff', merchant: 'b-merchant' }[u.role] || 'b-inactive';
          const roleLabel = { superadmin: '👑 Superadmin', staff: '👔 Mitarbeiter', merchant: '🏪 Händler' }[u.role] || u.role;
          const merchant = u.merchant_id ? (allMerchants.find(m => m.id === u.merchant_id)?.name || u.merchant_id) : '—';
          return `<tr>
            <td><strong>${u.name || '—'}</strong></td>
            <td><code style="background:var(--card2);padding:2px 8px;border-radius:4px;font-size:.78rem;">${u.username}</code></td>
            <td><span class="badge ${roleBadge}">${roleLabel}</span></td>
            <td>${merchant}</td>
            <td><span class="badge ${u.active ? 'b-active' : 'b-inactive'}">${u.active ? 'Aktiv' : 'Deaktiviert'}</span></td>
            <td>${fmtDate(u.last_login)}</td>
            <td style="white-space:nowrap;">
              <button class="btn-icon" onclick="editUser('${u.id}')" title="Bearbeiten">✏️</button>
              <button class="btn-icon" onclick="toggleUser('${u.id}',${u.active})" title="${u.active ? 'Deaktivieren' : 'Aktivieren'}">${u.active ? '🔒' : '🔓'}</button>
              <button class="btn-icon" onclick="deleteUser('${u.id}')" title="Löschen" style="color:var(--red)">🗑️</button>
            </td>
          </tr>`;
        }).join('')
      : '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--muted);">Keine Benutzer gefunden</td></tr>';
  } catch(e) { showToast('Fehler beim Laden', true); }
}

function onRoleChange() {
  const role = document.getElementById('u-role').value;
  document.getElementById('merchantSelectDiv').style.display = role === 'staff' ? 'block' : 'none';
  document.getElementById('singleMerchantDiv').style.display = role === 'merchant' ? 'block' : 'none';
}

function openUserForm() {
  document.getElementById('u-id').value = '';
  document.getElementById('u-name').value = '';
  document.getElementById('u-username').value = '';
  document.getElementById('u-password').value = '';
  document.getElementById('u-role').value = 'staff';
  document.getElementById('u-email').value = '';
  document.getElementById('uErr').textContent = '';
  document.getElementById('userFormTitle').textContent = '👥 Neuer Benutzer';
  buildMerchantCheckboxes([]);
  buildSingleMerchantSelect(null);
  onRoleChange();
  document.getElementById('userForm').classList.add('open');
}

function editUser(id) {
  const u = allUsers.find(x => x.id === id);
  if (!u) return;
  document.getElementById('u-id').value = u.id;
  document.getElementById('u-name').value = u.name || '';
  document.getElementById('u-username').value = u.username || '';
  document.getElementById('u-password').value = '';
  document.getElementById('u-role').value = u.role || 'staff';
  document.getElementById('u-email').value = u.email || '';
  document.getElementById('uErr').textContent = '';
  document.getElementById('userFormTitle').textContent = '✏️ Benutzer bearbeiten';
  buildMerchantCheckboxes([]);
  buildSingleMerchantSelect(u.merchant_id);
  onRoleChange();
  document.getElementById('userForm').classList.add('open');
}

function buildMerchantCheckboxes(selected) {
  const div = document.getElementById('merchantCheckboxes');
  div.innerHTML = allMerchants.map(m => `
    <label class="merchant-check-item">
      <input type="checkbox" value="${m.id}" ${selected.includes(m.id) ? 'checked' : ''}>
      ${m.name} <span style="font-size:.72rem;color:var(--muted);">(${m.slug})</span>
    </label>`).join('');
}

function buildSingleMerchantSelect(selected) {
  const sel = document.getElementById('u-merchant');
  sel.innerHTML = '<option value="">— Händler wählen —</option>' +
    allMerchants.map(m => `<option value="${m.id}" ${m.id === selected ? 'selected' : ''}>${m.name}</option>`).join('');
}

function closeUserForm() { document.getElementById('userForm').classList.remove('open'); }

async function saveUser() {
  const id = document.getElementById('u-id').value;
  const username = document.getElementById('u-username').value.trim();
  const password = document.getElementById('u-password').value;
  const role = document.getElementById('u-role').value;
  const name = document.getElementById('u-name').value.trim();

  if (!username) { document.getElementById('uErr').textContent = 'Username erforderlich'; return; }
  if (!id && !password) { document.getElementById('uErr').textContent = 'Passwort für neuen Benutzer erforderlich'; return; }

  // Händler IDs sammeln
  const merchantIds = Array.from(document.querySelectorAll('#merchantCheckboxes input:checked')).map(cb => cb.value);
  const singleMerchantId = document.getElementById('u-merchant').value;

  const payload = { username, role, name, email: document.getElementById('u-email').value };
  if (password) payload.password = password;
  if (role === 'staff') payload.merchant_ids = merchantIds;
  if (role === 'merchant') payload.merchant_id = singleMerchantId || null;

  try {
    const url = id ? `${API}/api/users/${id}` : `${API}/api/users`;
    const r = await fetch(url, { method: id ? 'PUT' : 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    const data = await r.json();
    if (!data.success) { document.getElementById('uErr').textContent = data.error; return; }
    closeUserForm();
    showToast(id ? '✅ Benutzer aktualisiert' : '✅ Benutzer angelegt');
    loadUsers();
  } catch(e) { document.getElementById('uErr').textContent = 'Verbindungsfehler'; }
}

async function toggleUser(id, active) {
  try {
    const r = await fetch(`${API}/api/users/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ active: !active }) });
    const data = await r.json();
    if (data.success) { showToast(active ? '🔒 Deaktiviert' : '🔓 Aktiviert'); loadUsers(); }
  } catch(e) { showToast('Fehler', true); }
}

async function deleteUser(id) {
  if (!confirm('Benutzer wirklich löschen?')) return;
  try {
    const r = await fetch(`${API}/api/users/${id}`, { method: 'DELETE' });
    const data = await r.json();
    if (data.success) { showToast('✅ Gelöscht'); loadUsers(); }
  } catch(e) { showToast('Fehler', true); }
}
</script>
</body>
</html>
