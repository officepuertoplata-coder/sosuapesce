<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dein Verkaufsreport</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--wa:#25D366;--bg:#f5f5f5;--card:#fff;--border:#e5e7eb;--txt:#1a1a1a;--mu:#6b7280;--gold:#f4a100;--r:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:40px;}
header{background:var(--wa);color:#fff;padding:16px 20px;}
.header-inner{max-width:720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.logo{font-weight:900;font-size:1.1rem;}
.logo span{opacity:.8;font-size:.75rem;display:block;font-weight:600;}
.main{max-width:720px;margin:0 auto;padding:16px;}
.loading{text-align:center;padding:60px;color:var(--mu);}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--wa);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}
.delete-banner{background:#fef2f2;border:1.5px solid #fecaca;border-radius:var(--r);padding:12px 16px;margin-bottom:16px;font-size:.82rem;color:#991b1b;display:flex;align-items:center;gap:8px;}
.article-result{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:20px;overflow:hidden;}
.article-header{background:var(--wa);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:10px;}
.article-num{background:rgba(255,255,255,.2);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:800;flex-shrink:0;}
.article-title-h{font-size:.95rem;font-weight:800;flex:1;}
.article-title-input{font-size:.95rem;font-weight:800;flex:1;background:transparent;border:1.5px solid transparent;border-radius:6px;padding:2px 6px;color:#fff;font-family:inherit;cursor:pointer;min-width:0;}
.article-title-input:hover{border-color:rgba(255,255,255,.4);}
.article-title-input:focus{outline:none;border-color:rgba(255,255,255,.8);background:rgba(255,255,255,.1);}
.photos-strip{display:flex;gap:8px;padding:14px 16px;overflow-x:auto;}
.photos-strip img{height:90px;width:90px;object-fit:cover;border-radius:8px;flex-shrink:0;}
.section{padding:14px 16px;border-top:1px solid var(--border);}
.section-title{font-size:.68rem;font-weight:800;color:var(--mu);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;}

/* Copy fields */
.copy-field{background:#f9fafb;border:1.5px solid var(--border);border-radius:8px;padding:12px;font-size:.88rem;line-height:1.6;position:relative;margin-bottom:8px;cursor:pointer;transition:border-color .2s,background .2s;}
.copy-field:hover{border-color:var(--wa);background:#f0fdf4;}
.copy-field.copied{border-color:var(--wa);background:#f0fdf4;}
.cf-label{font-size:.7rem;color:var(--mu);font-weight:700;margin-bottom:4px;}
.cf-text{white-space:pre-wrap;word-break:break-word;padding-right:80px;}
.copy-btn{position:absolute;top:8px;right:8px;background:var(--wa);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:.72rem;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;pointer-events:none;}

.price-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:4px;}
.price-card{background:#f9fafb;border:1.5px solid var(--border);border-radius:8px;padding:12px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;}
.price-card:hover{border-color:var(--wa);background:#f0fdf4;}
.price-val{font-size:1.2rem;font-weight:900;color:var(--wa);margin-bottom:2px;}
.price-lbl{font-size:.68rem;color:var(--mu);font-weight:700;}
.price-range{font-size:.72rem;color:var(--mu);}

.bullet-list{display:flex;flex-direction:column;gap:6px;}
.bullet-item{display:flex;align-items:flex-start;gap:8px;background:#f9fafb;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:border-color .2s,background .2s;}
.bullet-item:hover{border-color:var(--wa);background:#f0fdf4;}
.bullet-dot{color:var(--wa);font-weight:900;flex-shrink:0;}
.bullet-text{font-size:.85rem;flex:1;}

.keywords{display:flex;flex-wrap:wrap;gap:6px;}
.keyword{background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;padding:4px 10px;border-radius:20px;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .2s;}
.keyword:hover{background:#dbeafe;}
.keyword.copied{background:#dcfce7;border-color:#86efac;color:#15803d;}

.tip-list{display:flex;flex-direction:column;gap:6px;}
.tip{background:#fefce8;border:1.5px solid #fef08a;border-radius:8px;padding:10px 12px;font-size:.85rem;display:flex;gap:8px;}

.copy-all-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:.76rem;cursor:pointer;font-family:'Nunito',sans-serif;margin-left:6px;}
.copy-all-btn:hover{border-color:var(--wa);color:var(--wa);}
.market-box{background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:14px 16px;margin-bottom:8px;}
.market-box.not-found{background:#f9fafb;border-color:var(--border);}
.market-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:10px 0;}
.market-stat{text-align:center;background:#fff;border-radius:8px;padding:10px;border:1px solid #86efac;}
.market-stat-val{font-size:1.1rem;font-weight:900;color:var(--wa);}
.market-stat-lbl{font-size:.68rem;color:var(--mu);margin-top:2px;}
.market-assessment{font-size:.84rem;color:#15803d;margin-top:8px;font-weight:600;}
.market-note{font-size:.82rem;color:var(--mu);font-style:italic;}

.pdf-section{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:20px;text-align:center;margin-top:20px;}
.pdf-btn{background:var(--gold);color:#fff;border:none;border-radius:var(--r);padding:14px 28px;font-size:1rem;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;transition:background .2s;}
.pdf-btn:hover{background:#e09200;}
.pdf-note{font-size:.78rem;color:var(--mu);margin-top:8px;}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:.85rem;font-weight:700;transition:all .3s;opacity:0;z-index:999;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

@media(max-width:480px){.price-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">📊 Dein Verkaufsreport<span id="headerSub">Lade...</span></div>
    <div id="deleteInfo" style="font-size:.78rem;opacity:.85;text-align:right;"></div>
  </div>
</header>
<div class="main" id="content">
  <div class="loading"><div class="spinner"></div>Lade Ergebnisse...</div>
</div>
<div id="toast"></div>

<script>
const API = 'https://converto-server-production.up.railway.app';
const TOKEN = new URLSearchParams(location.search).get('s');

// ── Copy Store: Texte in JS gespeichert, KEIN Text in HTML-Attributen ──
const _store = {};
let _storeIdx = 0;
function storeText(text) {
  var id = 'c' + (++_storeIdx);
  _store[id] = text;
  return id;
}

if (!TOKEN) {
  document.getElementById('content').innerHTML = '<div class="loading">❌ Kein gültiger Link</div>';
} else {
  loadResults();
}

async function loadResults() {
  try {
    const r = await fetch(API + '/api/vk/results/' + TOKEN);
    const d = await r.json();
    if (!r.ok) {
      if (d.status === 'analyzing' || d.status === 'paid') {
        document.getElementById('content').innerHTML =
          '<div class="loading"><div class="spinner"></div><strong>Analyse läuft...</strong><br>' +
          '<span style="font-size:.82rem;margin-top:8px;display:block;">Wir analysieren deine Artikel. Das dauert 1-2 Minuten.<br>Diese Seite aktualisiert sich automatisch.</span></div>';
        setTimeout(loadResults, 8000);
        return;
      }
      document.getElementById('content').innerHTML = '<div class="loading">❌ ' + (d.error || 'Fehler beim Laden') + '</div>';
      return;
    }
    render(d);
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="loading">❌ Verbindungsfehler</div>';
  }
}

function render(data) {
  const articles = data.articles || [];
  const deleteAt = data.delete_at ? new Date(data.delete_at) : null;
  const daysLeft = deleteAt ? Math.ceil((deleteAt - Date.now()) / (1000*60*60*24)) : null;

  document.getElementById('headerSub').textContent = articles.length + ' Artikel analysiert';
  if (deleteAt) {
    document.getElementById('deleteInfo').textContent = '🗑️ Löschen in ' + daysLeft + ' Tagen (' + deleteAt.toLocaleDateString('de-AT') + ')';
  }

  var html = '';
  if (daysLeft !== null && daysLeft <= 2) {
    html += '<div class="delete-banner">⚠️ Deine Daten werden in <strong>' + daysLeft + ' Tag' + (daysLeft!==1?'en':'') + '</strong> automatisch gelöscht. Kopiere alles was du brauchst!</div>';
  }

  articles.forEach(function(a, i) {
    const photos = a.vk_photos || [];
    const an = a.analysis || {};

    html += '<div class="article-result">';
    var titleId = 'title_' + a.id;
    html += '<div class="article-header"><div class="article-num">' + (i+1) + '</div>';
    html += '<input class="article-title-input" id="' + titleId + '" type="text" value="' + esc(a.title || 'Artikel '+(i+1)) + '" ' +
      'data-article-id="' + a.id + '" ' +
      'onblur="saveArticleTitle(this)" ' +
      'onkeydown="if(event.keyCode===13)this.blur()" ' +
      'placeholder="Artikelbezeichnung...">' +
      '</div>';

    if (photos.length) {
      html += '<div class="photos-strip">';
      photos.forEach(function(p) { html += '<img src="' + p.public_url + '" alt="Foto">'; });
      html += '</div>';
    }

    if (!an || Object.keys(an).length === 0 || a.status !== 'analyzed') {
      html += '<div class="section"><div class="loading" style="padding:20px;">⏳ Analyse noch ausstehend...</div></div>';
    } else {

      // TITEL
      html += '<div class="section"><div class="section-title">📝 Titel-Varianten</div>';
      if (an.title_short) html += copyField(an.title_short, 'Kurztitel (max. 60 Zeichen)');
      if (an.title_long)  html += copyField(an.title_long,  'Ausführlicher Titel');
      if (an.title_quick) html += copyField(an.title_quick, 'Quick-Sale Titel');
      html += '</div>';

      // PREISE
      if (an.price_min || an.price_recommended || an.price_max) {
        var p1=storeText(an.price_min+'€'), p2=storeText(an.price_recommended+'€'), p3=storeText(an.price_max+'€');
        html += '<div class="section"><div class="section-title">💰 Preisvorschlag</div><div class="price-grid">';
        html += '<div class="price-card" data-cid="'+p1+'"><div class="price-val">'+esc(String(an.price_min||0))+'€</div><div class="price-lbl">Mindestpreis</div><div class="price-range">Quick-Sale</div></div>';
        html += '<div class="price-card" data-cid="'+p2+'"><div class="price-val" style="font-size:1.4rem;">'+esc(String(an.price_recommended||0))+'€</div><div class="price-lbl">Empfohlen</div><div class="price-range">Bestes Verhältnis</div></div>';
        html += '<div class="price-card" data-cid="'+p3+'"><div class="price-val">'+esc(String(an.price_max||0))+'€</div><div class="price-lbl">Maximalpreis</div><div class="price-range">Geduld nötig</div></div>';
        html += '</div>';
        if (an.price_reasoning) html += '<p style="font-size:.8rem;color:var(--mu);margin-top:8px;padding:0 4px;">💡 ' + esc(an.price_reasoning) + '</p>';
        html += '</div>';
      }

      // KURZBESCHREIBUNG
      if (an.short_desc) html += '<div class="section"><div class="section-title">📄 Kurzbeschreibung</div>' + copyField(an.short_desc) + '</div>';

      // LANGBESCHREIBUNG
      if (an.long_desc) html += '<div class="section"><div class="section-title">📋 Ausführliche Beschreibung</div>' + copyField(an.long_desc) + '</div>';

      // BULLET POINTS
      if (an.bullet_points && an.bullet_points.length) {
        var bulletsText = an.bullet_points.map(function(b){return '• '+b;}).join('\n');
        var allBid = storeText(bulletsText);
        html += '<div class="section">';
        html += '<div class="section-title">✨ Highlights <button class="copy-all-btn" data-cid="'+allBid+'" type="button">Alle kopieren</button></div>';
        html += '<div class="bullet-list">';
        an.bullet_points.forEach(function(b) {
          var bid = storeText(b);
          html += '<div class="bullet-item" data-cid="'+bid+'"><span class="bullet-dot">•</span><span class="bullet-text">'+esc(b)+'</span></div>';
        });
        html += '</div></div>';
      }

      // KEYWORDS
      if (an.keywords && an.keywords.length) {
        var allKwId = storeText(an.keywords.join(', '));
        html += '<div class="section"><div class="section-title">🔍 Keywords / Tags</div><div class="keywords">';
        an.keywords.forEach(function(k) {
          var kid = storeText(k);
          html += '<span class="keyword" data-cid="'+kid+'">'+esc(k)+'</span>';
        });
        html += '</div><button class="copy-all-btn" data-cid="'+allKwId+'" type="button" style="margin-top:8px;">Alle Keywords kopieren</button></div>';
      }

      // MARKTVERGLEICH
      if (an.market_comparison) {
        var mc = an.market_comparison;
        html += '<div class="section">';
        html += '<div class="section-title">📊 Marktvergleich ' + (mc.platform ? '– ' + mc.platform : '') + '</div>';
        if (mc.found && mc.listings_count > 0) {
          html += '<div class="market-box">';
          html += '<div class="market-grid">';
          html += '<div class="market-stat"><div class="market-stat-val">€' + (mc.price_range_min||0) + '</div><div class="market-stat-lbl">Niedrigster Preis</div></div>';
          html += '<div class="market-stat"><div class="market-stat-val">€' + (mc.price_avg||0) + '</div><div class="market-stat-lbl">Durchschnitt</div></div>';
          html += '<div class="market-stat"><div class="market-stat-val">€' + (mc.price_range_max||0) + '</div><div class="market-stat-lbl">Höchster Preis</div></div>';
          html += '</div>';
          html += '<div style="font-size:.78rem;color:var(--mu);margin-top:6px;">📋 ' + mc.listings_count + ' aktuelle Angebote gefunden</div>';
          if (mc.assessment) html += '<div class="market-assessment">💡 ' + esc(mc.assessment) + '</div>';
          html += '</div>';
        } else {
          html += '<div class="market-box not-found">';
          html += '<div class="market-note">🔍 ' + esc(mc.note || 'Derzeit keine vergleichbaren Angebote gefunden.') + '</div>';
          html += '</div>';
        }
        html += '</div>';
      }

      // ZUSTAND
      if (an.condition) html += '<div class="section"><div class="section-title">📊 Zustand</div>' + copyField(an.condition) + '</div>';

      // TIPPS
      if (an.tips && an.tips.length) {
        html += '<div class="section"><div class="section-title">💡 Verkaufstipps</div><div class="tip-list">';
        an.tips.forEach(function(t) {
          html += '<div class="tip"><span>💡</span><span>'+esc(t)+'</span></div>';
        });
        html += '</div></div>';
      }
    }
    html += '</div>';
  });

  html += '<div class="pdf-section"><button class="pdf-btn" id="pdfBtn">📄 Als PDF herunterladen</button>';
  if (daysLeft) html += '<div class="pdf-note">⚠️ Daten werden in '+daysLeft+' Tagen gelöscht</div>';
  html += '</div>';

  document.getElementById('content').innerHTML = html;

  // ── Event Listener nach innerHTML setzen ──────────────────
  // Alle kopierbaren Elemente über data-cid
  document.querySelectorAll('[data-cid]').forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      var id = el.getAttribute('data-cid');
      var text = _store[id];
      if (text === undefined || text === null) return;
      doCopy(text, el);
    });
  });

  // PDF Button
  var pdfBtn = document.getElementById('pdfBtn');
  if (pdfBtn) pdfBtn.addEventListener('click', function() {
    showToast('⏳ PDF wird erstellt...');
    window.open(API + '/api/vk/pdf/' + TOKEN, '_blank');
  });

  // Auto-Refresh: wenn noch Artikel ausstehen
  var pending = (data.articles || []).filter(function(a) { return a.status !== 'analyzed'; });
  if (pending.length > 0) {
    showToast('⏳ ' + pending.length + ' Artikel werden noch analysiert...');
    setTimeout(function() { loadResults(); }, 8000);
  }
}

// ── copyField: gibt HTML zurück, speichert Text im Store ──────
function copyField(text, label) {
  var id = storeText(text);
  return '<div class="copy-field" data-cid="' + id + '">' +
    (label ? '<div class="cf-label">' + esc(label) + '</div>' : '') +
    '<div class="cf-text">' + esc(text) + '</div>' +
    '<button class="copy-btn" type="button">📋 Kopieren</button>' +
    '</div>';
}

// ── Kopieren ausführen ─────────────────────────────────────────
function doCopy(text, el) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      flash(el);
      showToast('✅ Kopiert!');
    }).catch(function() {
      fallbackCopy(text, el);
    });
  } else {
    fallbackCopy(text, el);
  }
}

function fallbackCopy(text, el) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand('copy');
    flash(el);
    showToast('✅ Kopiert!');
  } catch(e) {
    showToast('❌ Kopieren fehlgeschlagen');
  }
  document.body.removeChild(ta);
}

function flash(el) {
  if (!el) return;
  el.classList.add('copied');
  setTimeout(function() { el.classList.remove('copied'); }, 1500);
}

function esc(str) {
  if (!str && str !== 0) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

async function saveArticleTitle(input) {
  var articleId = input.getAttribute('data-article-id');
  var newTitle = input.value.trim();
  if (!newTitle || !articleId) return;
  try {
    await fetch(API + '/api/vk/article/' + articleId + '/notes', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: newTitle })
    });
    showToast('✅ Titel gespeichert');
  } catch(e) { console.error('Titel speichern:', e.message); }
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}
</script>
</body>
</html>
