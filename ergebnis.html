<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dein Verkaufsreport</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--wa:#25D366;--bg:#f5f5f5;--card:#fff;--border:#e5e7eb;--txt:#1a1a1a;--mu:#6b7280;--gold:#f4a100;--red:#ef4444;--r:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:40px;}
header{background:var(--wa);color:#fff;padding:16px 20px;}
.header-inner{max-width:720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.logo{font-weight:900;font-size:1.1rem;}
.logo span{opacity:.8;font-size:.75rem;display:block;font-weight:600;}
.main{max-width:720px;margin:0 auto;padding:16px;}
.loading{text-align:center;padding:60px;color:var(--mu);}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--wa);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* DELETE COUNTDOWN */
.delete-banner{background:#fef2f2;border:1.5px solid #fecaca;border-radius:var(--r);padding:12px 16px;margin-bottom:16px;font-size:.82rem;color:#991b1b;display:flex;align-items:center;gap:8px;}

/* ARTICLE RESULT */
.article-result{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:20px;overflow:hidden;}
.article-header{background:var(--wa);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:10px;}
.article-num{background:rgba(255,255,255,.2);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:800;flex-shrink:0;}
.article-title{font-size:.95rem;font-weight:800;flex:1;}

/* FOTOS */
.photos-strip{display:flex;gap:8px;padding:14px 16px;overflow-x:auto;}
.photos-strip img{height:90px;width:90px;object-fit:cover;border-radius:8px;flex-shrink:0;}

/* SECTIONS */
.section{padding:14px 16px;border-top:1px solid var(--border);}
.section-title{font-size:.68rem;font-weight:800;color:var(--mu);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;}
.copy-field{background:#f9fafb;border:1.5px solid var(--border);border-radius:8px;padding:12px;font-size:.88rem;line-height:1.6;position:relative;cursor:pointer;transition:all .2s;}
.copy-field:hover{border-color:var(--wa);background:#f0fdf4;}
.copy-btn{position:absolute;top:8px;right:8px;background:var(--wa);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:.72rem;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;}
.copy-btn:active{background:#128C7E;}

/* PREIS */
.price-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:4px;}
.price-card{background:#f9fafb;border:1.5px solid var(--border);border-radius:8px;padding:12px;text-align:center;cursor:pointer;transition:all .2s;}
.price-card:hover{border-color:var(--wa);background:#f0fdf4;}
.price-card .price-val{font-size:1.2rem;font-weight:900;color:var(--wa);margin-bottom:2px;}
.price-card .price-lbl{font-size:.68rem;color:var(--mu);font-weight:700;}
.price-card .price-range{font-size:.72rem;color:var(--mu);}

/* BULLETS */
.bullet-list{display:flex;flex-direction:column;gap:6px;}
.bullet-item{display:flex;align-items:flex-start;gap:8px;background:#f9fafb;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .2s;}
.bullet-item:hover{border-color:var(--wa);background:#f0fdf4;}
.bullet-dot{color:var(--wa);font-weight:900;flex-shrink:0;}
.bullet-text{font-size:.85rem;flex:1;}

/* KEYWORDS */
.keywords{display:flex;flex-wrap:wrap;gap:6px;}
.keyword{background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;padding:4px 10px;border-radius:20px;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .2s;}
.keyword:hover{background:#dbeafe;}
.keyword.copied{background:#dcfce7;border-color:#86efac;color:#15803d;}

/* TIPS */
.tip-list{display:flex;flex-direction:column;gap:6px;}
.tip{background:#fefce8;border:1.5px solid #fef08a;border-radius:8px;padding:10px 12px;font-size:.85rem;display:flex;gap:8px;}
.tip-icon{flex-shrink:0;}

/* PDF BTN */
.pdf-section{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:20px;text-align:center;margin-top:20px;}
.pdf-btn{background:var(--gold);color:#fff;border:none;border-radius:var(--r);padding:14px 28px;font-size:1rem;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;}
.pdf-btn:hover{background:#e09200;}
.pdf-note{font-size:.78rem;color:var(--mu);margin-top:8px;}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:.85rem;font-weight:700;transition:all .3s;opacity:0;z-index:999;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

@media(max-width:480px){.price-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      📊 Dein Verkaufsreport
      <span id="headerSub">Lade...</span>
    </div>
    <div id="deleteInfo" style="font-size:.78rem;opacity:.85;text-align:right;"></div>
  </div>
</header>

<div class="main" id="content">
  <div class="loading"><div class="spinner"></div>Lade Ergebnisse...</div>
</div>

<div id="toast"></div>

<script>
const API = 'https://converto-server-production.up.railway.app';
const TOKEN = new URLSearchParams(location.search).get('s');
let sessionData = null;

if (!TOKEN) {
  document.getElementById('content').innerHTML = '<div class="loading">❌ Kein gültiger Link</div>';
} else {
  loadResults();
}

async function loadResults() {
  try {
    const r = await fetch(API + '/api/vk/results/' + TOKEN);
    const d = await r.json();

    if (!r.ok) {
      if (d.status === 'analyzing' || d.status === 'paid') {
        document.getElementById('content').innerHTML = `
          <div class="loading">
            <div class="spinner"></div>
            <strong>Analyse läuft...</strong><br>
            <span style="font-size:.82rem;margin-top:8px;display:block;">Wir analysieren deine Artikel. Das dauert 1-2 Minuten.<br>Diese Seite aktualisiert sich automatisch.</span>
          </div>`;
        setTimeout(loadResults, 8000);
        return;
      }
      document.getElementById('content').innerHTML = '<div class="loading">❌ ' + (d.error || 'Fehler beim Laden') + '</div>';
      return;
    }

    sessionData = d;
    render(d);
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="loading">❌ Verbindungsfehler</div>';
  }
}

function render(data) {
  const articles = data.articles || [];
  const deleteAt = data.delete_at ? new Date(data.delete_at) : null;
  const daysLeft = deleteAt ? Math.ceil((deleteAt - Date.now()) / (1000*60*60*24)) : null;

  document.getElementById('headerSub').textContent = articles.length + ' Artikel analysiert';
  if (deleteAt) {
    document.getElementById('deleteInfo').textContent = `🗑️ Löschen in ${daysLeft} Tagen\n(${deleteAt.toLocaleDateString('de-AT')})`;
  }

  let html = '';

  if (daysLeft !== null && daysLeft <= 2) {
    html += `<div class="delete-banner">⚠️ Deine Daten werden in <strong>${daysLeft} Tag${daysLeft!==1?'en':''}</strong> automatisch gelöscht. Kopiere alles was du brauchst!</div>`;
  }

  articles.forEach((a, i) => {
    const photos = a.vk_photos || [];
    const analysis = a.analysis || {};

    html += `<div class="article-result">
      <div class="article-header">
        <div class="article-num">${i+1}</div>
        <div class="article-title">${a.title || 'Artikel '+(i+1)}</div>
      </div>`;

    // Fotos
    if (photos.length) {
      html += `<div class="photos-strip">`;
      photos.forEach(p => { html += `<img src="${p.public_url}" alt="Foto">`; });
      html += `</div>`;
    }

    if (!analysis || Object.keys(analysis).length === 0 || a.status !== 'analyzed') {
      html += `<div class="section"><div class="loading" style="padding:20px;">⏳ Analyse noch ausstehend...</div></div>`;
    } else {

      // TITEL
      html += `<div class="section">
        <div class="section-title">📝 Titel-Varianten</div>`;
      if (analysis.title_short) html += copyField(analysis.title_short, 'Kurztitel (max. 60 Zeichen)');
      if (analysis.title_long)  html += copyField(analysis.title_long, 'Ausführlicher Titel');
      if (analysis.title_quick) html += copyField(analysis.title_quick, 'Quick-Sale Titel');
      html += `</div>`;

      // PREISE
      if (analysis.price_recommended || analysis.price_min || analysis.price_max) {
        html += `<div class="section">
          <div class="section-title">💰 Preisvorschlag</div>
          <div class="price-grid">
            <div class="price-card" onclick="copyText('${analysis.price_min}€')">
              <div class="price-val">${analysis.price_min}€</div>
              <div class="price-lbl">Mindestpreis</div>
              <div class="price-range">Quick-Sale</div>
            </div>
            <div class="price-card" onclick="copyText('${analysis.price_recommended}€')">
              <div class="price-val" style="font-size:1.4rem;">${analysis.price_recommended}€</div>
              <div class="price-lbl">Empfohlen</div>
              <div class="price-range">Bestes Verhältnis</div>
            </div>
            <div class="price-card" onclick="copyText('${analysis.price_max}€')">
              <div class="price-val">${analysis.price_max}€</div>
              <div class="price-lbl">Maximalpreis</div>
              <div class="price-range">Geduld nötig</div>
            </div>
          </div>
          ${analysis.price_reasoning ? `<p style="font-size:.8rem;color:var(--mu);margin-top:8px;padding:0 4px;">💡 ${analysis.price_reasoning}</p>` : ''}
        </div>`;
      }

      // KURZBESCHREIBUNG
      if (analysis.short_desc) {
        html += `<div class="section">
          <div class="section-title">📄 Kurzbeschreibung</div>
          ${copyField(analysis.short_desc)}
        </div>`;
      }

      // LANGBESCHREIBUNG
      if (analysis.long_desc) {
        html += `<div class="section">
          <div class="section-title">📋 Ausführliche Beschreibung</div>
          ${copyField(analysis.long_desc)}
        </div>`;
      }

      // BULLET POINTS
      if (analysis.bullet_points && analysis.bullet_points.length) {
        const bulletsText = analysis.bullet_points.map(b => '• ' + b).join('\n');
        html += `<div class="section">
          <div class="section-title">✨ Highlights (Bullet Points) <button onclick="copyText(${JSON.stringify(bulletsText)})" style="background:var(--wa);color:#fff;border:none;border-radius:6px;padding:2px 8px;font-size:.7rem;cursor:pointer;margin-left:6px;">Alle kopieren</button></div>
          <div class="bullet-list">`;
        analysis.bullet_points.forEach(b => {
          html += `<div class="bullet-item" onclick="copyText(${JSON.stringify(b)})">
            <span class="bullet-dot">•</span>
            <span class="bullet-text">${b}</span>
          </div>`;
        });
        html += `</div></div>`;
      }

      // KEYWORDS
      if (analysis.keywords && analysis.keywords.length) {
        html += `<div class="section">
          <div class="section-title">🔍 Keywords / Tags</div>
          <div class="keywords">`;
        analysis.keywords.forEach(k => {
          html += `<span class="keyword" onclick="copyKeyword(this,'${k}')">${k}</span>`;
        });
        html += `</div>
          <button onclick="copyText(${JSON.stringify(analysis.keywords.join(', '))})" style="margin-top:8px;background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:.76rem;cursor:pointer;font-family:'Nunito',sans-serif;">Alle Keywords kopieren</button>
        </div>`;
      }

      // ZUSTAND
      if (analysis.condition) {
        html += `<div class="section">
          <div class="section-title">📊 Zustand</div>
          ${copyField(analysis.condition)}
        </div>`;
      }

      // TIPPS
      if (analysis.tips && analysis.tips.length) {
        html += `<div class="section">
          <div class="section-title">💡 Verkaufstipps</div>
          <div class="tip-list">`;
        analysis.tips.forEach(t => {
          html += `<div class="tip"><span class="tip-icon">💡</span><span>${t}</span></div>`;
        });
        html += `</div></div>`;
      }

    }

    html += `</div>`; // article-result
  });

  // PDF Download
  html += `<div class="pdf-section">
    <button class="pdf-btn" onclick="downloadPDF()">📄 Als PDF herunterladen</button>
    <div class="pdf-note">Alle Ergebnisse in einem übersichtlichen Dokument</div>
    ${daysLeft ? `<div class="pdf-note" style="margin-top:4px;">⚠️ Daten werden in ${daysLeft} Tagen gelöscht</div>` : ''}
  </div>`;

  document.getElementById('content').innerHTML = html;
}

function copyField(text, label) {
  const id = 'cf' + Math.random().toString(36).substring(2,8);
  return `<div class="copy-field" onclick="copyText(${JSON.stringify(text)},this)" style="margin-bottom:8px;">
    ${label ? `<div style="font-size:.7rem;color:var(--mu);font-weight:700;margin-bottom:4px;">${label}</div>` : ''}
    <div style="white-space:pre-wrap;">${text}</div>
    <button class="copy-btn">📋 Kopieren</button>
  </div>`;
}

function copyText(text, el) {
  navigator.clipboard.writeText(text).then(() => {
    showToast('✅ Kopiert!');
    if (el) {
      el.style.borderColor = 'var(--wa)';
      el.style.background = '#f0fdf4';
      setTimeout(() => { el.style.borderColor=''; el.style.background=''; }, 1500);
    }
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('✅ Kopiert!');
  });
}

function copyKeyword(el, kw) {
  copyText(kw);
  el.classList.add('copied');
  setTimeout(() => el.classList.remove('copied'), 1500);
}

async function downloadPDF() {
  showToast('⏳ PDF wird erstellt...');
  window.open(API + '/api/vk/pdf/' + TOKEN, '_blank');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
