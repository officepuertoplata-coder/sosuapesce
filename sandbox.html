<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Converdino Sandbox</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#fff;border-radius:16px;padding:32px 28px;width:100%;max-width:420px;box-shadow:0 2px 12px rgba(0,0,0,.1);}
.logo{font-size:1.4rem;font-weight:900;color:#2d7a4f;margin-bottom:4px;}
.subtitle{font-size:.85rem;color:#9ca3af;margin-bottom:28px;}
label{display:block;font-size:.75rem;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
input[type=password],input[type=tel]{
  width:100%;padding:12px 14px;border:1.5px solid #e5e7eb;border-radius:10px;
  font-size:.95rem;font-family:inherit;margin-bottom:16px;
  transition:border-color .2s;
}
input:focus{outline:none;border-color:#2d7a4f;}
.btn{
  display:block;width:100%;padding:14px;background:#2d7a4f;color:#fff;
  border:none;border-radius:10px;font-size:1rem;font-weight:700;
  cursor:pointer;font-family:inherit;transition:background .2s;
}
.btn:hover{background:#245f3d;}
.btn:disabled{background:#9ca3af;cursor:not-allowed;}
.error{background:#fee2e2;border-left:3px solid #dc2626;border-radius:6px;padding:10px 14px;font-size:.85rem;color:#991b1b;margin-top:14px;}
.hint{font-size:.78rem;color:#9ca3af;margin-top:14px;text-align:center;line-height:1.5;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🔧 Converdino Sandbox</div>
  <div class="subtitle">Test-Session erstellen (ohne WhatsApp)</div>

  <label>Admin-Passwort</label>
  <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password">

  <label>Test-Telefonnummer (optional)</label>
  <input type="tel" id="phone" placeholder="z.B. 43123456789">

  <button class="btn" id="btn" onclick="createSession()">Session erstellen → bericht.html öffnen</button>
  <div id="error" style="display:none"></div>

  <div class="hint">
    Erstellt eine leere Verkaufsreport-Session<br>
    und öffnet direkt bericht.html zum Testen.
  </div>
</div>

<script>
var API = 'https://converto-server-production.up.railway.app';

async function createSession() {
  var btn = document.getElementById('btn');
  var pw = document.getElementById('pw').value.trim();
  var phone = document.getElementById('phone').value.trim();
  var errEl = document.getElementById('error');

  if (!pw) { showError('Bitte Passwort eingeben.'); return; }

  btn.disabled = true;
  btn.textContent = 'Wird erstellt...';
  errEl.style.display = 'none';

  try {
    var res = await fetch(API + '/api/vk/admin/new-session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw, phone: phone || undefined })
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Fehler');

    // Direkt zu bericht.html navigieren
    window.location.href = 'bericht.html?s=' + data.token;
  } catch(e) {
    showError(e.message);
    btn.disabled = false;
    btn.textContent = 'Session erstellen → bericht.html öffnen';
  }
}

function showError(msg) {
  var el = document.getElementById('error');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
}

// Enter-Taste
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') createSession();
});
</script>
</body>
</html>
