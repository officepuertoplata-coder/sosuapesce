<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Converdino Sandbox</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#fff;border-radius:16px;padding:32px 28px;width:100%;max-width:420px;box-shadow:0 2px 12px rgba(0,0,0,.1);}
.logo{font-size:1.4rem;font-weight:900;color:#2d7a4f;margin-bottom:4px;}
.subtitle{font-size:.85rem;color:#9ca3af;margin-bottom:24px;}
label{display:block;font-size:.75rem;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
input{width:100%;padding:12px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:.95rem;font-family:inherit;margin-bottom:14px;transition:border-color .2s;}
input:focus{outline:none;border-color:#2d7a4f;}
.pw-row{display:flex;gap:8px;align-items:flex-start;}
.pw-row input{flex:1;}
.pw-toggle{padding:12px;background:#f3f4f6;border:1.5px solid #e5e7eb;border-radius:10px;cursor:pointer;font-size:.8rem;color:#6b7280;white-space:nowrap;height:46px;}
.pw-toggle:hover{background:#e5e7eb;}
.saved-badge{font-size:.72rem;color:#25D366;font-weight:700;margin-top:-10px;margin-bottom:10px;}
.btn{display:block;width:100%;padding:14px;background:#2d7a4f;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s;}
.btn:hover{background:#245f3d;}
.btn:disabled{background:#9ca3af;cursor:not-allowed;}
.error{background:#fee2e2;border-left:3px solid #dc2626;border-radius:6px;padding:10px 14px;font-size:.85rem;color:#991b1b;margin-top:12px;}
.hint{font-size:.78rem;color:#9ca3af;margin-top:14px;text-align:center;line-height:1.5;}
.divider{border:none;border-top:1px solid #f3f4f6;margin:16px 0;}
.biz-section{background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:14px;margin-bottom:14px;}
.biz-label{font-size:.75rem;font-weight:700;color:#15803d;margin-bottom:8px;display:block;}
.biz-section input{margin-bottom:0;border-color:#86efac;}
.biz-section input:focus{border-color:#25D366;}
.biz-hint{font-size:.72rem;color:#6b7280;margin-top:6px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🔧 Converdino Sandbox</div>
  <div class="subtitle">Test-Session erstellen (ohne WhatsApp)</div>

  <label>Admin-Passwort</label>
  <div class="pw-row">
    <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password">
    <button class="pw-toggle" onclick="toggleSave()" id="save-btn">💾 Merken</button>
  </div>
  <div id="saved-badge" class="saved-badge" style="display:none">✅ Passwort gespeichert</div>

  <hr class="divider">

  <label>Test-Telefonnummer (optional)</label>
  <input type="tel" id="phone" placeholder="z.B. 4367712345678" oninput="localStorage.setItem('cvd_phone',this.value)">

  <div class="biz-section">
    <span class="biz-label">🏢 Als Business-Kunde testen</span>
    <input type="tel" id="biz-phone" placeholder="Business-Telefon (muss in vk_business_discounts stehen)" oninput="localStorage.setItem('cvd_biz_phone',this.value)">
    <div class="biz-hint">Wenn ausgefüllt wird die Session automatisch als Business-Session angelegt</div>
  </div>

  <button class="btn" id="btn" onclick="createSession()">Session erstellen → bericht.html öffnen</button>
  <div id="error" style="display:none"></div>

  <div class="hint">Erstellt eine leere Verkaufsreport-Session<br>und öffnet direkt bericht.html zum Testen.</div>
</div>

<script>
var API = 'https://converto-server-production.up.railway.app';
var PW_KEY = 'cvd_sandbox_pw';

// Passwort laden wenn gespeichert
window.onload = function() {
  var saved = localStorage.getItem(PW_KEY);
  if(saved) {
    document.getElementById('pw').value = saved;
    document.getElementById('saved-badge').style.display = 'block';
    document.getElementById('save-btn').textContent = '🗑 Vergessen';
  }
  var savedPhone = localStorage.getItem('cvd_phone');
  if(savedPhone) document.getElementById('phone').value = savedPhone;
  var savedBiz = localStorage.getItem('cvd_biz_phone');
  if(savedBiz) document.getElementById('biz-phone').value = savedBiz;
};

function toggleSave() {
  var pw = document.getElementById('pw').value.trim();
  var saved = localStorage.getItem(PW_KEY);
  if(saved) {
    localStorage.removeItem(PW_KEY);
    document.getElementById('saved-badge').style.display = 'none';
    document.getElementById('save-btn').textContent = '💾 Merken';
  } else {
    if(!pw) { alert('Bitte erst Passwort eingeben'); return; }
    localStorage.setItem(PW_KEY, pw);
    document.getElementById('saved-badge').style.display = 'block';
    document.getElementById('save-btn').textContent = '🗑 Vergessen';
  }
}

async function createSession() {
  var btn = document.getElementById('btn');
  var pw = document.getElementById('pw').value.trim();
  var phone = document.getElementById('phone').value.trim();
  var bizPhone = document.getElementById('biz-phone').value.trim();
  var errEl = document.getElementById('error');

  if(!pw) { showError('Bitte Passwort eingeben.'); return; }

  // Passwort automatisch speichern wenn noch nicht gespeichert
  if(!localStorage.getItem(PW_KEY)) {
    localStorage.setItem(PW_KEY, pw);
    document.getElementById('saved-badge').style.display = 'block';
    document.getElementById('save-btn').textContent = '🗑 Vergessen';
  }

  btn.disabled = true;
  btn.textContent = 'Wird erstellt...';
  errEl.style.display = 'none';

  try {
    var res = await fetch(API + '/api/vk/admin/new-session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        password: pw,
        phone: bizPhone || phone || undefined,
        business_phone: bizPhone || undefined
      })
    });
    var data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Fehler');
    window.location.href = 'bericht.html?s=' + data.token;
  } catch(e) {
    showError(e.message);
    btn.disabled = false;
    btn.textContent = 'Session erstellen → bericht.html öffnen';
  }
}

function showError(msg) {
  var el = document.getElementById('error');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
}

document.addEventListener('keydown', function(e) {
  if(e.key === 'Enter') createSession();
});
</script>
</body>
</html>
