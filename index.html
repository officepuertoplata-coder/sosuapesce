<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landingpage</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
:root{--g:#2d6a4f;--g2:#1b4332;--g3:#40916c;--g4:#52b788;--gold:#f4a100;--bg:#f8f9f8;--card:#fff;--txt:#1a1a1a;--mu:#6b7280;--border:#e5e7eb;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt)}
/* HEADER */
.header{background:linear-gradient(135deg,var(--g2) 0%,var(--g) 100%);color:#fff;padding:0}
.header-inner{max-width:1100px;margin:0 auto;padding:32px 20px 40px;display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.header-logo{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:2.5rem;flex-shrink:0}
.header-text h1{font-size:clamp(1.4rem,4vw,2.2rem);font-weight:800;margin-bottom:6px}
.header-text p{font-size:.95rem;opacity:.85;max-width:500px;line-height:1.5}
.header-contact{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.btn-wa{background:#25D366;color:#fff;border:none;padding:10px 20px;border-radius:40px;font-size:.9rem;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:background .2s}
.btn-wa:hover{background:#1ebe5a}
.btn-ref{background:var(--gold);color:#000;border:none;padding:10px 20px;border-radius:40px;font-size:.9rem;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
/* MAIN */
.main{max-width:1100px;margin:0 auto;padding:32px 20px}
/* AGENT BANNER */
.agent-banner{background:linear-gradient(135deg,var(--g3),var(--g));color:#fff;border-radius:var(--r);padding:16px 20px;margin-bottom:28px;display:flex;align-items:center;gap:14px}
.agent-banner h3{font-size:1rem;font-weight:700;margin-bottom:2px}
.agent-banner p{font-size:.82rem;opacity:.9}
/* PRODUCTS */
.section-title{font-size:1.25rem;font-weight:800;color:var(--g2);margin-bottom:20px;display:flex;align-items:center;gap:10px}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:40px}
.product-card{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:transform .15s,box-shadow .15s;cursor:pointer}
.product-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.12)}
.product-img{width:100%;height:200px;object-fit:cover;background:#f0fdf4;display:flex;align-items:center;justify-content:center;font-size:3.5rem}
.product-img img{width:100%;height:200px;object-fit:cover}
.product-body{padding:16px}
.product-title{font-size:1rem;font-weight:700;color:var(--g2);margin-bottom:6px}
.product-short{font-size:.82rem;color:var(--mu);margin-bottom:10px;line-height:1.4}
.product-price{font-size:1.3rem;font-weight:800;color:var(--gold);margin-bottom:12px}
.product-actions{display:flex;gap:8px}
.btn-buy{background:var(--g2);color:#fff;border:none;padding:9px 16px;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;flex:1;transition:background .2s}
.btn-buy:hover{background:var(--g)}
.btn-info{background:#f3f4f6;color:var(--txt);border:none;padding:9px 12px;border-radius:8px;font-size:.85rem;cursor:pointer;transition:background .2s}
.btn-info:hover{background:var(--border)}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:flex-end;justify-content:center;padding:0}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:var(--r) var(--r) 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.modal-img{width:100%;max-height:260px;object-fit:cover}
.modal-body{padding:20px}
.modal-title{font-size:1.2rem;font-weight:800;color:var(--g2);margin-bottom:8px}
.modal-short{font-size:.88rem;color:var(--mu);margin-bottom:12px;font-style:italic}
.modal-long{font-size:.9rem;line-height:1.6;color:var(--txt);margin-bottom:16px}
.modal-price{font-size:1.5rem;font-weight:800;color:var(--gold);margin-bottom:16px}
.modal-close{position:absolute;top:12px;right:16px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:32px;height:32px;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
/* FOOTER */
footer{background:var(--g2);color:rgba(255,255,255,.7);text-align:center;padding:20px;font-size:.8rem;margin-top:40px}
/* SKELETON */
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;height:200px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.unavail{opacity:.5;pointer-events:none}
.unavail .btn-buy{background:#9ca3af}
@media(max-width:600px){.header-inner{flex-direction:column;text-align:center}.header-contact{justify-content:center}.products-grid{grid-template-columns:1fr}.modal-overlay{align-items:flex-end}}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="header-logo" id="headerLogo">🛒</div>
    <div class="header-text">
      <h1 id="headerName">Wird geladen...</h1>
      <p id="headerDesc"></p>
      <div class="header-contact">
        <a id="waBtn" href="#" class="btn-wa" style="display:none">
          📱 WhatsApp Kontakt
        </a>
        <a href="#products" class="btn-ref">🛒 Jetzt bestellen</a>
      </div>
    </div>
  </div>
</header>

<!-- MAIN -->
<div class="main">

  <!-- AGENT BANNER (nur wenn Agent-Code in URL) -->
  <div class="agent-banner" id="agentBanner" style="display:none">
    <div style="font-size:2rem">🤝</div>
    <div>
      <h3 id="agentBannerName">Empfohlen von Ihrem Agenten</h3>
      <p>Sie wurden von einem unserer Partner empfohlen und erhalten persönlichen Service.</p>
    </div>
  </div>

  <!-- PRODUKTE -->
  <div id="products">
    <div class="section-title">🛒 Unsere Produkte</div>
    <div class="products-grid" id="productsGrid">
      <!-- Skeleton -->
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </div>

  <!-- INFO SECTION -->
  <div id="infoSection" style="display:none;background:var(--card);border-radius:var(--r);padding:24px;margin-bottom:32px;box-shadow:0 1px 4px rgba(0,0,0,.07)">
    <div class="section-title">📍 Kontakt & Info</div>
    <div id="infoContent" style="font-size:.9rem;color:var(--mu);line-height:1.8"></div>
  </div>

</div>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="productModal">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalImg"></div>
    <div class="modal-body">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-short" id="modalShort"></div>
      <div class="modal-long" id="modalLong"></div>
      <div class="modal-price" id="modalPrice"></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <a id="modalBuyBtn" href="#" target="_blank" class="btn-buy" style="text-align:center;text-decoration:none;padding:12px 24px;font-size:.95rem">
          💳 Jetzt bestellen
        </a>
        <a id="modalWaBtn" href="#" target="_blank" class="btn-wa" style="text-decoration:none">
          📱 Per WhatsApp
        </a>
      </div>
    </div>
  </div>
</div>

<footer id="siteFooter">Referral Platform</footer>

<script>
var sb = null;
var merchant = null;
var slug = '';
var refCode = '';

window.addEventListener('load', function() {
  var params = new URLSearchParams(window.location.search);
  slug = params.get('m') || 'sosuapesce';
  refCode = params.get('ref') || '';

  try {
    var cfg = window.SP_CONFIG;
    if (!cfg) return;
    var key = cfg.SUPABASE_ANON_KEY || cfg.SUPABASE_KEY;
    sb = window.supabase.createClient(cfg.SUPABASE_URL, key);
    loadMerchant();
  } catch(e) { console.error(e); }

  // Agent Banner
  if (refCode) {
    document.getElementById('agentBanner').style.display = 'flex';
    if (sb) {
      sb.from('agents').select('name').eq('referral_code', refCode).single().then(function(r) {
        if (r.data) document.getElementById('agentBannerName').textContent = 'Empfohlen von: ' + r.data.name;
      });
    }
  }

  // Modal schließen bei Klick außerhalb
  document.getElementById('productModal').addEventListener('click', function(e) {
    if (e.target.id === 'productModal') closeModal();
  });
});

function loadMerchant() {
  if (!sb) return;
  sb.from('merchants').select('*').eq('slug', slug).single().then(function(r) {
    if (r.error || !r.data) {
      document.getElementById('headerName').textContent = 'Händler nicht gefunden';
      return;
    }
    merchant = r.data;
    // Header
    document.getElementById('headerName').textContent = merchant.name;
    document.getElementById('headerDesc').textContent = merchant.description || '';
    document.title = merchant.name;
    // WhatsApp Button
    if (merchant.whatsapp_number) {
      var waNum = merchant.whatsapp_number.replace(/[^0-9]/g,'');
      var waMsg = encodeURIComponent('Hola! Me interesa hacer un pedido.' + (refCode ? ' (Ref: '+refCode+')' : ''));
      var waBtn = document.getElementById('waBtn');
      waBtn.href = 'https://wa.me/' + waNum + '?text=' + waMsg;
      waBtn.style.display = 'inline-flex';
    }
    // Info Section
    var info = [];
    if (merchant.address) info.push('📍 ' + merchant.address + (merchant.city ? ', ' + merchant.city : ''));
    if (merchant.phone) info.push('📞 ' + merchant.phone);
    if (merchant.email) info.push('✉️ ' + merchant.email);
    if (info.length) {
      document.getElementById('infoContent').innerHTML = info.join('<br>');
      document.getElementById('infoSection').style.display = 'block';
    }
    // Footer
    document.getElementById('siteFooter').textContent = '© ' + merchant.name + ' – Powered by Referral Platform';

    loadProducts();
  });
}

function fmtNum(n) { return (parseFloat(n)||0).toLocaleString('de-AT', {minimumFractionDigits:0}); }

function loadProducts() {
  if (!sb || !merchant) return;
  sb.from('merchant_products')
    .select('*')
    .eq('merchant_id', merchant.id)
    .eq('available', true)
    .order('sort_order', {ascending:true})
    .then(function(r) {
      var products = r.data || [];
      if (!products.length) {
        document.getElementById('productsGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--mu);padding:40px">Aktuell keine Produkte verfügbar.</div>';
        return;
      }
      document.getElementById('productsGrid').innerHTML = products.map(function(p) {
        var imgHtml = p.image_url
          ? '<div class="product-img"><img src="'+p.image_url+'" alt="'+p.name+'" loading="lazy"></div>'
          : '<div class="product-img">🛒</div>';
        var stripeLink = buildStripeLink(p.stripe_link);
        return '<div class="product-card" onclick="openModal(\''+p.id+'\')">' +
          imgHtml +
          '<div class="product-body">' +
            '<div class="product-title">'+p.name+'</div>' +
            (p.short_description ? '<div class="product-short">'+p.short_description+'</div>' : '') +
            '<div class="product-price">'+fmtNum(p.price)+' '+(merchant.currency||'RD$')+'</div>' +
            '<div class="product-actions">' +
              (p.stripe_link ? '<a href="'+stripeLink+'" target="_blank" class="btn-buy" onclick="event.stopPropagation()" style="text-decoration:none;text-align:center">💳 Bestellen</a>' : '') +
              '<button class="btn-info" onclick="event.stopPropagation();openModal(\''+p.id+'\')">ℹ️ Details</button>' +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');
      // Store for modal
      window._products = products;
    });
}

function buildStripeLink(base) {
  if (!base) return '#';
  var sep = base.indexOf('?') === -1 ? '?' : '&';
  var parts = [];
  if (refCode) parts.push('client_reference_id=' + encodeURIComponent(refCode));
  return base + (parts.length ? sep + parts.join('&') : '');
}

function openModal(id) {
  var p = (window._products || []).find(function(x){ return x.id === id; });
  if (!p) return;
  document.getElementById('modalTitle').textContent = p.name;
  document.getElementById('modalShort').textContent = p.short_description || '';
  document.getElementById('modalLong').textContent = p.long_description || '';
  document.getElementById('modalPrice').textContent = fmtNum(p.price) + ' ' + ((merchant && merchant.currency)||'RD$');

  // Bild
  var imgDiv = document.getElementById('modalImg');
  imgDiv.innerHTML = p.image_url ? '<img src="'+p.image_url+'" alt="'+p.name+'" class="modal-img">' : '';

  // Kaufen Button
  var stripeLink = buildStripeLink(p.stripe_link);
  var buyBtn = document.getElementById('modalBuyBtn');
  if (p.stripe_link) { buyBtn.href = stripeLink; buyBtn.style.display = 'flex'; }
  else { buyBtn.style.display = 'none'; }

  // WhatsApp Button
  if (merchant && merchant.whatsapp_number) {
    var waNum = merchant.whatsapp_number.replace(/[^0-9]/g,'');
    var waMsg = encodeURIComponent('Hola! Me interesa el producto: ' + p.name + (refCode ? ' (Ref: '+refCode+')' : ''));
    document.getElementById('modalWaBtn').href = 'https://wa.me/' + waNum + '?text=' + waMsg;
    document.getElementById('modalWaBtn').style.display = 'flex';
  } else {
    document.getElementById('modalWaBtn').style.display = 'none';
  }

  document.getElementById('productModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('productModal').classList.remove('open');
  document.body.style.overflow = '';
}
</script>
</body>
</html>
