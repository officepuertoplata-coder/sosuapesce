<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abonnenten – Converto</title>
<style>
  :root {
    --bg:       #0f1a14;
    --surface:  #1a2d21;
    --card:     #1f3527;
    --border:   #2a4535;
    --green:    #2d7a4f;
    --green-l:  #3a9a63;
    --accent:   #25d366;
    --text:     #e8f5ec;
    --muted:    #7aaa8a;
    --red:      #e05555;
    --yellow:   #f0c040;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* NAV */
  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 0;
    height: 52px;
  }
  .nav-brand {
    font-weight: 800;
    font-size: 18px;
    color: var(--accent);
    margin-right: 32px;
    text-decoration: none;
  }
  .nav-link {
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
    padding: 0 14px;
    height: 52px;
    display: flex;
    align-items: center;
    border-bottom: 2px solid transparent;
    transition: all .2s;
  }
  .nav-link:hover { color: var(--text); }
  .nav-link.active { color: var(--accent); border-bottom-color: var(--accent); }
  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .nav-slug { font-size: 13px; color: var(--muted); }

  /* MAIN */
  main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

  h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

  /* STATS */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    text-align: center;
  }
  .stat-num { font-size: 28px; font-weight: 800; color: var(--accent); }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .search {
    flex: 1;
    min-width: 200px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  .search:focus { border-color: var(--green); }
  .search::placeholder { color: var(--muted); }

  select {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    cursor: pointer;
  }

  .btn {
    padding: 9px 18px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-primary:hover { background: var(--green-l); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--green); }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
  .btn-danger:hover { background: var(--red); color: #fff; }
  .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }

  /* TABLE */
  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--surface); }
  th {
    padding: 12px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .5px;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 13px 16px;
    font-size: 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge-active  { background: rgba(37,211,102,.15); color: var(--accent); }
  .badge-pending { background: rgba(240,192,64,.15);  color: var(--yellow); }
  .badge-inactive{ background: rgba(224,85,85,.15);   color: var(--red); }

  .channel-icon { font-size: 16px; }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* ADD FORM */
  .add-form {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    display: none;
  }
  .add-form.open { display: block; }
  .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .form-row input {
    flex: 1;
    min-width: 160px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  .form-row input:focus { border-color: var(--green); }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--green);
    color: #fff;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    transform: translateY(80px);
    opacity: 0;
    transition: all .3s;
    z-index: 999;
  }
  #toast.show { transform: translateY(0); opacity: 1; }

  .loading { text-align: center; padding: 40px; color: var(--muted); }

  @media(max-width:600px) {
    th:nth-child(3), td:nth-child(3),
    th:nth-child(5), td:nth-child(5) { display: none; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="#">⚡ Converto</a>
  <a class="nav-link" href="kommunikation.html">💬 Kommunikation</a>
  <a class="nav-link" href="haendler-session.html">📋 Verfügbarkeit</a>
  <a class="nav-link" href="bestellungen.html">🛒 Bestellungen</a>
  <a class="nav-link active" href="subscribers.html">📧 Abonnenten</a>
  <div class="nav-right">
    <span class="nav-slug" id="navSlug"></span>
    <a class="nav-link" href="hub.html">← Hub</a>
  </div>
</nav>

<main>
  <h1>📧 Abonnenten</h1>
  <p class="subtitle" id="pageSubtitle">E-Mail & WhatsApp Abonnenten verwalten</p>

  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="statTotal">–</div>
      <div class="stat-label">Gesamt</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statActive">–</div>
      <div class="stat-label">Aktiv</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statEmail">–</div>
      <div class="stat-label">E-Mail</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statWA">–</div>
      <div class="stat-label">WhatsApp</div>
    </div>
  </div>

  <div class="toolbar">
    <input class="search" type="text" id="searchInput" placeholder="🔍 Name, E-Mail oder WhatsApp suchen…">
    <select id="filterStatus" onchange="applyFilter()">
      <option value="">Alle Status</option>
      <option value="active">Aktiv</option>
      <option value="pending">Ausstehend</option>
      <option value="inactive">Inaktiv</option>
    </select>
    <select id="filterChannel" onchange="applyFilter()">
      <option value="">Alle Kanäle</option>
      <option value="email">📧 E-Mail</option>
      <option value="whatsapp">📱 WhatsApp</option>
    </select>
    <button class="btn btn-ghost" onclick="exportCSV()">⬇️ CSV</button>
    <button class="btn btn-primary" onclick="toggleAddForm()">+ Hinzufügen</button>
  </div>

  <!-- ADD FORM -->
  <div class="add-form" id="addForm">
    <div class="form-row">
      <input type="email" id="newEmail" placeholder="E-Mail Adresse">
      <input type="text"  id="newName"  placeholder="Name (optional)">
      <input type="text"  id="newWA"    placeholder="WhatsApp +43... (optional)">
      <select id="newChannel">
        <option value="email">📧 E-Mail</option>
        <option value="whatsapp">📱 WhatsApp</option>
        <option value="both">Beide</option>
      </select>
      <button class="btn btn-primary" onclick="addSubscriber()">Speichern</button>
      <button class="btn btn-ghost"   onclick="toggleAddForm()">Abbrechen</button>
    </div>
  </div>

  <div class="table-wrap">
    <div id="tableContent" class="loading">Lade Abonnenten…</div>
  </div>
</main>

<div id="toast"></div>

<script>
const API = 'https://converto-server-production.up.railway.app';
const SUPABASE_URL = 'https://oxybanupdrf opjionekk.supabase.co';

// Supabase direkt
const SB_URL = 'https://oxybanupdrfopjionekk.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im94eWJhbnVwZHJmb3BqaW9uZWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDYxODI0OTQsImV4cCI6MjA2MTc1ODQ5NH0.NH6GNiOTAqpSTSuuKlnTPVVmVkzIGr3xXxHbvXbZjEY';

let merchantId   = null;
let merchantSlug = null;
let allSubs      = [];

// ── INIT ─────────────────────────────────────────────────
window.onload = async function() {
  const p = new URLSearchParams(location.search);
  merchantSlug = p.get('slug') || sessionStorage.getItem('merchantSlug') || 'sosuapesce';
  merchantId   = p.get('mid')  || sessionStorage.getItem('merchantId');

  if (!merchantId) {
    try {
      const r = await fetch(API + '/api/merchants/' + merchantSlug);
      const m = await r.json();
      merchantId = m.id;
      document.getElementById('navSlug').textContent = m.name || merchantSlug;
    } catch(e) {
      // Hardcode fallback
      merchantId = '1cdf331b-2e37-4296-b648-6527a4247b46';
      document.getElementById('navSlug').textContent = 'Sosua Pescado';
    }
  }

  await loadSubscribers();
};

// ── LOAD ─────────────────────────────────────────────────
async function loadSubscribers() {
  try {
    const res = await fetch(API + '/api/subscribers/' + merchantId);
    allSubs   = await res.json();
    if (!Array.isArray(allSubs)) throw new Error('Keine Daten');
    updateStats();
    renderTable(allSubs);
  } catch(e) {
    document.getElementById('tableContent').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div>Fehler beim Laden</div>';
  }
}

// ── STATS ─────────────────────────────────────────────────
function updateStats() {
  document.getElementById('statTotal').textContent  = allSubs.length;
  document.getElementById('statActive').textContent = allSubs.filter(s => s.status === 'active').length;
  document.getElementById('statEmail').textContent  = allSubs.filter(s => s.email).length;
  document.getElementById('statWA').textContent     = allSubs.filter(s => s.whatsapp).length;
}

// ── RENDER ────────────────────────────────────────────────
function renderTable(subs) {
  if (!subs.length) {
    document.getElementById('tableContent').innerHTML =
      '<div class="empty"><div class="empty-icon">📭</div>Keine Abonnenten gefunden</div>';
    return;
  }

  const rows = subs.map(s => {
    const badge = s.status === 'active'
      ? '<span class="badge badge-active">● Aktiv</span>'
      : s.status === 'pending'
      ? '<span class="badge badge-pending">◌ Ausstehend</span>'
      : '<span class="badge badge-inactive">✕ Inaktiv</span>';

    const channels = [
      s.email    ? '📧' : '',
      s.whatsapp ? '📱' : ''
    ].filter(Boolean).join(' ');

    const date = s.opted_in_at
      ? new Date(s.opted_in_at).toLocaleDateString('de-AT')
      : s.created_at
      ? new Date(s.created_at).toLocaleDateString('de-AT')
      : '–';

    const toggleBtn = s.status === 'active'
      ? '<button class="btn btn-danger btn-sm" onclick="toggleStatus(\'' + s.id + '\',\'inactive\')">Deaktivieren</button>'
      : '<button class="btn btn-ghost btn-sm" onclick="toggleStatus(\'' + s.id + '\',\'active\')">Aktivieren</button>';

    return '<tr>' +
      '<td><strong>' + (s.name || '–') + '</strong></td>' +
      '<td style="color:var(--muted)">' + (s.email || s.whatsapp || '–') + '</td>' +
      '<td style="font-size:18px">' + channels + '</td>' +
      '<td>' + badge + '</td>' +
      '<td style="color:var(--muted);font-size:13px">' + date + '</td>' +
      '<td>' + toggleBtn + '</td>' +
      '</tr>';
  }).join('');

  document.getElementById('tableContent').innerHTML =
    '<table>' +
    '<thead><tr>' +
    '<th>Name</th><th>Kontakt</th><th>Kanal</th><th>Status</th><th>Seit</th><th>Aktion</th>' +
    '</tr></thead>' +
    '<tbody>' + rows + '</tbody>' +
    '</table>';
}

// ── FILTER ────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('searchInput').addEventListener('input', applyFilter);
});

function applyFilter() {
  const q  = (document.getElementById('searchInput').value || '').toLowerCase();
  const st = document.getElementById('filterStatus').value;
  const ch = document.getElementById('filterChannel').value;

  const filtered = allSubs.filter(s => {
    const matchQ  = !q  || (s.name||'').toLowerCase().includes(q) ||
                           (s.email||'').toLowerCase().includes(q) ||
                           (s.whatsapp||'').includes(q);
    const matchSt = !st || s.status === st;
    const matchCh = !ch || (ch === 'email' ? s.email : s.whatsapp);
    return matchQ && matchSt && matchCh;
  });
  renderTable(filtered);
}

// ── TOGGLE STATUS ─────────────────────────────────────────
async function toggleStatus(id, newStatus) {
  await fetch(API + '/api/subscribers/' + id, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status: newStatus,
      opted_out_at: newStatus === 'inactive' ? new Date().toISOString() : null })
  });
  showToast(newStatus === 'active' ? '✅ Aktiviert' : '🚫 Deaktiviert');
  await loadSubscribers();
}

// ── ADD SUBSCRIBER ────────────────────────────────────────
function toggleAddForm() {
  const f = document.getElementById('addForm');
  f.classList.toggle('open');
}

async function addSubscriber() {
  const email   = document.getElementById('newEmail').value.trim();
  const name    = document.getElementById('newName').value.trim();
  const wa      = document.getElementById('newWA').value.trim();
  const channel = document.getElementById('newChannel').value;

  if (!email && !wa) { showToast('⚠️ E-Mail oder WhatsApp eingeben'); return; }

  const body = {
    merchant_id: merchantId,
    email:       email || null,
    name:        name  || null,
    whatsapp:    wa    || null,
    channel,
    status:      'active',
    opted_in_at: new Date().toISOString()
  };

  const res = await fetch(API + '/api/subscribers', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (res.ok) {
    showToast('✅ Abonnent hinzugefügt');
    document.getElementById('newEmail').value = '';
    document.getElementById('newName').value  = '';
    document.getElementById('newWA').value    = '';
    document.getElementById('addForm').classList.remove('open');
    await loadSubscribers();
  } else {
    const err = await res.json();
    showToast('⚠️ ' + (err.message || 'Fehler'));
  }
}

// ── CSV EXPORT ────────────────────────────────────────────
function exportCSV() {
  if (!allSubs.length) { showToast('⚠️ Keine Daten'); return; }
  const header = 'Name,Email,WhatsApp,Kanal,Status,Seit\n';
  const rows   = allSubs.map(s =>
    [s.name||'', s.email||'', s.whatsapp||'', s.channel||'',
     s.status||'', s.opted_in_at ? new Date(s.opted_in_at).toLocaleDateString('de-AT') : '']
    .map(v => '"' + String(v).replace(/"/g,'""') + '"').join(',')
  ).join('\n');

  const blob = new Blob([header + rows], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'abonnenten-' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  showToast('✅ CSV exportiert');
}

// ── TOAST ─────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
