<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verkaufsreport</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; }
.header { background: #2d7a4f; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 1.2rem; font-weight: 600; }
.container { max-width: 600px; margin: 0 auto; padding: 20px 16px; }
.card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.card-title { font-size: .85rem; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 14px; }
.status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: .8rem; font-weight: 600; }
.status-open { background: #fef3c7; color: #92400e; }
.status-paid { background: #dbeafe; color: #1e40af; }
.status-analyzing { background: #ede9fe; color: #5b21b6; }
.status-done { background: #d1fae5; color: #065f46; }
.status-error { background: #fee2e2; color: #991b1b; }
.article-card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
.article-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.article-title-input { font-weight: 600; color: #1f2937; font-size: .95rem; border: 1.5px solid transparent; border-radius: 6px; padding: 4px 8px; flex: 1; background: transparent; font-family: inherit; }
.article-title-input:focus { outline: none; border-color: #2d7a4f; background: #f0fdf4; }
.hint-box { background: #f0fdf4; border: 1.5px solid #86efac; border-radius: 8px; padding: 12px 14px; margin-bottom: 14px; font-size: .82rem; color: #15803d; line-height: 1.5; }
.hint-box strong { display: block; margin-bottom: 4px; }
/* Article mode chips */
.art-mode-row { display: flex; align-items: center; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
.art-mode-chip { padding: 3px 9px; border-radius: 20px; border: 1.5px solid #e5e7eb; background: #f9fafb; color: #6b7280; font-size: .68rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .15s; }
.art-mode-chip.ms { border-color: #86efac; background: #f0fdf4; color: #15803d; }
.art-mode-chip.ma { border-color: #bfdbfe; background: #eff6ff; color: #1d4ed8; }
.art-mode-chip.me { border-color: #e9d5ff; background: #faf5ff; color: #7c3aed; }
/* Bulk Upload */
.bulk-zone { border: 2.5px dashed #86efac; border-radius: 12px; background: #f0fdf4; padding: 28px 20px; text-align: center; cursor: pointer; margin-bottom: 14px; transition: all .2s; }
.bulk-zone:hover, .bulk-zone.drag-over { border-color: #2d7a4f; background: #dcfce7; }
.btn-autogroup { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px; border: 2px solid #7c3aed; border-radius: 10px; background: #faf5ff; color: #7c3aed; font-size: .88rem; font-weight: 800; cursor: pointer; font-family: inherit; margin-bottom: 12px; }
.btn-autogroup:hover { background: #ede9fe; }
/* Photo */
.photo-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; min-height: 80px; padding: 4px; border-radius: 10px; }
.photo-row.drag-over { background: #f0fdf4; box-shadow: inset 0 0 0 2.5px #25D366; }
.photo-wrap { position: relative; width: 72px; height: 72px; cursor: grab; user-select: none; touch-action: none; border-radius: 8px; }
.photo-wrap.dragging { opacity: 0.25; transform: scale(0.9); }
.photo-thumb { width: 72px; height: 72px; border-radius: 8px; object-fit: cover; border: 1px solid #e5e7eb; display: block; pointer-events: none; }
.photo-delete { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 50%; background: #ef4444; color: white; border: 2px solid white; font-size: 11px; cursor: pointer; font-weight: 700; z-index: 10; display: flex; align-items: center; justify-content: center; }
.photo-add { width: 72px; height: 72px; border-radius: 8px; border: 2px dashed #d1d5db; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: #9ca3af; font-size: .7rem; text-align: center; background: #f9fafb; }
.photo-add:hover { border-color: #2d7a4f; color: #2d7a4f; }
.photo-add span { font-size: 1.5rem; line-height: 1; }
.progress-bar-wrap { background: #f3f4f6; border-radius: 6px; height: 6px; overflow: hidden; margin-bottom: 4px; }
.progress-bar { height: 6px; background: #2d7a4f; border-radius: 6px; transition: width .2s; }
.progress-label { font-size: .75rem; color: #6b7280; }
.info-fields { margin-top: 10px; }
.info-field-label { font-size: .75rem; font-weight: 600; color: #9ca3af; margin-bottom: 4px; }
.info-field-textarea { width: 100%; border: 1.5px solid #e5e7eb; border-radius: 8px; padding: 10px 12px; font-size: .85rem; font-family: inherit; resize: vertical; min-height: 70px; color: #1f2937; }
.info-field-textarea:focus { outline: none; border-color: #2d7a4f; }
.article-footer { display: flex; justify-content: space-between; align-items: flex-start; margin-top: 12px; gap: 10px; }
.article-meta { font-size: .78rem; color: #9ca3af; font-weight: 600; margin-bottom: 6px; }
.btn-delete-article { background: none; border: 1px solid #fecaca; color: #ef4444; border-radius: 6px; padding: 4px 10px; font-size: .75rem; cursor: pointer; font-family: inherit; }
.btn-delete-article:hover { background: #fee2e2; }
.day-selector { display: flex; gap: 5px; flex-wrap: wrap; }
.day-btn { padding: 6px 10px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: .75rem; font-weight: 700; cursor: pointer; font-family: inherit; background: #f9fafb; color: #6b7280; transition: all .2s; text-align: center; line-height: 1.3; }
.day-btn.active { border-color: #2d7a4f; background: #f0fdf4; color: #15803d; }
.day-btn .day-cost { font-size: .62rem; font-weight: 600; display: block; color: #9ca3af; }
.day-btn.active .day-cost { color: #059669; }
.mode-selector { display: flex; gap: 8px; margin-bottom: 16px; }
.mode-btn { flex: 1; padding: 10px 6px; border: 2px solid #e5e7eb; border-radius: 10px; background: #f9fafb; cursor: pointer; text-align: center; font-family: inherit; transition: all .2s; }
.mode-btn.active { border-color: #2d7a4f; background: #f0fdf4; }
.mode-btn .mode-icon { font-size: 1.1rem; display: block; margin-bottom: 2px; }
.mode-btn .mode-name { font-size: .72rem; font-weight: 800; color: #374151; display: block; }
.mode-btn.active .mode-name { color: #15803d; }
.mode-btn .mode-mult { font-size: .65rem; color: #9ca3af; display: block; margin-top: 2px; }
.mode-btn.active .mode-mult { color: #059669; font-weight: 700; }
.btn-add-position { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px; border: 2px dashed #86efac; border-radius: 10px; background: #f0fdf4; color: #15803d; font-size: .92rem; font-weight: 700; cursor: pointer; font-family: inherit; margin-bottom: 4px; }
.btn-add-position:hover { background: #dcfce7; border-color: #2d7a4f; }
.btn-add-position:disabled { opacity: .5; cursor: not-allowed; }
.price-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #f3f4f6; font-size: .88rem; }
.price-row:last-child { border-bottom: none; }
.price-total { font-size: 1.1rem; font-weight: 700; color: #2d7a4f; }
.coupon-row { display: flex; gap: 8px; margin-top: 12px; }
.coupon-row input { flex: 1; padding: 10px 14px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: .9rem; text-transform: uppercase; }
.coupon-row input:focus { outline: none; border-color: #2d7a4f; }
.btn-coupon { padding: 10px 18px; background: #f3f4f6; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: .85rem; }
.coupon-msg { font-size: .82rem; margin-top: 6px; }
.coupon-ok { color: #065f46; }
.coupon-err { color: #991b1b; }
.btn-pay { display: block; width: 100%; padding: 16px; background: #2d7a4f; color: white; border: none; border-radius: 10px; font-size: 1.05rem; font-weight: 700; cursor: pointer; text-align: center; margin-top: 16px; }
.btn-pay:disabled { background: #9ca3af; cursor: not-allowed; }
.spinner { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 16px; color: #6b7280; }
.spinner-ring { width: 40px; height: 40px; border: 3px solid #e5e7eb; border-top-color: #2d7a4f; border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-box { background: #fee2e2; border-left: 4px solid #dc2626; border-radius: 8px; padding: 16px; color: #991b1b; }
.info-row { display: flex; justify-content: space-between; font-size: .88rem; color: #4b5563; padding: 4px 0; }
.info-label { color: #9ca3af; }
#drag-ghost { position: fixed; pointer-events: none; z-index: 9999; width: 72px; height: 72px; border-radius: 10px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,.35); opacity: 0.85; display: none; border: 2px solid #25D366; }
#drag-ghost img { width: 100%; height: 100%; object-fit: cover; display: block; }
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: .85rem; font-weight: 700; transition: all .3s; opacity: 0; z-index: 9998; }
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>
<div class="header"><div style="font-size:1.5rem;">&#128269;</div><h1>Verkaufsreport</h1></div>
<div class="container" id="app">
  <div class="spinner"><div class="spinner-ring"></div><div>Lade deinen Auftrag...</div></div>
</div>
<div id="toast"></div>
<div id="drag-ghost"><img id="drag-ghost-img" src="" alt=""></div>
<script>
const API = 'https://converto-server-production.up.railway.app';
let sessionToken = null, sessionData = null, couponApplied = null, businessDiscount = null;
const notesCache = {}, daysCache = {}, articleModes = {};
let selectedMode = 'sachbearbeiter';
let _dragPhotoId = null, _dragSrcId = null, _touchPhotoId = null, _touchSrcId = null, _touchActive = false, _lastDropZone = null;

const MODES = {
  sachbearbeiter:   { icon: '&#128100;', label: 'Sachbearbeiter',   mult: 1, desc: 'Basis &times;1' },
  abteilungsleiter: { icon: '&#128202;', label: 'Abteilungsleiter', mult: 2, desc: 'Standard &times;2' },
  experte:          { icon: '&#127919;', label: 'Experte',           mult: 4, desc: 'Premium &times;4' }
};

function getArticleMode(id) { return articleModes[id] || selectedMode; }
function getArticleModeMult(id) { return MODES[getArticleMode(id)] ? MODES[getArticleMode(id)].mult : 1; }
function setArticleMode(id, mode) {
  articleModes[id] = mode;
  if (mode === 'sachbearbeiter' && sessionData && sessionData.articles) {
    sessionData.articles.forEach(function(a) { if (a.id === id && a.lp_booked) { a.lp_booked = false; saveLPBooking(id, {lp_booked: false}); } });
  }
  render();
}
function getModeMultiplier() { return MODES[selectedMode] ? MODES[selectedMode].mult : 1; }
function isMassUploadMode() { return selectedMode === 'abteilungsleiter' || selectedMode === 'experte'; }
function setMode(mode) { selectedMode = mode; render(); }
function getArticleDays(id) { return daysCache[id] || 3; }
function setDays(id, days) { daysCache[id] = days; render(); }

(function init() {
  var params = new URLSearchParams(window.location.search);
  sessionToken = params.get('s');
  if (!sessionToken) { showError('Kein Auftrag gefunden.'); return; }
  loadSession();
})();

function showToast(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); }, 2500); }

async function loadSession() {
  try {
    var res = await fetch(API + '/api/vk/session/' + sessionToken);
    if (!res.ok) throw new Error('Session nicht gefunden');
    sessionData = await res.json();
    var params = new URLSearchParams(window.location.search);
    if (params.get('paid') === '1' && sessionData.status === 'open') { showAnalyzing(); pollStatus(); return; }
    try { var dr = await fetch(API + '/api/vk/session/' + sessionToken + '/discount'); var dd = await dr.json(); if (dd.has_discount) businessDiscount = dd; } catch(e) {}
    if (sessionData.ai_mode && MODES[sessionData.ai_mode]) selectedMode = sessionData.ai_mode;
    render();
  } catch(err) { showError('Fehler: ' + err.message); }
}

function showAnalyzing() {
  document.getElementById('app').innerHTML = '<div class="card" style="text-align:center;padding:40px;"><div class="spinner-ring" style="margin:0 auto 16px;"></div><div style="font-weight:600;color:#2d7a4f;margin-bottom:8px;">&#10003; Zahlung erhalten!</div><div style="color:#6b7280;">Analyse l&auml;uft...<br>Seite aktualisiert sich automatisch.</div></div>';
}

async function pollStatus() {
  try { await fetch(API + '/api/vk/check-payment', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({token: sessionToken}) }); } catch(e) {}
  var attempts = 0;
  var interval = setInterval(async function() {
    attempts++;
    try { var r = await fetch(API + '/api/vk/session/' + sessionToken); var d = await r.json(); if (d.status === 'analyzing' || d.status === 'done') { clearInterval(interval); window.location.href = 'ergebnis.html?s=' + sessionToken; } } catch(e) {}
    if (attempts >= 60) { clearInterval(interval); showError('Analyse dauert l&auml;nger. Aufruf: ergebnis.html?s=' + sessionToken); }
  }, 5000);
}

function render() {
  var s = sessionData;
  if (!s) return;
  if (s.status === 'done' || s.status === 'analyzing') { window.location.href = 'ergebnis.html?s=' + sessionToken; return; }
  var price = calcPrice(s.articles || []);
  document.getElementById('app').innerHTML = buildHTML(s, price);
  attachEvents(); setupDragDrop(); setupBulkZone();
}

// ── Preisberechnung (pro Artikel) ────────────────────────────
function calcArticleBase(a) {
  var photos = (a.vk_photos || []).length;
  if (!photos) return 0;
  var base = 1.00 + Math.max(0, photos - 1) * 0.25;
  var days = getArticleDays(a.id);
  base += Math.max(0, days - 3) * 1.00;
  if (a.lp_booked && (a.lp_days || 0) > 0) {
    var lpRate = a.lp_has_bot ? 1.00 : 0.40;
    base += Math.round((a.lp_days || 7) * lpRate * 100) / 100;
  }
  return Math.round(base * 100) / 100;
}
function calcArticlePrice(a) { return Math.round(calcArticleBase(a) * getArticleModeMult(a.id) * 100) / 100; }
function calcPrice(articles) {
  var total = 1.00;
  articles.forEach(function(a) { total += calcArticlePrice(a); });
  return Math.round(total * 100) / 100;
}

function getDisplayPrice(price) {
  if (businessDiscount && businessDiscount.has_discount) {
    if (businessDiscount.percent >= 100) return 0;
    return Math.max(0.50, price - Math.round(price * businessDiscount.percent / 100 * 100) / 100);
  }
  return price;
}

// ── HTML Builder ─────────────────────────────────────────────
function buildHTML(s, price) {
  var articles = s.articles || [];
  var multiArticle = articles.length > 1;
  var totalPhotos = articles.reduce(function(sum, a) { return sum + (a.vk_photos || []).length; }, 0);
  var html = '';
  if (businessDiscount && businessDiscount.has_discount) {
    html += '<div style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:12px 16px;margin-bottom:12px;font-size:.88rem;color:#15803d;font-weight:700;">&#127970; Firmenrabatt aktiv: <strong>' + businessDiscount.percent + '% Rabatt</strong>' + (businessDiscount.company ? ' f&uuml;r ' + businessDiscount.company : '') + '</div>';
  }
  html += '<div class="card">';
  html += '<div class="card-title">Dein Auftrag</div>';
  html += '<div class="info-row"><span class="info-label">Status</span><span class="status-badge status-' + s.status + '">' + labelStatus(s.status) + '</span></div>';
  html += '<div class="info-row"><span class="info-label">Telefon</span><span>+' + (s.phone || '') + '</span></div>';
  html += '<div class="info-row"><span class="info-label">Positionen</span><span>' + articles.length + ' Artikel</span></div>';
  html += '</div>';
  html += '<div class="card">';
  html += '<div class="card-title">Artikel &amp; Fotos</div>';
  html += '<div class="hint-box">';
  if (isMassUploadMode()) {
    html += '<strong>&#128248; Massen-Upload aktiv</strong>Lade alle Fotos auf einmal hoch. Die KI gruppiert sie automatisch.';
  } else {
    html += '<strong>&#128248; Tipps f&uuml;r gute Fotos</strong>Vorderseite, R&uuml;ckseite, Details, Typenschild, Seriennummer.';
  }
  html += '</div>';
  if (isMassUploadMode()) {
    html += '<div class="bulk-zone" id="bulk-zone" onclick="triggerBulkUpload()" ondragover="event.preventDefault();document.getElementById(\'bulk-zone\').classList.add(\'drag-over\')" ondragleave="document.getElementById(\'bulk-zone\').classList.remove(\'drag-over\')" ondrop="handleBulkDrop(event)">';
    html += '<div style="font-size:2rem;margin-bottom:8px;">&#128248;</div>';
    html += '<div style="font-weight:800;color:#15803d;margin-bottom:4px;">Alle Fotos hier ablegen oder antippen</div>';
    html += '<div style="font-size:.78rem;color:#6b7280;">Beliebig viele Fotos auf einmal</div>';
    if (totalPhotos > 0) html += '<div style="margin-top:8px;font-size:.78rem;font-weight:700;color:#15803d;">&#10003; ' + totalPhotos + ' Foto(s) hochgeladen</div>';
    html += '</div>';
    if (totalPhotos > 0) {
      html += '<button class="btn-autogroup" onclick="autoGroupPhotos()">&#129302; Fotos automatisch gruppieren</button>';
    }
  }
  if (multiArticle) html += '<div style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:.78rem;color:#15803d;">&#8596; <strong>Foto verschieben:</strong> Auf anderen Artikel ziehen</div>';
  articles.forEach(function(a, idx) { html += buildArticleHTML(a, idx); });
  html += '<button class="btn-add-position" id="btn-add-pos" onclick="addPosition()"><span style="font-size:1.3rem;">+</span> Neue Position</button>';
  html += '</div>';
  html += '<div class="card">';
  html += '<div class="card-title">Standard-Modus f&uuml;r neue Positionen</div>';
  html += buildModeSelector();
  html += '<div class="card-title" style="margin-top:4px;">Zusammenfassung</div>';
  html += buildPriceRows(articles, price);
  html += '<div id="coupon-section">' + (businessDiscount && businessDiscount.has_discount ? '' : buildCouponSection()) + '</div>';
  html += buildPayButton(price);
  html += '</div>';
  return html;
}

function buildModeSelector() {
  var html = '<div class="mode-selector">';
  Object.keys(MODES).forEach(function(key) {
    var m = MODES[key];
    var active = selectedMode === key;
    html += '<button class="mode-btn' + (active ? ' active' : '') + '" onclick="setMode(\'' + key + '\')">';
    html += '<span class="mode-icon">' + m.icon + '</span>';
    html += '<span class="mode-name">' + m.label + '</span>';
    html += '<span class="mode-mult">' + m.desc + '</span>';
    html += '</button>';
  });
  html += '</div>';
  return html;
}

function buildArticleModeSelector(a) {
  var current = getArticleMode(a.id);
  var mult = getArticleModeMult(a.id);
  var html = '<div class="art-mode-row">';
  html += '<span style="font-size:.7rem;font-weight:700;color:#9ca3af;">KI:</span>';
  var defs = [
    {key:'sachbearbeiter', label:'&#128100; Basis', cls:'ms'},
    {key:'abteilungsleiter', label:'&#128202; Standard', cls:'ma'},
    {key:'experte', label:'&#127919; Experte', cls:'me'}
  ];
  defs.forEach(function(d) {
    var active = current === d.key;
    html += '<button class="art-mode-chip' + (active ? ' ' + d.cls : '') + '" onclick="setArticleMode(\'' + a.id + '\',\'' + d.key + '\')">' + d.label + (active ? ' &#10003;' : '') + '</button>';
  });
  html += '<span style="margin-left:auto;font-size:.7rem;color:#9ca3af;font-weight:700;">&times;' + mult + '</span>';
  html += '</div>';
  return html;
}

function buildArticleHTML(a, idx) {
  var photos = a.vk_photos || [];
  var photoHTML = photos.map(function(p) {
    return '<div class="photo-wrap" draggable="true" data-pid="' + p.id + '" data-sid="' + a.id + '">' +
      '<img class="photo-thumb" src="' + p.public_url + '" draggable="false">' +
      '<div class="photo-delete" onclick="deletePhoto(\'' + p.id + '\')">&#10005;</div></div>';
  }).join('');
  var addBtn = '<div class="photo-add" onclick="triggerUpload(\'' + a.id + '\')"><span>+</span>' + (photos.length === 0 ? 'Fotos' : 'Mehr') + '</div>';
  var notes = notesCache[a.id] !== undefined ? notesCache[a.id] : (a.notes || '');
  var html = '<div class="article-card" id="article-' + a.id + '">';
  html += '<div class="article-title-row">';
  html += '<span style="font-size:.85rem;color:#9ca3af;font-weight:700;">#' + (idx + 1) + '</span>';
  html += '<input class="article-title-input" type="text" value="' + escAttr(a.title || 'Artikel ' + (idx + 1)) + '" onblur="saveTitle(\'' + a.id + '\', this.value)" onkeydown="if(event.key===\'Enter\')this.blur()">';
  if (photos.length > 0) html += '<span style="background:#f0fdf4;border:1px solid #86efac;color:#15803d;font-size:.68rem;font-weight:700;padding:2px 7px;border-radius:10px;">' + photos.length + ' Foto' + (photos.length !== 1 ? 's' : '') + '</span>';
  html += '</div>';
  html += buildArticleModeSelector(a);
  html += '<div class="photo-row" id="photos-' + a.id + '" data-zid="' + a.id + '">' + photoHTML + addBtn + '</div>';
  html += '<div id="progress-' + a.id + '"></div>';
  html += '<div class="info-fields"><div class="info-field-label">&#8505;&#65039; Zusatzinfos f&uuml;r die KI (optional)</div>';
  html += '<textarea class="info-field-textarea" id="notes-' + a.id + '" placeholder="z.B. Gr&ouml;&szlig;e M, Baujahr 2019..." onblur="saveNotes(\'' + a.id + '\', this.value)" oninput="notesCache[\'' + a.id + '\']=this.value">' + escHtml(notes) + '</textarea></div>';
  html += '<div class="article-footer">' + buildDaySelector(a.id);
  html += '<button class="btn-delete-article" onclick="deleteArticle(\'' + a.id + '\')">&#128465; L&ouml;schen</button></div>';
  html += buildLPToggle(a);
  html += '</div>';
  return html;
}

function buildDaySelector(articleId) {
  var current = getArticleDays(articleId);
  var html = '<div><div class="article-meta">Ergebnis verf&uuml;gbar:</div><div class="day-selector">';
  [3,4,5,6,7].forEach(function(d) {
    var cost = d === 3 ? 'kostenlos' : '+&euro;' + (d-3) + '.00';
    html += '<button class="day-btn' + (current===d?' active':'') + '" onclick="setDays(\'' + articleId + '\',' + d + ')">' + d + ' Tage<span class="day-cost">' + cost + '</span></button>';
  });
  html += '</div></div>';
  return html;
}

function buildLPToggle(a) {
  var artMode = getArticleMode(a.id);
  if (artMode === 'sachbearbeiter' && !(businessDiscount && businessDiscount.has_discount)) return '';
  if (!(a.vk_photos || []).length) return '';
  var booked = !!a.lp_booked, days = a.lp_days || 7, hasBot = !!a.lp_has_bot;
  var lpRate = hasBot ? 1.00 : 0.40, lpCost = Math.round(days * lpRate * 100) / 100;
  var html = '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid #f3f4f6;margin-top:10px;cursor:pointer;" onclick="toggleLP(\'' + a.id + '\',' + booked + ')">';
  html += '<span style="font-size:.85rem;font-weight:700;color:' + (booked?'#15803d':'#6b7280') + ';">&#127760; Landingpage mitbuchen</span>';
  html += '<input type="checkbox"' + (booked?' checked':'') + ' onclick="event.stopPropagation();toggleLP(\'' + a.id + '\',' + booked + ')" style="width:16px;height:16px;accent-color:#25D366;">';
  html += '</div>';
  if (booked) {
    html += '<div style="background:#f0fdf4;border-radius:8px;padding:10px 12px;font-size:.82rem;">';
    html += '<div style="display:flex;gap:12px;align-items:center;">';
    html += '<div><label style="font-size:.7rem;font-weight:700;color:#9ca3af;display:block;">Laufzeit</label>';
    html += '<input type="number" min="1" max="30" value="' + days + '" style="width:60px;padding:4px 8px;border:1.5px solid #86efac;border-radius:6px;font-size:.85rem;" onchange="saveLPBooking(\'' + a.id + '\',{lp_days:parseInt(this.value)||7})"></div>';
    html += '<label style="display:flex;align-items:center;gap:6px;font-size:.82rem;font-weight:700;color:#4f46e5;cursor:pointer;"><input type="checkbox"' + (hasBot?' checked':'') + ' style="accent-color:#6366f1;" onchange="saveLPBooking(\'' + a.id + '\',{lp_has_bot:this.checked})"> &#129302; Bot (+&euro;0.60/Tag)</label>';
    html += '</div>';
    html += '<div style="margin-top:6px;font-size:.75rem;color:#15803d;">&#128176; &euro;' + lpCost.toFixed(2) + ' (' + days + ' Tage &times; &euro;' + lpRate.toFixed(2) + '/Tag)</div>';
    html += '</div>';
  }
  return html;
}

function buildPriceRows(articles, total) {
  var html = '';
  html += '<div class="price-row"><span>Auftragsgebühr</span><span>€1.00</span></div>';
  articles.forEach(function(a) {
    var photos = (a.vk_photos || []).length;
    var aMode = getArticleMode(a.id);
    var aMult = getArticleModeMult(a.id);
    var modeNames = {sachbearbeiter:'Basis', abteilungsleiter:'Standard', experte:'Experte'};
    var modeTag = ' <span style="font-size:.68rem;color:#9ca3af;">' + (modeNames[aMode]||'') + ' &times;' + aMult + '</span>';
    if (photos > 0) {
      var aBase = calcArticleBase(a);
      var aPrice = calcArticlePrice(a);
      html += '<div class="price-row"><span style="font-weight:600;">' + escHtml(a.title||'Artikel') + modeTag + '</span><span style="font-weight:700;">€' + aPrice.toFixed(2) + '</span></div>';
      if (aMult > 1) html += '<div class="price-row" style="color:#9ca3af;font-size:.75rem;"><span>&nbsp;&nbsp;Basis €' + aBase.toFixed(2) + ' &times; ' + aMult + '</span><span></span></div>';
    } else {
      html += '<div class="price-row" style="color:#9ca3af;"><span>' + escHtml(a.title||'Artikel') + ' – noch kein Foto</span><span>€0.00</span></div>';
    }
  });
  if (businessDiscount && businessDiscount.has_discount) {
    var disc = Math.round(total * businessDiscount.percent / 100 * 100) / 100;
    html += '<div class="price-row" style="color:#059669;"><span>&#127970; Firmenrabatt (' + businessDiscount.percent + '%)</span><span>-€' + disc.toFixed(2) + '</span></div>';
    var bizTotal = businessDiscount.percent >= 100 ? 0 : Math.max(0.50, total - disc);
    html += '<div class="price-row"><span style="font-weight:700;">Gesamt</span><span class="price-total">€' + bizTotal.toFixed(2) + '</span></div>';
    return html;
  }
  if (couponApplied && couponApplied.discount > 0) {
    html += '<div class="price-row" style="color:#059669;"><span>&#127967; Gutschein (' + couponApplied.code + ')</span><span>-€' + couponApplied.discount.toFixed(2) + '</span></div>';
  }
  var finalTotal = couponApplied ? Math.max(0, total - (couponApplied.discount||0)) : total;
  html += '<div class="price-row"><span style="font-weight:700;">Gesamt</span><span class="price-total">€' + finalTotal.toFixed(2) + '</span></div>';
  return html;
}

function buildCouponSection() {
  return '<div class="coupon-row"><input type="text" id="coupon-input" placeholder="Gutschein-Code" maxlength="20"><button class="btn-coupon" id="btn-coupon" onclick="validateCoupon()">Einl&ouml;sen</button></div><div class="coupon-msg" id="coupon-msg"></div>';
}

function buildPayButton(price) {
  if (businessDiscount && businessDiscount.percent >= 100) {
    return '<button class="btn-pay" id="btn-pay" onclick="redeemBusinessFree()" style="background:#059669;">&#127881; Kostenlos einl&ouml;sen (Firmenrabatt)</button>';
  }
  return '<button class="btn-pay" id="btn-pay" onclick="startPayment()">&#128179; Jetzt bezahlen &nbsp;€' + getDisplayPrice(price).toFixed(2) + '</button>';
}

function labelStatus(s) { return {open:'Offen',paid:'Bezahlt',analyzing:'In Analyse',done:'Fertig',error:'Fehler',expired:'Abgelaufen'}[s]||s; }

function attachEvents() {
  var input = document.getElementById('coupon-input');
  if (input) { input.addEventListener('keydown', function(e){ if(e.key==='Enter') validateCoupon(); }); input.addEventListener('input', function(){ this.value=this.value.toUpperCase(); }); }
}

// ── Bulk Upload ───────────────────────────────────────────────
function setupBulkZone() {}

function triggerBulkUpload() {
  var inp = document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.multiple=true;
  inp.onchange = async function() { if(inp.files) await handleBulkFiles(Array.from(inp.files)); };
  inp.click();
}

function handleBulkDrop(e) {
  e.preventDefault(); document.getElementById('bulk-zone').classList.remove('drag-over');
  var files = Array.from(e.dataTransfer.files).filter(function(f){ return f.type.startsWith('image/'); });
  if (files.length) handleBulkFiles(files);
}

async function handleBulkFiles(files) {
  showToast('⏳ ' + files.length + ' Fotos werden hochgeladen...');
  var articles = sessionData.articles || [];
  if (!articles.length) {
    try {
      await fetch(API + '/api/vk/article', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({token:sessionToken, title:'Artikel 1'}) });
      var r2 = await fetch(API + '/api/vk/session/' + sessionToken); sessionData = await r2.json(); articles = sessionData.articles || [];
    } catch(e) { showToast('❌ Fehler: ' + e.message); return; }
  }
  var targetId = articles[0].id;
  var errors = 0;
  for (var i = 0; i < files.length; i++) {
    try {
      var b64 = await new Promise(function(res,rej){ var r=new FileReader(); r.onload=function(){res(r.result.split(',')[1]);}; r.onerror=rej; r.readAsDataURL(files[i]); });
      var up = await fetch(API + '/api/vk/photo', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({article_id:targetId, session_id:sessionData.id, image_base64:b64, content_type:files[i].type||'image/jpeg'}) });
      if (!up.ok) throw new Error('Upload failed');
    } catch(e) { errors++; }
  }
  var r3 = await fetch(API + '/api/vk/session/' + sessionToken); sessionData = await r3.json(); render();
  showToast(errors > 0 ? '⚠️ ' + (files.length-errors) + '/' + files.length + ' hochgeladen' : '✅ ' + files.length + ' Fotos hochgeladen!');
}

async function autoGroupPhotos() {
  var btn = document.querySelector('.btn-autogroup');
  if (btn) { btn.disabled=true; btn.textContent='⏳ KI gruppiert...'; }
  try {
    var r = await fetch(API + '/api/vk/auto-group', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({token:sessionToken, ai_mode:selectedMode}) });
    if (r.ok) { var d=await r.json(); showToast('✅ ' + (d.groups||0) + ' Artikel erkannt!'); var r2=await fetch(API+'/api/vk/session/'+sessionToken); sessionData=await r2.json(); render(); }
    else { showToast('⚠️ Auto-Gruppierung folgt in Kürze'); if(btn){btn.disabled=false;btn.textContent='🤖 Fotos automatisch gruppieren';} }
  } catch(e) { showToast('⚠️ Auto-Gruppierung folgt in Kürze'); if(btn){btn.disabled=false;btn.textContent='🤖 Fotos automatisch gruppieren';} }
}

// ── Drag & Drop ───────────────────────────────────────────────
function setupDragDrop() {
  document.querySelectorAll('.photo-wrap').forEach(function(wrap) {
    wrap.addEventListener('dragstart', function(e) { _dragPhotoId=wrap.getAttribute('data-pid'); _dragSrcId=wrap.getAttribute('data-sid'); e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain',_dragPhotoId); setTimeout(function(){wrap.classList.add('dragging');},0); });
    wrap.addEventListener('dragend', function() { wrap.classList.remove('dragging'); document.querySelectorAll('.photo-row').forEach(function(z){z.classList.remove('drag-over');}); _dragPhotoId=null; _dragSrcId=null; });
  });
  document.querySelectorAll('.photo-row').forEach(function(zone) {
    zone.addEventListener('dragover', function(e) { if(!_dragPhotoId) return; e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', function(e) { if(e.relatedTarget&&zone.contains(e.relatedTarget)) return; zone.classList.remove('drag-over'); });
    zone.addEventListener('drop', function(e) { e.preventDefault(); zone.classList.remove('drag-over'); var tid=zone.getAttribute('data-zid'); if(!_dragPhotoId||!tid||tid===_dragSrcId) return; movePhoto(_dragPhotoId,tid,_dragSrcId); });
  });
}

async function movePhoto(photoId, targetId, srcId) {
  showToast('⏳ Wird verschoben...');
  try { var r=await fetch(API+'/api/vk/photo/'+photoId+'/move',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({article_id:targetId})}); if(!r.ok) throw new Error('Fehler'); var r2=await fetch(API+'/api/vk/session/'+sessionToken); sessionData=await r2.json(); render(); showToast('✅ Foto verschoben'); } catch(e) { showToast('❌ '+e.message); }
}

async function addPosition() {
  var btn=document.getElementById('btn-add-pos'); if(btn){btn.disabled=true;btn.textContent='Wird angelegt...';}
  try { var res=await fetch(API+'/api/vk/article',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:sessionToken,title:'Neuer Artikel'})}); var data=await res.json(); if(!res.ok) throw new Error(data.error||'Fehler'); var r2=await fetch(API+'/api/vk/session/'+sessionToken); sessionData=await r2.json(); render(); setTimeout(function(){ var el=document.getElementById('article-'+data.article.id); if(el) el.scrollIntoView({behavior:'smooth',block:'center'}); },100); } catch(err) { alert('Fehler: '+err.message); if(btn){btn.disabled=false;btn.innerHTML='<span style="font-size:1.3rem;">+</span> Neue Position';} }
}

async function saveTitle(articleId, newTitle) {
  var title=newTitle.trim(); if(!title) return;
  try { await fetch(API+'/api/vk/article/'+articleId+'/notes',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:title})}); if(sessionData&&sessionData.articles) sessionData.articles.forEach(function(a){if(a.id===articleId) a.title=title;}); } catch(e) {}
}
async function saveNotes(articleId, notes) { notesCache[articleId]=notes; try { await fetch(API+'/api/vk/article/'+articleId+'/notes',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({notes:notes})}); } catch(e) {} }
async function deleteArticle(articleId) {
  if(!confirm('Diese Position wirklich löschen?')) return;
  try { var res=await fetch(API+'/api/vk/article/'+articleId,{method:'DELETE'}); if(!res.ok){var d=await res.json();throw new Error(d.error||'Fehler');} var r2=await fetch(API+'/api/vk/session/'+sessionToken); sessionData=await r2.json(); render(); } catch(err) { alert('Fehler: '+err.message); }
}

function triggerUpload(articleId) {
  var inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.multiple=isMassUploadMode();
  inp.onchange=async function() { if(!inp.files||!inp.files.length) return; await uploadPhotos(articleId, Array.from(inp.files)); };
  inp.click();
}

async function uploadPhotos(articleId, files) {
  var prog=document.getElementById('progress-'+articleId);
  if(prog) prog.innerHTML='<div class="progress-bar-wrap"><div class="progress-bar" id="pbar-'+articleId+'" style="width:0%"></div></div><div class="progress-label" id="plabel-'+articleId+'">0/'+files.length+'</div>';
  var errors=0;
  for(var i=0;i<files.length;i++) {
    try { var b64=await new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result.split(',')[1]);};r.onerror=rej;r.readAsDataURL(files[i]);}); var res=await fetch(API+'/api/vk/photo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({article_id:articleId,session_id:sessionData.id,image_base64:b64,content_type:files[i].type||'image/jpeg'})}); if(!res.ok) throw new Error(); } catch(err) { errors++; }
    var pct=Math.round(((i+1)/files.length)*100); var pbar=document.getElementById('pbar-'+articleId); var plabel=document.getElementById('plabel-'+articleId); if(pbar) pbar.style.width=pct+'%'; if(plabel) plabel.textContent=(i+1)+'/'+files.length;
  }
  var r2=await fetch(API+'/api/vk/session/'+sessionToken); sessionData=await r2.json(); render();
  if(errors>0) alert(errors+' Foto(s) konnten nicht hochgeladen werden.');
}

async function deletePhoto(photoId) {
  if(!confirm('Dieses Foto wirklich löschen?')) return;
  try { var res=await fetch(API+'/api/vk/photo/'+photoId,{method:'DELETE'}); if(!res.ok){var d=await res.json();throw new Error(d.error||'Fehler');} var r2=await fetch(API+'/api/vk/session/'+sessionToken); sessionData=await r2.json(); render(); } catch(err) { alert('Fehler: '+err.message); }
}

async function toggleLP(articleId, currentState) { await saveLPBooking(articleId,{lp_booked:!currentState}); var r=await fetch(API+'/api/vk/session/'+sessionToken); sessionData=await r.json(); render(); }
async function saveLPBooking(articleId, updates) { if(sessionData&&sessionData.articles) sessionData.articles.forEach(function(a){if(a.id===articleId) Object.assign(a,updates);}); try { await fetch(API+'/api/vk/article/'+articleId+'/notes',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(updates)}); } catch(e) {} }

async function validateCoupon() {
  var input=document.getElementById('coupon-input'); var msg=document.getElementById('coupon-msg'); var btn=document.getElementById('btn-coupon');
  if(!input||!msg) return; var code=input.value.trim().toUpperCase(); if(!code) return;
  btn.disabled=true; btn.textContent='...'; msg.textContent='';
  try { var res=await fetch(API+'/api/vk/coupon/validate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:code,token:sessionToken})}); var data=await res.json(); if(!res.ok||!data.coupon){msg.className='coupon-msg coupon-err';msg.textContent=data.error||'Ungültiger Code';btn.disabled=false;btn.textContent='Einlösen';return;} couponApplied={code:code,discount:data.coupon.discount,is_free:data.coupon.is_free}; msg.className='coupon-msg coupon-ok';msg.textContent='✓ Rabatt: €'+data.coupon.discount.toFixed(2); btn.disabled=false;btn.textContent='✓'; render(); } catch(err) { msg.className='coupon-msg coupon-err';msg.textContent='Fehler: '+err.message;btn.disabled=false;btn.textContent='Einlösen'; }
}

async function startPayment() {
  var btn=document.getElementById('btn-pay'); if(btn){btn.disabled=true;btn.textContent='Wird vorbereitet...';}
  try {
    var articleDays={}, artModes={};
    (sessionData.articles||[]).forEach(function(a){ articleDays[a.id]=getArticleDays(a.id); artModes[a.id]=getArticleMode(a.id); });
    var body={token:sessionToken, ai_mode:selectedMode, article_days:articleDays, article_modes:artModes};
    if(couponApplied) body.coupon_code=couponApplied.code;
    var res=await fetch(API+'/api/vk/checkout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    var data=await res.json(); if(!res.ok||!data.url) throw new Error(data.error||'Checkout fehlgeschlagen');
    window.location.href=data.url;
  } catch(err) { alert('Fehler: '+err.message); if(btn){btn.disabled=false;btn.textContent='Jetzt bezahlen';} }
}

async function redeemBusinessFree() {
  var btn=document.getElementById('btn-pay'); if(btn){btn.disabled=true;btn.textContent='⏳ Wird verarbeitet...';}
  try {
    var artModes={};
    (sessionData.articles||[]).forEach(function(a){ artModes[a.id]=getArticleMode(a.id); });
    var res=await fetch(API+'/api/vk/business-free',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:sessionToken,ai_mode:selectedMode,article_modes:artModes})});
    var data=await res.json(); if(!res.ok) throw new Error(data.error||'Fehler');
    window.location.href='ergebnis.html?s='+sessionToken;
  } catch(err) { alert('Fehler: '+err.message); if(btn){btn.disabled=false;btn.textContent='Kostenlos einlösen';} }
}

function escHtml(str) { if(!str) return ''; return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(str) { if(!str) return ''; return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function showError(msg) { document.getElementById('app').innerHTML = '<div class="card"><div class="error-box">&#9888; ' + msg + '</div></div>'; }
</script>
