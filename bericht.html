<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verkaufsreport</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; }

  .header { background: #2d7a4f; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 1.2rem; font-weight: 600; }
  .header .logo { font-size: 1.5rem; }

  .container { max-width: 600px; margin: 0 auto; padding: 20px 16px; }

  .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .card-title { font-size: .85rem; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 14px; }

  .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: .8rem; font-weight: 600; }
  .status-open      { background: #fef3c7; color: #92400e; }
  .status-paid      { background: #dbeafe; color: #1e40af; }
  .status-analyzing { background: #ede9fe; color: #5b21b6; }
  .status-done      { background: #d1fae5; color: #065f46; }
  .status-error     { background: #fee2e2; color: #991b1b; }

  /* ── ARTIKEL CARD ── */
  .article-card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px; margin-bottom: 12px; }

  /* Editierbarer Titel */
  .article-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .article-title-input {
    font-weight: 600; color: #1f2937; font-size: .95rem;
    border: 1.5px solid transparent; border-radius: 6px;
    padding: 4px 8px; flex: 1; background: transparent;
    font-family: inherit; transition: border-color .2s;
  }
  .article-title-input:hover { border-color: #d1d5db; background: #f9fafb; }
  .article-title-input:focus { outline: none; border-color: #2d7a4f; background: #f0fdf4; }

  /* Erklärungsbox */
  .hint-box {
    background: #f0fdf4; border: 1.5px solid #86efac; border-radius: 8px;
    padding: 12px 14px; margin-bottom: 14px; font-size: .82rem; color: #15803d;
    line-height: 1.5;
  }
  .hint-box strong { display: block; margin-bottom: 4px; font-size: .85rem; }

  /* Fotos */
  .photo-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .photo-wrap { position: relative; width: 72px; height: 72px; }
  .photo-thumb { width: 72px; height: 72px; border-radius: 8px; object-fit: cover; border: 1px solid #e5e7eb; display: block; }
  .photo-delete {
    position: absolute; top: -6px; right: -6px;
    width: 20px; height: 20px; border-radius: 50%;
    background: #ef4444; color: white; border: 2px solid white;
    font-size: 11px; cursor: pointer; font-weight: 700;
    box-shadow: 0 1px 4px rgba(0,0,0,.2);
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .photo-delete:hover { background: #dc2626; }
  .photo-add {
    width: 72px; height: 72px; border-radius: 8px;
    border: 2px dashed #d1d5db;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; color: #9ca3af; font-size: .7rem; text-align: center;
    background: #f9fafb; transition: border-color .2s; user-select: none;
  }
  .photo-add:hover { border-color: #2d7a4f; color: #2d7a4f; }
  .photo-add span { font-size: 1.5rem; line-height: 1; }

  /* Upload Fortschritt */
  .upload-progress { margin-top: 8px; }
  .progress-bar-wrap { background: #f3f4f6; border-radius: 6px; height: 6px; overflow: hidden; margin-bottom: 4px; }
  .progress-bar { height: 6px; background: #2d7a4f; border-radius: 6px; transition: width .2s; }
  .progress-label { font-size: .75rem; color: #6b7280; }

  /* Infofelder */
  .info-fields { margin-top: 10px; }
  .info-field-label { font-size: .75rem; font-weight: 600; color: #9ca3af; margin-bottom: 4px; }
  .info-field-textarea {
    width: 100%; border: 1.5px solid #e5e7eb; border-radius: 8px;
    padding: 10px 12px; font-size: .85rem; font-family: inherit;
    resize: vertical; min-height: 70px; color: #1f2937;
    transition: border-color .2s;
  }
  .info-field-textarea:focus { outline: none; border-color: #2d7a4f; }
  .info-field-textarea::placeholder { color: #d1d5db; }

  .article-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .article-meta { font-size: .8rem; color: #9ca3af; }
  .btn-delete-article {
    background: none; border: 1px solid #fecaca; color: #ef4444;
    border-radius: 6px; padding: 4px 10px; font-size: .75rem;
    cursor: pointer; font-family: inherit; transition: all .15s;
  }
  .btn-delete-article:hover { background: #fee2e2; }

  /* Neue Position Button */
  .btn-add-position {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 14px; border: 2px dashed #86efac;
    border-radius: 10px; background: #f0fdf4; color: #15803d;
    font-size: .92rem; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: all .2s; margin-bottom: 4px;
  }
  .btn-add-position:hover { background: #dcfce7; border-color: #2d7a4f; }
  .btn-add-position:disabled { opacity: .5; cursor: not-allowed; }

  /* Preis & Zahlung */
  .price-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f3f4f6; font-size: .9rem; }
  .price-row:last-child { border-bottom: none; }
  .price-total { font-size: 1.2rem; font-weight: 700; color: #2d7a4f; }

  .coupon-row { display: flex; gap: 8px; margin-top: 12px; }
  .coupon-row input { flex: 1; padding: 10px 14px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: .9rem; text-transform: uppercase; }
  .coupon-row input::placeholder { text-transform: none; }
  .coupon-row input:focus { outline: none; border-color: #2d7a4f; }
  .btn-coupon { padding: 10px 18px; background: #f3f4f6; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: .85rem; white-space: nowrap; }
  .btn-coupon:hover { background: #e5e7eb; }
  .coupon-msg { font-size: .82rem; margin-top: 6px; }
  .coupon-ok  { color: #065f46; }
  .coupon-err { color: #991b1b; }

  .btn-pay { display: block; width: 100%; padding: 16px; background: #2d7a4f; color: white; border: none; border-radius: 10px; font-size: 1.05rem; font-weight: 700; cursor: pointer; text-align: center; margin-top: 16px; transition: background .2s; }
  .btn-pay:hover { background: #245f3d; }
  .btn-pay:disabled { background: #9ca3af; cursor: not-allowed; }
  .btn-free { background: #059669; }
  .btn-free:hover { background: #047857; }

  .spinner { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 16px; color: #6b7280; }
  .spinner-ring { width: 40px; height: 40px; border: 3px solid #e5e7eb; border-top-color: #2d7a4f; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box { background: #fee2e2; border-left: 4px solid #dc2626; border-radius: 8px; padding: 16px; color: #991b1b; }
  .info-row { display: flex; justify-content: space-between; font-size: .88rem; color: #4b5563; padding: 4px 0; }
  .info-label { color: #9ca3af; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🔍</div>
  <h1>Verkaufsreport</h1>
</div>

<div class="container" id="app">
  <div class="spinner">
    <div class="spinner-ring"></div>
    <div>Lade deinen Auftrag...</div>
  </div>
</div>

<script>
const API = 'https://converto-server-production.up.railway.app';
let sessionToken = null;
let sessionData  = null;
let couponApplied = null;
let businessDiscount = null;
// Zwischenspeicher für Notizen (wird beim Tippen gespeichert)
const notesCache = {};

(function init() {
  const params = new URLSearchParams(window.location.search);
  sessionToken = params.get('s');
  if (!sessionToken) { showError('Kein Auftrag gefunden. Bitte den Link aus WhatsApp verwenden.'); return; }
  loadSession();
})();

async function loadSession() {
  try {
    const res = await fetch(API + '/api/vk/session/' + sessionToken);
    if (!res.ok) throw new Error('Session nicht gefunden (Status ' + res.status + ')');
    sessionData = await res.json();
    const params = new URLSearchParams(window.location.search);
    if (params.get('paid') === '1' && sessionData.status === 'open') { showAnalyzing(); pollStatus(); return; }
    // Business-Rabatt laden
    try {
      const dr = await fetch(API + '/api/vk/session/' + sessionToken + '/discount');
      const dd = await dr.json();
      if (dd.has_discount) { businessDiscount = dd; }
    } catch(e) {}
    render();
  } catch (err) { showError('Fehler beim Laden: ' + err.message); }
}

function showAnalyzing() {
  document.getElementById('app').innerHTML = [
    '<div class="card" style="text-align:center;padding:40px 20px;">',
    '  <div class="spinner-ring" style="margin:0 auto 16px;"></div>',
    '  <div style="font-size:1.1rem;font-weight:600;color:#2d7a4f;margin-bottom:8px;">✅ Zahlung erhalten!</div>',
    '  <div style="color:#6b7280;">Dein Verkaufsreport wird analysiert...<br>Diese Seite aktualisiert sich automatisch.</div>',
    '</div>'
  ].join('');
}

async function pollStatus() {
  try { await fetch(API + '/api/vk/check-payment', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: sessionToken }) }); } catch(e) {}
  var attempts = 0;
  var interval = setInterval(async function() {
    attempts++;
    try {
      var res = await fetch(API + '/api/vk/session/' + sessionToken);
      var data = await res.json();
      if (data.status === 'analyzing' || data.status === 'done') { clearInterval(interval); window.location.href = 'ergebnis.html?s=' + sessionToken; }
    } catch(e) {}
    if (attempts >= 60) { clearInterval(interval); showError('Analyse dauert länger. Direkt aufrufen: ergebnis.html?s=' + sessionToken); }
  }, 5000);
}

function render() {
  const s = sessionData;
  if (!s) return;
  if (s.status === 'done' || s.status === 'analyzing') { window.location.href = 'ergebnis.html?s=' + sessionToken; return; }
  const price = calcPrice(s.articles || []);
  document.getElementById('app').innerHTML = buildHTML(s, price);
  attachEvents();
}

function getBusinessBanner() {
  if (!businessDiscount || !businessDiscount.has_discount) return '';
  return '<div style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:12px 16px;margin-bottom:12px;font-size:.88rem;color:#15803d;font-weight:700;">' +
    '🏢 Firmenrabatt aktiv: ' + businessDiscount.percent + '% Rabatt' +
    (businessDiscount.company ? ' für ' + businessDiscount.company : '') +
    ' – wird automatisch angewendet</div>';
}

function buildHTML(s, price) {
  const articles = s.articles || [];
  return [
    // Business-Rabatt Banner
    businessDiscount && businessDiscount.has_discount ? '<div style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px;font-size:.88rem;color:#15803d;font-weight:700;">🏢 Firmenrabatt aktiv: <strong>' + businessDiscount.percent + '% Rabatt</strong>' + (businessDiscount.company ? ' für ' + businessDiscount.company : '') + ' – wird automatisch angewendet</div>' : '',
    '<div class="card">',
    '  <div class="card-title">Dein Auftrag</div>',
    '  <div class="info-row"><span class="info-label">Status</span><span class="status-badge status-' + s.status + '">' + labelStatus(s.status) + '</span></div>',
    '  <div class="info-row"><span class="info-label">Telefon</span><span>+' + (s.phone || '') + '</span></div>',
    '  <div class="info-row"><span class="info-label">Positionen</span><span>' + articles.length + ' Artikel</span></div>',
    '</div>',

    '<div class="card">',
    '  <div class="card-title">Artikel & Fotos</div>',

    // Erklärungstext über dem ersten Artikel
    '  <div class="hint-box">',
    '    <strong>📸 So bekommst du das beste Ergebnis:</strong>',
    '    Fotografiere jeden Artikel aus verschiedenen Perspektiven: Vorderseite, Rückseite, Seiten, Details.',
    '    Zeige Typenschilder, Beschriftungen, Seriennummern und Altersangaben. Bei Fahrzeugen den Tachostand.',
    '    Je mehr Infos die KI sieht, desto besser der Verkaufstext.',
    '  </div>',

    articles.map(buildArticleHTML).join(''),

    // Neue Position Button
    '  <button class="btn-add-position" id="btn-add-pos" onclick="addPosition()">',
    '    <span style="font-size:1.3rem;">+</span> Neue Position hinzufügen',
    '  </button>',
    '</div>',

    '<div class="card">',
    '  <div class="card-title">Zusammenfassung</div>',
    buildPriceRows(articles, price),
    '  <div id="coupon-section">' + (businessDiscount && businessDiscount.has_discount ? '' : buildCouponSection()) + '</div>',
    '  <button class="btn-pay" id="btn-pay" onclick="startPayment()">💳 Jetzt bezahlen &nbsp;€' + price.toFixed(2) + '</button>',
    '</div>',
  ].join('\n');
}

function buildArticleHTML(a, idx) {
  const photos = a.vk_photos || [];
  const canAdd = photos.length < 4;

  const photoHTML = photos.map(function(p) {
    return [
      '<div class="photo-wrap">',
      '  <img class="photo-thumb" src="' + p.public_url + '" alt="Foto">',
      '  <div class="photo-delete" onclick="deletePhoto(\'' + p.id + '\')" title="Foto löschen">✕</div>',
      '</div>'
    ].join('');
  }).join('');

  const addBtn = canAdd
    ? '<div class="photo-add" onclick="triggerUpload(\'' + a.id + '\', ' + photos.length + ')"><span>+</span>' + (photos.length === 0 ? 'Fotos' : 'Mehr') + '</div>'
    : '';

  // Gespeicherte Notizen aus Cache oder aus DB
  const notes = notesCache[a.id] !== undefined ? notesCache[a.id] : (a.notes || '');

  return [
    '<div class="article-card" id="article-' + a.id + '">',

    // Editierbarer Titel
    '  <div class="article-title-row">',
    '    <span style="font-size:.85rem;color:#9ca3af;font-weight:700;">#' + (idx + 1) + '</span>',
    '    <input class="article-title-input" type="text" value="' + escAttr(a.title || 'Artikel ' + (idx + 1)) + '"',
    '      onblur="saveTitle(\'' + a.id + '\', this.value)"',
    '      onkeydown="if(event.key===\'Enter\')this.blur()"',
    '      placeholder="Artikelbezeichnung..." />',
    '  </div>',

    // Fotos
    '  <div class="photo-row" id="photos-' + a.id + '">',
    photoHTML,
    addBtn,
    '  </div>',
    '  <div id="progress-' + a.id + '"></div>',

    // Infofelder
    '  <div class="info-fields">',
    '    <div class="info-field-label">ℹ️ Zusatzinfos für die KI (optional)</div>',
    '    <textarea class="info-field-textarea"',
    '      id="notes-' + a.id + '"',
    '      placeholder="z.B. Größe M, Zustand sehr gut, Baujahr 2019, 45.000 km, Originalverpackung vorhanden..."',
    '      onblur="saveNotes(\'' + a.id + '\', this.value)"',
    '      oninput="notesCache[\'' + a.id + '\']=this.value">' + escHtml(notes) + '</textarea>',
    '  </div>',

    // Footer
    '  <div class="article-footer">',
    '    <div class="article-meta">' + photos.length + ' von 4 Fotos · ' + (a.extended ? '7 Tage' : '3 Tage') + ' Aufbewahrung</div>',
    '    <button class="btn-delete-article" onclick="deleteArticle(\'' + a.id + '\')">🗑 Löschen</button>',
    '  </div>',

    '</div>',
  ].join('\n');
}

function buildPriceRows(articles, total) {
  const rows = ['<div class="price-row"><span>Grundpreis</span><span>€1.00</span></div>'];
  articles.forEach(function(a) {
    var photoCount = (a.vk_photos || []).length;
    if (photoCount > 0) {
      rows.push('<div class="price-row"><span>' + escHtml(a.title || 'Artikel') + ' – 1. Foto</span><span>€1.00</span></div>');
      var extra = photoCount - 1;
      if (extra > 0) rows.push('<div class="price-row"><span>&nbsp;&nbsp;+ ' + extra + ' weitere Foto' + (extra>1?'s':'') + '</span><span>€' + (extra * 0.25).toFixed(2) + '</span></div>');
    } else {
      rows.push('<div class="price-row" style="color:#9ca3af;"><span>' + escHtml(a.title || 'Artikel') + ' – noch kein Foto</span><span>€0.00</span></div>');
    }
    if (a.extended) rows.push('<div class="price-row"><span>&nbsp;&nbsp;+ Verlängert (7 Tage)</span><span>€1.00</span></div>');
  });
  if (businessDiscount && businessDiscount.has_discount) {
    var bizDisc = Math.round(total * businessDiscount.percent / 100 * 100) / 100;
    rows.push('<div class="price-row" style="color:#059669;"><span>🏢 Firmenrabatt (' + businessDiscount.percent + '%)</span><span>-€' + bizDisc.toFixed(2) + '</span></div>');
    var finalTotal = Math.max(0.50, total - bizDisc);
    rows.push('<div class="price-row"><span style="font-weight:700;">Gesamt</span><span class="price-total">€' + finalTotal.toFixed(2) + '</span></div>');
    return rows.join('\n');
  }
  if (couponApplied && couponApplied.discount > 0) {
    rows.push('<div class="price-row" style="color:#059669;"><span>🎟️ Gutschein (' + couponApplied.code + ')</span><span>-€' + couponApplied.discount.toFixed(2) + '</span></div>');
  }
  const finalTotal = couponApplied ? Math.max(0, total - (couponApplied.discount || 0)) : total;
  rows.push('<div class="price-row"><span style="font-weight:700;">Gesamt</span><span class="price-total">€' + finalTotal.toFixed(2) + '</span></div>');
  return rows.join('\n');
}

function buildCouponSection() {
  return [
    '<div class="coupon-row">',
    '  <input type="text" id="coupon-input" placeholder="Gutschein-Code" maxlength="20">',
    '  <button class="btn-coupon" id="btn-coupon" onclick="validateCoupon()">Einlösen</button>',
    '</div>',
    '<div class="coupon-msg" id="coupon-msg"></div>',
  ].join('\n');
}

function calcPrice(articles) {
  var total = 1.00; // Grundpreis
  articles.forEach(function(a) {
    var photos = (a.vk_photos || []).length;
    if (photos > 0) {
      total += 1.00;                     // 1. Foto = 1€
      total += Math.max(0, photos-1) * 0.25; // weitere Fotos 0.25€
    }
    if (a.extended) total += 1.00;
  });
  return Math.round(total * 100) / 100;
}

function labelStatus(s) {
  return { open: 'Offen', paid: 'Bezahlt', analyzing: 'In Analyse', done: 'Fertig', error: 'Fehler', expired: 'Abgelaufen' }[s] || s;
}

function attachEvents() {
  var input = document.getElementById('coupon-input');
  if (input) {
    input.addEventListener('keydown', function(e) { if (e.key === 'Enter') validateCoupon(); });
    input.addEventListener('input', function() { this.value = this.value.toUpperCase(); });
  }
}

// ── NEUE POSITION ─────────────────────────────────────────────
async function addPosition() {
  var btn = document.getElementById('btn-add-pos');
  if (btn) { btn.disabled = true; btn.textContent = 'Wird angelegt...'; }
  try {
    var res = await fetch(API + '/api/vk/article', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: sessionToken, title: 'Neuer Artikel' })
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Fehler');
    // Session neu laden
    var r2 = await fetch(API + '/api/vk/session/' + sessionToken);
    sessionData = await r2.json();
    render();
    // Zum neuen Artikel scrollen
    setTimeout(function() {
      var el = document.getElementById('article-' + data.article.id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  } catch (err) {
    alert('Fehler: ' + err.message);
    if (btn) { btn.disabled = false; btn.innerHTML = '<span style="font-size:1.3rem;">+</span> Neue Position hinzufügen'; }
  }
}

// ── ARTIKEL TITEL SPEICHERN ───────────────────────────────────
async function saveTitle(articleId, newTitle) {
  var title = newTitle.trim();
  if (!title) return;
  try {
    await fetch(API + '/api/vk/article/' + articleId + '/notes', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: title })
    });
    // Lokalen State updaten ohne neu zu laden
    if (sessionData && sessionData.articles) {
      sessionData.articles.forEach(function(a) { if (a.id === articleId) a.title = title; });
    }
  } catch(e) { console.error('Titel speichern:', e.message); }
}

// ── NOTIZEN SPEICHERN ─────────────────────────────────────────
async function saveNotes(articleId, notes) {
  notesCache[articleId] = notes;
  try {
    await fetch(API + '/api/vk/article/' + articleId + '/notes', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ notes: notes })
    });
  } catch(e) { console.error('Notizen speichern:', e.message); }
}

// ── ARTIKEL LÖSCHEN ───────────────────────────────────────────
async function deleteArticle(articleId) {
  if (!confirm('Diese Position wirklich löschen?')) return;
  try {
    var res = await fetch(API + '/api/vk/article/' + articleId, { method: 'DELETE' });
    if (!res.ok) { var d = await res.json(); throw new Error(d.error || 'Fehler'); }
    var r2 = await fetch(API + '/api/vk/session/' + sessionToken);
    sessionData = await r2.json();
    render();
  } catch (err) { alert('Fehler: ' + err.message); }
}

// ── MULTI FOTO UPLOAD ─────────────────────────────────────────
function triggerUpload(articleId, currentCount) {
  var remaining = 4 - currentCount;
  if (remaining <= 0) { alert('Maximal 4 Fotos pro Artikel erreicht.'); return; }
  var inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*'; inp.multiple = true;
  inp.onchange = async function() {
    if (!inp.files || inp.files.length === 0) return;
    var files = Array.from(inp.files).slice(0, remaining);
    if (inp.files.length > remaining) alert('Nur noch ' + remaining + ' Foto(s) möglich. Es werden die ersten ' + remaining + ' hochgeladen.');
    await uploadPhotos(articleId, files);
  };
  inp.click();
}

async function uploadPhotos(articleId, files) {
  var progressEl = document.getElementById('progress-' + articleId);
  if (progressEl) {
    progressEl.innerHTML = '<div class="upload-progress"><div class="progress-bar-wrap"><div class="progress-bar" id="pbar-' + articleId + '" style="width:0%"></div></div><div class="progress-label" id="plabel-' + articleId + '">0 / ' + files.length + ' hochgeladen</div></div>';
  }
  var errors = 0;
  for (var i = 0; i < files.length; i++) {
    try {
      var base64 = await new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onload = function() { resolve(reader.result.split(',')[1]); };
        reader.onerror = reject;
        reader.readAsDataURL(files[i]);
      });
      var res = await fetch(API + '/api/vk/photo', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ article_id: articleId, session_id: sessionData.id, image_base64: base64, content_type: files[i].type || 'image/jpeg' })
      });
      var data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Upload fehlgeschlagen');
    } catch (err) { errors++; console.error('Upload Fehler:', err.message); }
    var pct = Math.round(((i + 1) / files.length) * 100);
    var pbar = document.getElementById('pbar-' + articleId);
    var plabel = document.getElementById('plabel-' + articleId);
    if (pbar) pbar.style.width = pct + '%';
    if (plabel) plabel.textContent = (i + 1) + ' / ' + files.length + ' hochgeladen';
  }
  var r2 = await fetch(API + '/api/vk/session/' + sessionToken);
  sessionData = await r2.json();
  render();
  if (errors > 0) alert(errors + ' Foto(s) konnten nicht hochgeladen werden.');
}

// ── FOTO LÖSCHEN ──────────────────────────────────────────────
async function deletePhoto(photoId) {
  if (!confirm('Dieses Foto wirklich löschen?')) return;
  try {
    var res = await fetch(API + '/api/vk/photo/' + photoId, { method: 'DELETE' });
    if (!res.ok) { var d = await res.json(); throw new Error(d.error || 'Löschen fehlgeschlagen'); }
    var r2 = await fetch(API + '/api/vk/session/' + sessionToken);
    sessionData = await r2.json();
    render();
  } catch (err) { alert('Fehler beim Löschen: ' + err.message); }
}

// ── COUPON ────────────────────────────────────────────────────
async function validateCoupon() {
  var input = document.getElementById('coupon-input');
  var msg   = document.getElementById('coupon-msg');
  var btn   = document.getElementById('btn-coupon');
  if (!input || !msg) return;
  var code = input.value.trim().toUpperCase();
  if (!code) return;
  btn.disabled = true; btn.textContent = '...'; msg.textContent = '';
  try {
    var res = await fetch(API + '/api/vk/coupon/validate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code: code, token: sessionToken }) });
    var data = await res.json();
    if (!res.ok || !data.coupon) { msg.className = 'coupon-msg coupon-err'; msg.textContent = data.error || 'Ungültiger Code'; btn.disabled = false; btn.textContent = 'Einlösen'; return; }
    couponApplied = { code: code, discount: data.coupon.discount, is_free: data.coupon.is_free };
    msg.className = 'coupon-msg coupon-ok';
    msg.textContent = '✓ Gutschein aktiv – Rabatt: €' + data.coupon.discount.toFixed(2);
    btn.disabled = false; btn.textContent = '✓';
    var price = calcPrice(sessionData.articles || []);
    var card = document.querySelector('.card:last-child');
    if (card) {
      var old = card.querySelector('.card-title');
      if (old) {
        var next = old.nextSibling;
        while (next && next !== document.getElementById('coupon-section')) { var tmp = next.nextSibling; card.removeChild(next); next = tmp; }
        var frag = document.createRange().createContextualFragment(buildPriceRows(sessionData.articles || [], price));
        old.after(frag);
      }
    }
    var btnPay = document.getElementById('btn-pay');
    if (btnPay) {
      var finalPrice = Math.max(0, price - (couponApplied.discount || 0));
      if (finalPrice <= 0) { btnPay.className = 'btn-pay btn-free'; btnPay.textContent = '🎉 Kostenlos einlösen'; btnPay.onclick = redeemFree; }
      else { btnPay.textContent = '💳 Jetzt bezahlen  €' + finalPrice.toFixed(2); }
    }
  } catch (err) { msg.className = 'coupon-msg coupon-err'; msg.textContent = 'Fehler: ' + err.message; btn.disabled = false; btn.textContent = 'Einlösen'; }
}

// ── PAYMENT ───────────────────────────────────────────────────
async function startPayment() {
  var btn = document.getElementById('btn-pay');
  if (btn) { btn.disabled = true; btn.textContent = 'Wird vorbereitet...'; }
  try {
    var body = { token: sessionToken };
    if (couponApplied) body.coupon_code = couponApplied.code;
    var res = await fetch(API + '/api/vk/checkout', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    var data = await res.json();
    if (!res.ok || !data.url) throw new Error(data.error || 'Checkout fehlgeschlagen');
    window.location.href = data.url;
  } catch (err) { alert('Fehler: ' + err.message); if (btn) { btn.disabled = false; btn.textContent = '💳 Jetzt bezahlen'; } }
}

async function redeemFree() {
  var btn = document.getElementById('btn-pay');
  if (btn) { btn.disabled = true; btn.textContent = 'Wird eingelöst...'; }
  try {
    var res = await fetch(API + '/api/vk/coupon/redeem', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code: couponApplied.code, token: sessionToken }) });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Einlösen fehlgeschlagen');
    window.location.href = 'ergebnis.html?s=' + sessionToken;
  } catch (err) { alert('Fehler: ' + err.message); if (btn) { btn.disabled = false; btn.textContent = '🎉 Kostenlos einlösen'; } }
}

// ── HELPERS ───────────────────────────────────────────────────
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function showError(msg) {
  document.getElementById('app').innerHTML = '<div class="card"><div class="error-box">⚠️ ' + msg + '</div></div>';
}
