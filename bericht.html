<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verkaufsreport</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; }

  .header { background: #2d7a4f; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 1.2rem; font-weight: 600; }
  .header .logo { font-size: 1.5rem; }

  .container { max-width: 600px; margin: 0 auto; padding: 20px 16px; }

  .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .card-title { font-size: .85rem; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 14px; }

  .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: .8rem; font-weight: 600; }
  .status-open      { background: #fef3c7; color: #92400e; }
  .status-paid      { background: #dbeafe; color: #1e40af; }
  .status-analyzing { background: #ede9fe; color: #5b21b6; }
  .status-done      { background: #d1fae5; color: #065f46; }
  .status-error     { background: #fee2e2; color: #991b1b; }

  .article-card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
  .article-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .article-title-input { font-weight: 600; color: #1f2937; font-size: .95rem; border: 1.5px solid transparent; border-radius: 6px; padding: 4px 8px; flex: 1; background: transparent; font-family: inherit; transition: border-color .2s; }
  .article-title-input:hover { border-color: #d1d5db; background: #f9fafb; }
  .article-title-input:focus { outline: none; border-color: #2d7a4f; background: #f0fdf4; }

  .hint-box { background: #f0fdf4; border: 1.5px solid #86efac; border-radius: 8px; padding: 12px 14px; margin-bottom: 14px; font-size: .82rem; color: #15803d; line-height: 1.5; }
  .hint-box strong { display: block; margin-bottom: 4px; font-size: .85rem; }

  /* ── BULK UPLOAD ZONE ── */
  .bulk-zone { border: 2.5px dashed #86efac; border-radius: 12px; background: #f0fdf4; padding: 28px 20px; text-align: center; cursor: pointer; margin-bottom: 14px; transition: all .2s; }
  .bulk-zone:hover, .bulk-zone.drag-over { border-color: #2d7a4f; background: #dcfce7; transform: scale(1.01); }
  .bulk-zone-icon { font-size: 2.2rem; margin-bottom: 8px; }
  .bulk-zone-title { font-weight: 800; font-size: .95rem; color: #15803d; margin-bottom: 4px; }
  .bulk-zone-sub { font-size: .78rem; color: #6b7280; }
  .bulk-progress { margin-top: 10px; background: #e5e7eb; border-radius: 6px; height: 6px; overflow: hidden; }
  .bulk-progress-bar { height: 6px; background: #2d7a4f; border-radius: 6px; transition: width .3s; }

  /* ── AUTO GROUP BUTTON ── */
  .btn-autogroup { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 13px; border: 2px solid #7c3aed; border-radius: 10px; background: #faf5ff; color: #7c3aed; font-size: .88rem; font-weight: 800; cursor: pointer; font-family: inherit; transition: all .2s; margin-bottom: 12px; }
  .btn-autogroup:hover { background: #ede9fe; border-color: #6d28d9; }
  .btn-autogroup:disabled { opacity: .5; cursor: not-allowed; }

  .photo-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; min-height: 80px; padding: 4px; border-radius: 10px; transition: background .15s, box-shadow .15s; }
  .photo-row.drag-over { background: #f0fdf4; box-shadow: inset 0 0 0 2.5px #25D366; }
  .photo-wrap { position: relative; width: 72px; height: 72px; cursor: grab; user-select: none; -webkit-user-select: none; touch-action: none; transition: opacity .15s, transform .15s; border-radius: 8px; }
  .photo-wrap:active { cursor: grabbing; }
  .photo-wrap.dragging { opacity: 0.25; transform: scale(0.9); }
  .photo-thumb { width: 72px; height: 72px; border-radius: 8px; object-fit: cover; border: 1px solid #e5e7eb; display: block; pointer-events: none; -webkit-user-drag: none; }
  .photo-delete { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 50%; background: #ef4444; color: white; border: 2px solid white; font-size: 11px; cursor: pointer; font-weight: 700; box-shadow: 0 1px 4px rgba(0,0,0,.2); display: flex; align-items: center; justify-content: center; transition: background .15s; pointer-events: auto !important; z-index: 10; }
  .photo-delete:hover { background: #dc2626; }
  .photo-add { width: 72px; height: 72px; border-radius: 8px; border: 2px dashed #d1d5db; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: #9ca3af; font-size: .7rem; text-align: center; background: #f9fafb; transition: border-color .2s; user-select: none; }
  .photo-add:hover { border-color: #2d7a4f; color: #2d7a4f; }
  .photo-add span { font-size: 1.5rem; line-height: 1; }

  /* Photo count badge */
  .photo-count-badge { display: inline-block; background: #f0fdf4; border: 1px solid #86efac; color: #15803d; font-size: .7rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; margin-left: 6px; }

  #drag-ghost { position: fixed; pointer-events: none; z-index: 9999; width: 72px; height: 72px; border-radius: 10px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,.35); opacity: 0.85; display: none; border: 2px solid #25D366; transform: scale(1.1); }
  #drag-ghost img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .drag-hint-bar { background: #f0fdf4; border: 1.5px solid #86efac; border-radius: 8px; padding: 8px 12px; margin-bottom: 10px; font-size: .78rem; color: #15803d; display: flex; align-items: center; gap: 8px; }

  .upload-progress { margin-top: 8px; }
  .progress-bar-wrap { background: #f3f4f6; border-radius: 6px; height: 6px; overflow: hidden; margin-bottom: 4px; }
  .progress-bar { height: 6px; background: #2d7a4f; border-radius: 6px; transition: width .2s; }
  .progress-label { font-size: .75rem; color: #6b7280; }

  .info-fields { margin-top: 10px; }
  .info-field-label { font-size: .75rem; font-weight: 600; color: #9ca3af; margin-bottom: 4px; }
  .info-field-textarea { width: 100%; border: 1.5px solid #e5e7eb; border-radius: 8px; padding: 10px 12px; font-size: .85rem; font-family: inherit; resize: vertical; min-height: 70px; color: #1f2937; transition: border-color .2s; }
  .info-field-textarea:focus { outline: none; border-color: #2d7a4f; }
  .info-field-textarea::placeholder { color: #d1d5db; }

  .article-footer { display: flex; justify-content: space-between; align-items: flex-start; margin-top: 12px; gap: 10px; }
  .article-meta { font-size: .78rem; color: #9ca3af; font-weight: 600; margin-bottom: 6px; }
  .btn-delete-article { background: none; border: 1px solid #fecaca; color: #ef4444; border-radius: 6px; padding: 4px 10px; font-size: .75rem; cursor: pointer; font-family: inherit; transition: all .15s; flex-shrink: 0; margin-top: 4px; }
  .btn-delete-article:hover { background: #fee2e2; }

  .day-selector { display: flex; gap: 5px; flex-wrap: wrap; }
  .day-btn { padding: 6px 10px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: .75rem; font-weight: 700; cursor: pointer; font-family: inherit; background: #f9fafb; color: #6b7280; transition: all .2s; text-align: center; line-height: 1.3; }
  .day-btn.active { border-color: #2d7a4f; background: #f0fdf4; color: #15803d; }
  .day-btn:hover { border-color: #2d7a4f; color: #2d7a4f; }
  .day-btn .day-cost { font-size: .62rem; font-weight: 600; display: block; color: #9ca3af; }
  .day-btn.active .day-cost { color: #059669; }

  .mode-selector { display: flex; gap: 8px; margin-bottom: 16px; }
  .mode-btn { flex: 1; padding: 11px 6px; border: 2px solid #e5e7eb; border-radius: 10px; background: #f9fafb; cursor: pointer; text-align: center; font-family: inherit; transition: all .2s; }
  .mode-btn:hover { border-color: #86efac; background: #f0fdf4; }
  .mode-btn.active { border-color: #2d7a4f; background: #f0fdf4; }
  .mode-btn .mode-icon { font-size: 1.2rem; display: block; margin-bottom: 3px; }
  .mode-btn .mode-name { font-size: .75rem; font-weight: 800; color: #374151; display: block; }
  .mode-btn.active .mode-name { color: #15803d; }
  .mode-btn .mode-mult { font-size: .68rem; color: #9ca3af; display: block; margin-top: 2px; }
  .mode-btn.active .mode-mult { color: #059669; font-weight: 700; }
  .mode-btn .mode-features { font-size: .62rem; color: #9ca3af; display: block; margin-top: 3px; line-height: 1.4; }
  .mode-btn.active .mode-features { color: #059669; }

  .btn-add-position { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px; border: 2px dashed #86efac; border-radius: 10px; background: #f0fdf4; color: #15803d; font-size: .92rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .2s; margin-bottom: 4px; }
  .btn-add-position:hover { background: #dcfce7; border-color: #2d7a4f; }
  .btn-add-position:disabled { opacity: .5; cursor: not-allowed; }

  .price-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f3f4f6; font-size: .9rem; }
  .price-row:last-child { border-bottom: none; }
  .price-total { font-size: 1.2rem; font-weight: 700; color: #2d7a4f; }
  .price-multiplier { background: #f0fdf4; border: 1.5px solid #86efac; border-radius: 8px; padding: 10px 14px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; font-size: .88rem; }
  .price-multiplier .mult-label { font-weight: 700; color: #15803d; }
  .price-multiplier .mult-val { font-size: 1.1rem; font-weight: 900; color: #15803d; }

  .coupon-row { display: flex; gap: 8px; margin-top: 12px; }
  .coupon-row input { flex: 1; padding: 10px 14px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: .9rem; text-transform: uppercase; }
  .coupon-row input::placeholder { text-transform: none; }
  .coupon-row input:focus { outline: none; border-color: #2d7a4f; }
  .btn-coupon { padding: 10px 18px; background: #f3f4f6; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: .85rem; white-space: nowrap; }
  .btn-coupon:hover { background: #e5e7eb; }
  .coupon-msg { font-size: .82rem; margin-top: 6px; }
  .coupon-ok  { color: #065f46; }
  .coupon-err { color: #991b1b; }

  .btn-pay { display: block; width: 100%; padding: 16px; background: #2d7a4f; color: white; border: none; border-radius: 10px; font-size: 1.05rem; font-weight: 700; cursor: pointer; text-align: center; margin-top: 16px; transition: background .2s; }
  .btn-pay:hover { background: #245f3d; }
  .btn-pay:disabled { background: #9ca3af; cursor: not-allowed; }
  .btn-free { background: #059669; }
  .btn-free:hover { background: #047857; }

  .lp-box{background:#fff;border:2px solid #25D366;border-radius:12px;padding:16px;margin-top:12px;}
  .lp-title{font-size:.85rem;font-weight:800;color:#15803d;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .lp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
  .lp-label{font-size:.72rem;font-weight:800;color:#9ca3af;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
  .lp-input{width:100%;padding:8px 10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:.85rem;font-family:inherit;}
  .lp-input:focus{outline:none;border-color:#25D366;}
  .lp-check-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f0fdf4;border-radius:8px;margin-bottom:6px;cursor:pointer;}
  .lp-price-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid #f3f4f6;font-size:.85rem;}
  .lp-price-val{font-weight:800;color:#15803d;}

  .spinner { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 16px; color: #6b7280; }
  .spinner-ring { width: 40px; height: 40px; border: 3px solid #e5e7eb; border-top-color: #2d7a4f; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box { background: #fee2e2; border-left: 4px solid #dc2626; border-radius: 8px; padding: 16px; color: #991b1b; }
  .info-row { display: flex; justify-content: space-between; font-size: .88rem; color: #4b5563; padding: 4px 0; }
  .info-label { color: #9ca3af; }

  .mode-chip { padding: 3px 8px; border-radius: 20px; border: 1.5px solid #e5e7eb; background: #f9fafb; color: #6b7280; font-size: .68rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .15s; }
  .mode-chip.active-s { border-color: #86efac; background: #f0fdf4; color: #15803d; }
  .mode-chip.active-a { border-color: #bfdbfe; background: #eff6ff; color: #1d4ed8; }
  .mode-chip.active-e { border-color: #e9d5ff; background: #faf5ff; color: #7c3aed; }
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:.85rem;font-weight:700;transition:all .3s;opacity:0;z-index:9998;}
  #toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">🔍</div>
  <h1>Verkaufsreport</h1>
</div>

<div class="container" id="app">
  <div class="spinner">
    <div class="spinner-ring"></div>
    <div>Lade deinen Auftrag...</div>
  </div>
</div>

<div id="toast"></div>
<div id="drag-ghost"><img id="drag-ghost-img" src="" alt=""></div>

<script>
const API = 'https://converto-server-production.up.railway.app';
let sessionToken   = null;
let sessionData    = null;
let couponApplied  = null;
let businessDiscount = null;
const notesCache   = {};
const daysCache    = {};
let selectedMode   = 'sachbearbeiter';
const articleModes = {}; // Modus pro Artikel-ID

function getArticleMode(articleId) { return articleModes[articleId] || selectedMode; }
function getArticleModeMult(articleId) { return MODES[getArticleMode(articleId)]?.mult || 1; }
function setArticleMode(articleId, mode) {
  articleModes[articleId] = mode;
  // LP prüfen: Sachbearbeiter bekommt kein LP
  if (mode === 'sachbearbeiter' && sessionData && sessionData.articles) {
    sessionData.articles.forEach(function(a) {
      if (a.id === articleId && a.lp_booked) { a.lp_booked = false; saveLPBooking(articleId, {lp_booked: false}); }
    });
  }
  render();
}

// ── Modi ─────────────────────────────────────────────────────
const MODES = {
  sachbearbeiter:   { icon: '👤', label: 'Sachbearbeiter',   mult: 1, desc: 'Basis ×1',    features: 'Einzelfoto-Upload' },
  abteilungsleiter: { icon: '📊', label: 'Abteilungsleiter', mult: 2, desc: 'Standard ×2', features: 'Massen-Upload + LP' },
  experte:          { icon: '🎯', label: 'Experte',           mult: 4, desc: 'Premium ×4',  features: 'Massen-Upload + LP + Vollgutachten' }
};

function isMassUploadMode() { return selectedMode === 'abteilungsleiter' || selectedMode === 'experte'; }
function getModeMultiplier() { return MODES[selectedMode]?.mult || 1; }
function setMode(mode) { selectedMode = mode; render(); }

// ── Tage ─────────────────────────────────────────────────────
function getArticleDays(articleId) { return daysCache[articleId] || 3; }
function setDays(articleId, days) { daysCache[articleId] = days; render(); }

// ── Drag State ────────────────────────────────────────────────
let _dragPhotoId = null, _dragSrcId = null;
let _touchPhotoId = null, _touchSrcId = null;
let _touchActive = false, _lastDropZone = null;

(function init() {
  const params = new URLSearchParams(window.location.search);
  sessionToken = params.get('s');
  if (!sessionToken) { showError('Kein Auftrag gefunden. Bitte den Link aus WhatsApp verwenden.'); return; }
  loadSession();
})();

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

async function loadSession() {
  try {
    const res = await fetch(API + '/api/vk/session/' + sessionToken);
    if (!res.ok) throw new Error('Session nicht gefunden (Status ' + res.status + ')');
    sessionData = await res.json();
    const params = new URLSearchParams(window.location.search);
    if (params.get('paid') === '1' && sessionData.status === 'open') { showAnalyzing(); pollStatus(); return; }
    try {
      const dr = await fetch(API + '/api/vk/session/' + sessionToken + '/discount');
      const dd = await dr.json();
      if (dd.has_discount) { businessDiscount = dd; }
    } catch(e) {}
    if (sessionData.ai_mode && MODES[sessionData.ai_mode]) {
      selectedMode = sessionData.ai_mode;
    }
    render();
  } catch (err) { showError('Fehler beim Laden: ' + err.message); }
}

function showAnalyzing() {
  document.getElementById('app').innerHTML = [
    '<div class="card" style="text-align:center;padding:40px 20px;">',
    '  <div class="spinner-ring" style="margin:0 auto 16px;"></div>',
    '  <div style="font-size:1.1rem;font-weight:600;color:#2d7a4f;margin-bottom:8px;">✅ Zahlung erhalten!</div>',
    '  <div style="color:#6b7280;">Dein Verkaufsreport wird analysiert...<br>Diese Seite aktualisiert sich automatisch.</div>',
    '</div>'
  ].join('');
}

async function pollStatus() {
  try { await fetch(API + '/api/vk/check-payment', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: sessionToken }) }); } catch(e) {}
  var attempts = 0;
  var interval = setInterval(async function() {
    attempts++;
    try {
      var res = await fetch(API + '/api/vk/session/' + sessionToken);
      var data = await res.json();
      if (data.status === 'analyzing' || data.status === 'done') { clearInterval(interval); window.location.href = 'ergebnis.html?s=' + sessionToken; }
    } catch(e) {}
    if (attempts >= 60) { clearInterval(interval); showError('Analyse dauert länger. Direkt aufrufen: ergebnis.html?s=' + sessionToken); }
  }, 5000);
}

function render() {
  const s = sessionData;
  if (!s) return;
  if (s.status === 'done' || s.status === 'analyzing') { window.location.href = 'ergebnis.html?s=' + sessionToken; return; }
  const price = calcPrice(s.articles || []);
  document.getElementById('app').innerHTML = buildHTML(s, price);
  attachEvents();
  setupDragDrop();
  setupBulkZone();
}

function getDisplayPrice(price) {
  if (businessDiscount && businessDiscount.has_discount) {
    var disc = Math.round(price * businessDiscount.percent / 100 * 100) / 100;
    if (businessDiscount.percent >= 100) return 0;
    return Math.max(0.50, price - disc);
  }
  return price;
}

function buildPayButton(price) {
  if (businessDiscount && businessDiscount.percent >= 100) {
    return '<button class="btn-pay" id="btn-pay" onclick="redeemBusinessFree()">🎉 Kostenlos einlösen (Firmenrabatt)</button>';
  }
  var displayPrice = getDisplayPrice(price);
  return '<button class="btn-pay" id="btn-pay" onclick="startPayment()">💳 Jetzt bezahlen  €' + displayPrice.toFixed(2) + '</button>';
}

function buildModeSelector() {
  return '<div class="card-title">Analysemodus</div>' +
    '<div class="mode-selector">' +
    Object.keys(MODES).map(function(key) {
      var m = MODES[key];
      var active = selectedMode === key;
      return '<button class="mode-btn' + (active?' active':'') + '" onclick="setMode(\'' + key + '\')">' +
        '<span class="mode-icon">' + m.icon + '</span>' +
        '<span class="mode-name">' + m.label + '</span>' +
        '<span class="mode-mult">' + m.desc + '</span>' +
        '<span class="mode-features">' + m.features + '</span>' +
        '</button>';
    }).join('') +
    '</div>';
}

// ── Bulk Upload Zone (nur für Abt/Experte) ───────────────────
function buildBulkZone(totalPhotos) {
  if (!isMassUploadMode()) return '';
  return [
    '<div class="bulk-zone" id="bulk-zone" onclick="triggerBulkUpload()" ',
    '  ondragover="event.preventDefault();document.getElementById(\'bulk-zone\').classList.add(\'drag-over\')" ',
    '  ondragleave="document.getElementById(\'bulk-zone\').classList.remove(\'drag-over\')" ',
    '  ondrop="handleBulkDrop(event)">',
    '  <div class="bulk-zone-icon">📸</div>',
    '  <div class="bulk-zone-title">Alle Fotos hier ablegen oder antippen</div>',
    '  <div class="bulk-zone-sub">Beliebig viele Fotos auf einmal — KI gruppiert automatisch in Artikel</div>',
    totalPhotos > 0 ? '<div style="margin-top:8px;font-size:.78rem;font-weight:700;color:#15803d;">✅ ' + totalPhotos + ' Foto(s) bereits hochgeladen</div>' : '',
    '  <div id="bulk-progress-wrap" style="display:none;margin-top:10px;">',
    '    <div class="bulk-progress"><div class="bulk-progress-bar" id="bulk-progress-bar" style="width:0%"></div></div>',
    '    <div id="bulk-progress-label" style="font-size:.75rem;color:#6b7280;margin-top:4px;text-align:center;"></div>',
    '  </div>',
    '</div>',
    totalPhotos > 0 ? '<button class="btn-autogroup" id="btn-autogroup" onclick="autoGroupPhotos()">🤖 Fotos automatisch gruppieren</button>' : ''
  ].join('');
}

function buildHTML(s, price) {
  const articles = s.articles || [];
  const multiArticle = articles.length > 1;
  const totalPhotos = articles.reduce(function(sum, a) { return sum + (a.vk_photos || []).length; }, 0);

  return [

  var inp = document.createElement('input');

function handleBulkDrop(event) {
  event.preventDefault();
  document.getElementById('bulk-zone').classList.remove('drag-over');
  var files = Array.from(event.dataTransfer.files).filter(function(f) { return f.type.startsWith('image/'); });
  if (!files.length) { showToast('❌ Nur Bilder erlaubt'); return; }
  handleBulkFiles(files);
}

async function handleBulkFiles(files) {
  showToast('⏳ ' + files.length + ' Fotos werden hochgeladen...');

  var wrap = document.getElementById('bulk-progress-wrap');
  var bar = document.getElementById('bulk-progress-bar');
  var label = document.getElementById('bulk-progress-label');
  if (wrap) wrap.style.display = 'block';

  // Sicherstellen dass mindestens 1 Artikel existiert
  var articles = sessionData.articles || [];
  if (!articles.length) {
    var btn = document.getElementById('btn-add-pos');
    if (btn) { btn.disabled = true; }
    try {
      var res = await fetch(API + '/api/vk/article', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: sessionToken, title: 'Artikel 1' }) });
      var r2 = await fetch(API + '/api/vk/session/' + sessionToken);
      sessionData = await r2.json();
      articles = sessionData.articles || [];
    } catch(e) { showToast('❌ Fehler beim Erstellen: ' + e.message); return; }
  }

  var targetArticleId = articles[0].id;
  var errors = 0;

  for (var i = 0; i < files.length; i++) {
    try {
      var base64 = await new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onload = function() { resolve(reader.result.split(',')[1]); };
        reader.onerror = reject;
        reader.readAsDataURL(files[i]);
      });
      var uploadRes = await fetch(API + '/api/vk/photo', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ article_id: targetArticleId, session_id: sessionData.id, image_base64: base64, content_type: files[i].type || 'image/jpeg' })
      });
      if (!uploadRes.ok) throw new Error('Upload fehlgeschlagen');
    } catch(e) { errors++; }

    var pct = Math.round(((i + 1) / files.length) * 100);
    if (bar) bar.style.width = pct + '%';
    if (label) label.textContent = (i + 1) + ' / ' + files.length + ' hochgeladen' + (errors > 0 ? ' (' + errors + ' Fehler)' : '');
  }

  var r3 = await fetch(API + '/api/vk/session/' + sessionToken);
  sessionData = await r3.json();
  render();

  if (errors > 0) {
    showToast('⚠️ ' + (files.length - errors) + '/' + files.length + ' Fotos hochgeladen');
  } else {
    showToast('✅ ' + files.length + ' Fotos hochgeladen! KI-Gruppierung starten?');
  }
}

// ── Drag & Drop (zwischen Artikeln) ──────────────────────────
function setupDragDrop() {
  var ghost = document.getElementById('drag-ghost');
  var ghostImg = document.getElementById('drag-ghost-img');

  document.querySelectorAll('.photo-wrap').forEach(function(wrap) {
    wrap.addEventListener('dragstart', function(e) {
      _dragPhotoId = wrap.getAttribute('data-pid'); _dragSrcId = wrap.getAttribute('data-sid');
      e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', _dragPhotoId);
      setTimeout(function(){ wrap.classList.add('dragging'); }, 0);
    });
    wrap.addEventListener('dragend', function() {
      wrap.classList.remove('dragging');
      document.querySelectorAll('.photo-row').forEach(function(z){ z.classList.remove('drag-over'); });
      _dragPhotoId = null; _dragSrcId = null;
    });
  });

  document.querySelectorAll('.photo-row').forEach(function(zone) {
    zone.addEventListener('dragover', function(e) {
      if (!_dragPhotoId) return; e.preventDefault(); e.dataTransfer.dropEffect = 'move'; zone.classList.add('drag-over');
    });
    zone.addEventListener('dragleave', function(e) {
      if (e.relatedTarget && zone.contains(e.relatedTarget)) return; zone.classList.remove('drag-over');
    });
    zone.addEventListener('drop', function(e) {
      e.preventDefault(); zone.classList.remove('drag-over');
      var targetId = zone.getAttribute('data-zid');
      if (!_dragPhotoId || !targetId || targetId === _dragSrcId) return;
      movePhoto(_dragPhotoId, targetId, _dragSrcId);
    });
  });

  document.querySelectorAll('.photo-wrap').forEach(function(wrap) {
    wrap.addEventListener('touchstart', function(e) {
      if (e.target.closest('.photo-delete')) return;
      if (e.touches.length !== 1) return;
      _touchPhotoId = wrap.getAttribute('data-pid'); _touchSrcId = wrap.getAttribute('data-sid');
      _touchActive = false;
      var img = wrap.querySelector('img'); if (img) ghostImg.src = img.src;
      ghost.style.display = 'none';
    }, { passive: true });

    wrap.addEventListener('touchmove', function(e) {
      if (!_touchPhotoId || wrap.getAttribute('data-pid') !== _touchPhotoId) return;
      if (e.touches.length !== 1) return;
      var touch = e.touches[0];
      if (!_touchActive) { _touchActive = true; wrap.classList.add('dragging'); ghost.style.display = 'block'; document.body.style.overflow = 'hidden'; }
      e.preventDefault();
      ghost.style.left = (touch.clientX - 36) + 'px'; ghost.style.top = (touch.clientY - 50) + 'px';
      ghost.style.display = 'none';
      var el = document.elementFromPoint(touch.clientX, touch.clientY);
      ghost.style.display = 'block';
      var zone = el ? el.closest('.photo-row') : null;
      if (_lastDropZone && _lastDropZone !== zone) _lastDropZone.classList.remove('drag-over');
      if (zone && zone.getAttribute('data-zid') !== _touchSrcId) { zone.classList.add('drag-over'); _lastDropZone = zone; }
      else _lastDropZone = null;
    }, { passive: false });

    wrap.addEventListener('touchend', function(e) {
      if (!_touchPhotoId || wrap.getAttribute('data-pid') !== _touchPhotoId) return;
      ghost.style.display = 'none'; wrap.classList.remove('dragging'); document.body.style.overflow = '';
      if (_lastDropZone) _lastDropZone.classList.remove('drag-over');
      if (!_touchActive) { _touchPhotoId = null; _touchSrcId = null; _touchActive = false; _lastDropZone = null; return; }
      var touch = e.changedTouches[0];
      ghost.style.display = 'none';
      var el = document.elementFromPoint(touch.clientX, touch.clientY);
      var zone = el ? el.closest('.photo-row') : null;
      var targetId = zone ? zone.getAttribute('data-zid') : null;
      var pid = _touchPhotoId, sid = _touchSrcId;
      _touchPhotoId = null; _touchSrcId = null; _touchActive = false; _lastDropZone = null;
      if (targetId && targetId !== sid) movePhoto(pid, targetId, sid);
    }, { passive: true });
  });
}

// ── Preisberechnung (pro Artikel mit eigenem Modus) ──────────
function calcArticleBase(a) {
  var photos = (a.vk_photos || []).length;
  if (!photos) return 0;
  var base = 1.00 + Math.max(0, photos - 1) * 0.25;
  var days = getArticleDays(a.id);
  base += Math.max(0, days - 3) * 1.00;
  if (a.lp_booked && (a.lp_days || 0) > 0) {
    var lpRate = a.lp_has_bot ? 1.00 : 0.40;
    base += Math.round((a.lp_days || 7) * lpRate * 100) / 100;
  }
  return Math.round(base * 100) / 100;
}
function calcArticlePrice(a) {
  return Math.round(calcArticleBase(a) * getArticleModeMult(a.id) * 100) / 100;
}
function calcSubtotal(articles) {
  var sub = 1.00;
  articles.forEach(function(a) { sub += calcArticlePrice(a); });
  return Math.round(sub * 100) / 100;
}
function calcPrice(articles) { return calcSubtotal(articles); }

function buildPriceRows(articles, total) {
  var sub = calcSubtotal(articles);
  var rows = ['<div class="price-row"><span>Auftragsgebühr</span><span>€1.00</span></div>'];

  articles.forEach(function(a) {
    var photoCount = (a.vk_photos || []).length;
    var aMode = getArticleMode(a.id);
    var aMult = getArticleModeMult(a.id);
    var modeInfo = MODES[aMode];
    var modeLabel = modeInfo ? modeInfo.icon + ' ' + modeInfo.label : '';
    if (photoCount > 0) {
      var aBase = calcArticleBase(a);
      var aTotal = calcArticlePrice(a);
      rows.push('<div class="price-row"><span style="font-weight:600;">' + escHtml(a.title || 'Artikel') +
        ' <span style="font-size:.7rem;color:#9ca3af;">' + modeLabel + ' ×' + aMult + '</span></span>' +
        '<span style="font-weight:700;">€' + aTotal.toFixed(2) + '</span></div>');
      if (aMult > 1) {
        rows.push('<div class="price-row" style="color:#9ca3af;font-size:.78rem;"><span>&nbsp;&nbsp;Basis €' + aBase.toFixed(2) + ' × ' + aMult + '</span><span></span></div>');
      }
    } else {
      rows.push('<div class="price-row" style="color:#9ca3af;"><span>' + escHtml(a.title || 'Artikel') + ' – noch kein Foto</span><span>€0.00</span></div>');
    }
  });

  if (businessDiscount && businessDiscount.has_discount) {
    var bizDisc = Math.round(total * businessDiscount.percent / 100 * 100) / 100;
    rows.push('<div class="price-row" style="color:#059669;"><span>🏢 Firmenrabatt (' + businessDiscount.percent + '%)</span><span>-€' + bizDisc.toFixed(2) + '</span></div>');
    var bizTotal = businessDiscount.percent >= 100 ? 0 : Math.max(0.50, total - bizDisc);
    rows.push('<div class="price-row"><span style="font-weight:700;">Gesamt</span><span class="price-total">€' + bizTotal.toFixed(2) + '</span></div>');
    return rows.join('\n');
  }
  if (couponApplied && couponApplied.discount > 0) {
    rows.push('<div class="price-row" style="color:#059669;"><span>🎟️ Gutschein (' + couponApplied.code + ')</span><span>-€' + couponApplied.discount.toFixed(2) + '</span></div>');
  }
  var finalTotal = couponApplied ? Math.max(0, total - (couponApplied.discount || 0)) : total;
  rows.push('<div class="price-row"><span style="font-weight:700;">Gesamt</span><span class="price-total">€' + finalTotal.toFixed(2) + '</span></div>');
  return rows.join('\n');
}

async function uploadPhotos(articleId, files) {

  if (progressEl) progressEl.innerHTML = '<div class="upload-progress"><div class="progress-bar-wrap"><div class="progress-bar" id="pbar-' + articleId + '" style="width:0%"></div></div><div class="progress-label" id="plabel-' + articleId + '">0 / ' + files.length + ' hochgeladen</div></div>';
  var errors = 0;
  for (var i = 0; i < files.length; i++) {
    try {
      var base64 = await new Promise(function(resolve, reject) { var reader = new FileReader(); reader.onload = function() { resolve(reader.result.split(',')[1]); }; reader.onerror = reject; reader.readAsDataURL(files[i]); });
      var res = await fetch(API + '/api/vk/photo', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ article_id: articleId, session_id: sessionData.id, image_base64: base64, content_type: files[i].type || 'image/jpeg' }) });
      var data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Upload fehlgeschlagen');
    } catch (err) { errors++; }
    var pct = Math.round(((i + 1) / files.length) * 100);
    var pbar = document.getElementById('pbar-' + articleId); var plabel = document.getElementById('plabel-' + articleId);
    if (pbar) pbar.style.width = pct + '%';
    if (plabel) plabel.textContent = (i + 1) + ' / ' + files.length + ' hochgeladen';
  }
  var r2 = await fetch(API + '/api/vk/session/' + sessionToken);
  sessionData = await r2.json(); render();
  if (errors > 0) alert(errors + ' Foto(s) konnten nicht hochgeladen werden.');
}

async function deletePhoto(photoId) {
  if (!confirm('Dieses Foto wirklich löschen?')) return;
  try {
    var res = await fetch(API + '/api/vk/photo/' + photoId, { method: 'DELETE' });
    if (!res.ok) { var d = await res.json(); throw new Error(d.error || 'Löschen fehlgeschlagen'); }
    var r2 = await fetch(API + '/api/vk/session/' + sessionToken);
    sessionData = await r2.json(); render();
  } catch (err) { alert('Fehler beim Löschen: ' + err.message); }
}

async function validateCoupon() {
  var input = document.getElementById('coupon-input'); var msg = document.getElementById('coupon-msg'); var btn = document.getElementById('btn-coupon');
  if (!input || !msg) return;
  var code = input.value.trim().toUpperCase(); if (!code) return;
  btn.disabled = true; btn.textContent = '...'; msg.textContent = '';
  try {
    var res = await fetch(API + '/api/vk/coupon/validate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code: code, token: sessionToken }) });
    var data = await res.json();
    if (!res.ok || !data.coupon) { msg.className = 'coupon-msg coupon-err'; msg.textContent = data.error || 'Ungültiger Code'; btn.disabled = false; btn.textContent = 'Einlösen'; return; }
    couponApplied = { code: code, discount: data.coupon.discount, is_free: data.coupon.is_free };
    msg.className = 'coupon-msg coupon-ok'; msg.textContent = '✓ Gutschein aktiv – Rabatt: €' + data.coupon.discount.toFixed(2);
    btn.disabled = false; btn.textContent = '✓';
    render();
  } catch (err) { msg.className = 'coupon-msg coupon-err'; msg.textContent = 'Fehler: ' + err.message; btn.disabled = false; btn.textContent = 'Einlösen'; }
}

async function startPayment() {
  var btn = document.getElementById('btn-pay');
  if (btn) { btn.disabled = true; btn.textContent = 'Wird vorbereitet...'; }
  try {
    var articleDays = {};
    (sessionData.articles || []).forEach(function(a) { articleDays[a.id] = getArticleDays(a.id); });
    var artModes = {};
    (sessionData.articles || []).forEach(function(a) { artModes[a.id] = getArticleMode(a.id); });
    var body = { token: sessionToken, ai_mode: selectedMode, article_days: articleDays, article_modes: artModes };
    if (couponApplied) body.coupon_code = couponApplied.code;
    var res = await fetch(API + '/api/vk/checkout', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    var data = await res.json();
    if (!res.ok || !data.url) throw new Error(data.error || 'Checkout fehlgeschlagen');
    window.location.href = data.url;
  } catch (err) { alert('Fehler: ' + err.message); if (btn) { btn.disabled = false; btn.textContent = '💳 Jetzt bezahlen'; } }
}

async function redeemBusinessFree() {
  var btn = document.getElementById('btn-pay'); if (btn) { btn.disabled = true; btn.textContent = '⏳ Wird verarbeitet...'; }
  try {
    var artModes2 = {};
    (sessionData.articles || []).forEach(function(a) { artModes2[a.id] = getArticleMode(a.id); });
    var res = await fetch(API + '/api/vk/business-free', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: sessionToken, ai_mode: selectedMode, article_modes: artModes2 }) });
    var data = await res.json(); if (!res.ok) throw new Error(data.error || 'Fehler');
    window.location.href = 'ergebnis.html?s=' + sessionToken;
  } catch (err) { alert('Fehler: ' + err.message); if (btn) { btn.disabled = false; btn.textContent = '🎉 Kostenlos einlösen (Firmenrabatt)'; } }
}

async function redeemFree() {
  var btn = document.getElementById('btn-pay'); if (btn) { btn.disabled = true; btn.textContent = 'Wird eingelöst...'; }
  try {
    var res = await fetch(API + '/api/vk/coupon/redeem', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code: couponApplied.code, token: sessionToken }) });
    var data = await res.json(); if (!res.ok) throw new Error(data.error || 'Einlösen fehlgeschlagen');
    window.location.href = 'ergebnis.html?s=' + sessionToken;
  } catch (err) { alert('Fehler: ' + err.message); if (btn) { btn.disabled = false; btn.textContent = '🎉 Kostenlos einlösen'; } }
}

// ── LP Toggle (nur Abt/Experte) ───────────────────────────────
function buildLPToggle(a) {
  // LP nur wenn Artikel-Modus nicht Sachbearbeiter
  var artMode = getArticleMode(a.id);
  if (artMode === 'sachbearbeiter' && !(businessDiscount && businessDiscount.has_discount)) return '';
  if (!(a.vk_photos || []).length) return '';
  var booked = !!a.lp_booked, days = a.lp_days || 7, hasBot = !!a.lp_has_bot;
  var lpRate = hasBot ? 1.00 : 0.40, lpCost = Math.round(days * lpRate * 100) / 100;
  var toggleRow = '<div class="lp-toggle-row' + (booked ? '' : ' inactive') + '" onclick="toggleLP(\''+a.id+'\', '+booked+')">' +
    '<span class="lp-toggle-label' + (booked ? '' : ' inactive') + '">🌐 Landingpage mitbuchen</span>' +
    '<label class="lp-toggle-switch" onclick="event.stopPropagation()">' +
      '<input type="checkbox"' + (booked ? ' checked' : '') + ' onchange="toggleLP(\''+a.id+'\', !this.checked)">' +
      '<span class="lp-slider"></span>' +
    '</label>' +
  '</div>';
  if (!booked) return toggleRow;
  var details = '<div class="lp-details">' +
    '<div class="lp-row"><div><label class="lp-label-sm">Laufzeit</label>' +
      '<input class="lp-input-sm" type="number" min="1" max="30" value="' + days + '" ' +
        'onchange="saveLPBooking(\''+a.id+'\', {lp_days: parseInt(this.value)||7}); updateLPCost(\''+a.id+'\', parseInt(this.value)||7, '+hasBot+')">' +
      '&nbsp;Tage</div></div>' +
    '<label class="lp-bot-row"><input type="checkbox"' + (hasBot ? ' checked' : '') + ' style="accent-color:#6366f1;" ' +
      'onchange="saveLPBooking(\''+a.id+'\', {lp_has_bot: this.checked}); updateLPCost(\''+a.id+'\', '+days+', this.checked)">' +
      '<span style="font-size:.85rem;font-weight:700;color:#4f46e5;">🤖 Verkaufsbot (+€0.60/Tag)</span></label>' +
    '<div class="lp-cost" id="lp-cost-'+a.id+'">💰 Kosten: €' + lpCost.toFixed(2) + ' (' + days + ' Tage × €' + lpRate.toFixed(2) + '/Tag)</div>' +
  '</div>';
  return toggleRow + details;
}

async function toggleLP(articleId, currentState) {
  await saveLPBooking(articleId, { lp_booked: !currentState });
  var r = await fetch(API + '/api/vk/session/' + sessionToken);
  sessionData = await r.json(); render();
}

async function saveLPBooking(articleId, updates) {
  if (sessionData && sessionData.articles) sessionData.articles.forEach(function(a) { if (a.id === articleId) Object.assign(a, updates); });
  try { await fetch(API + '/api/vk/article/' + articleId + '/notes', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updates) }); } catch(e) {}
}

function updateLPCost(articleId, days, hasBot) {
  var rate = hasBot ? 1.00 : 0.40, cost = Math.round(days * rate * 100) / 100;
  var el = document.getElementById('lp-cost-' + articleId);
  if (el) el.textContent = '💰 Kosten: €' + cost.toFixed(2) + ' (' + days + ' Tage × €' + rate.toFixed(2) + '/Tag)';
  if (sessionData && sessionData.articles) sessionData.articles.forEach(function(a) { if (a.id === articleId) { a.lp_days = days; a.lp_has_bot = hasBot; } });
}

function escHtml(str) { if (!str) return ''; return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(str) { if (!str) return ''; return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function showError(msg) { document.getElementById('app').innerHTML = '<div class="card"><div class="error-box">⚠️ ' + msg + '</div></div>'; }
</script>
