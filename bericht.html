<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Verkaufsreport</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh}
.hdr{background:#2d7a4f;color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px}
.hdr h1{font-size:1.2rem;font-weight:600}
.wrap{max-width:600px;margin:0 auto;padding:20px 16px}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card-title{font-size:.78rem;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}
.hint{background:#f0fdf4;border:1.5px solid #86efac;border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:.82rem;color:#15803d;line-height:1.5}
.hint strong{display:block;margin-bottom:3px}
.art{border:1px solid #e5e7eb;border-radius:10px;padding:16px;margin-bottom:12px}
.art-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.art-num{font-size:.82rem;font-weight:700;color:#9ca3af;flex-shrink:0}
.art-name{flex:1;min-width:120px;font-weight:600;font-size:.95rem;border:1.5px solid transparent;border-radius:6px;padding:4px 8px;font-family:inherit;background:transparent}
.art-name:focus{outline:none;border-color:#2d7a4f;background:#f0fdf4}
.badge{background:#f0fdf4;border:1px solid #86efac;color:#15803d;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:10px;flex-shrink:0}
.ki-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.ki-chip{padding:7px 14px;border-radius:20px;border:1.5px solid #e5e7eb;background:#f9fafb;color:#6b7280;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.ki-s{border-color:#86efac!important;background:#f0fdf4!important;color:#15803d!important}
.ki-a{border-color:#bfdbfe!important;background:#eff6ff!important;color:#1d4ed8!important}
.ki-e{border-color:#e9d5ff!important;background:#faf5ff!important;color:#7c3aed!important}
.photo-row{display:flex;gap:8px;flex-wrap:wrap;min-height:72px;padding:4px;border-radius:10px;margin-bottom:4px}
.photo-row.drag-over{background:#f0fdf4;box-shadow:inset 0 0 0 2.5px #25D366}
.photo-wrap{position:relative;width:72px;height:72px;border-radius:8px;cursor:grab}
.photo-wrap.dragging{opacity:.25}
.photo-thumb{width:72px;height:72px;border-radius:8px;object-fit:cover;border:1px solid #e5e7eb;display:block;pointer-events:none}
.photo-thumb.hidden-lp{opacity:.3;filter:grayscale(1)}
.photo-del{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#ef4444;color:#fff;border:2px solid #fff;font-size:11px;cursor:pointer;font-weight:700;z-index:10;display:flex;align-items:center;justify-content:center}
.photo-add{width:72px;height:72px;border-radius:8px;border:2px dashed #d1d5db;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:#9ca3af;font-size:.7rem;text-align:center;background:#f9fafb}
.photo-add:hover{border-color:#2d7a4f;color:#2d7a4f}
.photo-add span{font-size:1.5rem;line-height:1}
.photo-controls{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.photo-ctrl{width:72px;text-align:center}
.photo-ord-row{display:flex;justify-content:center;align-items:center;gap:2px;margin-bottom:3px}
.ord-btn{padding:1px 5px;font-size:.62rem;border:1px solid #d1d5db;border-radius:3px;cursor:pointer;background:#f9fafb;font-family:inherit;line-height:1.4}
.ord-num{font-size:.68rem;font-weight:700;color:#6b7280;min-width:14px;text-align:center}
.lp-vis-btn{width:100%;font-size:.62rem;padding:2px 3px;border-radius:4px;cursor:pointer;font-family:inherit;font-weight:600}
.lp-vis-on{border:1px solid #86efac;background:#f0fdf4;color:#15803d}
.lp-vis-off{border:1px solid #fca5a5;background:#fef2f2;color:#dc2626}
.notes-ta{width:100%;border:1.5px solid #e5e7eb;border-radius:8px;padding:10px 12px;font-size:.85rem;font-family:inherit;resize:vertical;min-height:68px;margin-bottom:10px}
.notes-ta:focus{outline:none;border-color:#2d7a4f}
.art-foot{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-top:10px}
.art-meta{font-size:.78rem;font-weight:600;color:#9ca3af;margin-bottom:6px}
.day-row{display:flex;gap:5px;flex-wrap:wrap}
.day-btn{padding:6px 10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:.75rem;font-weight:700;cursor:pointer;font-family:inherit;background:#f9fafb;color:#6b7280;text-align:center;line-height:1.3}
.day-btn.on{border-color:#2d7a4f;background:#f0fdf4;color:#15803d}
.day-sub{font-size:.62rem;font-weight:600;display:block;color:#9ca3af}
.day-btn.on .day-sub{color:#059669}
.btn-del{background:none;border:1px solid #fecaca;color:#ef4444;border-radius:6px;padding:5px 12px;font-size:.75rem;cursor:pointer;font-family:inherit}
.art-total{border-top:2px solid #e5e7eb;padding-top:10px;margin-top:10px;display:flex;justify-content:space-between;align-items:center}
.lp-sec{border-top:1px solid #f3f4f6;margin-top:12px;padding-top:12px}
.lp-hd{display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-bottom:8px}
.sw{width:42px;height:24px;border-radius:12px;position:relative;transition:background .2s;flex-shrink:0}
.sw-k{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.lp-days-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.lpd-btn{padding:6px 10px;border-radius:8px;border:1.5px solid #e5e7eb;background:#f9fafb;color:#6b7280;font-size:.75rem;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;line-height:1.3}
.lpd-btn.on{border-color:#25D366;background:#f0fdf4;color:#15803d}
.bot-card{display:flex;align-items:center;justify-content:space-between;background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 12px;cursor:pointer;margin-bottom:10px}
.bot-card.on{background:#faf5ff;border-color:#c4b5fd}
.lp-sum{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:10px 14px}
.lp-sr{display:flex;justify-content:space-between;padding:3px 0;font-size:.78rem}
.lp-sr span:first-child{color:#6b7280;font-weight:600;flex:1}
.lp-sr span:nth-child(2){color:#9ca3af;font-weight:600;text-align:right;width:72px}
.lp-sr span:last-child{color:#15803d;font-weight:700;text-align:right;width:58px}
.lp-div{border-top:1px solid #86efac;margin:4px 0}
.mode-sel{display:flex;gap:8px;margin-bottom:16px}
.mode-btn{flex:1;padding:10px 6px;border:2px solid #e5e7eb;border-radius:10px;background:#f9fafb;cursor:pointer;text-align:center;font-family:inherit;transition:all .2s}
.mode-btn.on{border-color:#2d7a4f;background:#f0fdf4}
.mode-icon{font-size:1.1rem;display:block;margin-bottom:2px}
.mode-name{font-size:.72rem;font-weight:800;color:#374151;display:block}
.mode-btn.on .mode-name{color:#15803d}
.mode-sub{font-size:.65rem;color:#9ca3af;display:block;margin-top:2px}
.mode-btn.on .mode-sub{color:#059669;font-weight:700}
.btn-add{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border:2px dashed #86efac;border-radius:10px;background:#f0fdf4;color:#15803d;font-size:.92rem;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:4px}
.pr-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f3f4f6;font-size:.88rem}
.pr-row:last-child{border:none}
.pr-sub{color:#9ca3af;font-size:.75rem}
.cpn-row{display:flex;gap:8px;margin-top:12px}
.cpn-row input{flex:1;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:.9rem;text-transform:uppercase}
.cpn-row input:focus{outline:none;border-color:#2d7a4f}
.cpn-btn{padding:10px 18px;background:#f3f4f6;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:.85rem;font-family:inherit}
.btn-pay{display:block;width:100%;padding:16px;background:#2d7a4f;color:#fff;border:none;border-radius:10px;font-size:1.05rem;font-weight:700;cursor:pointer;text-align:center;margin-top:16px;font-family:inherit}
.btn-pay:disabled{background:#9ca3af;cursor:not-allowed}
.spinner{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px;color:#6b7280}
.ring{width:40px;height:40px;border:3px solid #e5e7eb;border-top-color:#2d7a4f;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{background:#fee2e2;border-left:4px solid #dc2626;border-radius:8px;padding:16px;color:#991b1b}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:.85rem;font-weight:700;transition:all .3s;opacity:0;z-index:9998;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>
<div class="hdr"><div style="font-size:1.5rem">&#128269;</div><h1>Verkaufsreport</h1></div>
<div class="wrap" id="app"><div class="spinner"><div class="ring"></div><div>Lade deinen Auftrag...</div></div></div>
<div id="toast"></div>
<script>
const API='https://converto-server-production.up.railway.app';
const MODES={
  sachbearbeiter:{icon:'&#128100;',name:'Sachbearbeiter',sub:'Basis &times;1',mult:1},
  abteilungsleiter:{icon:'&#128202;',name:'Abteilungsleiter',sub:'Standard &times;2',mult:2},
  experte:{icon:'&#127919;',name:'Experte',sub:'Premium &times;4',mult:4}
};
let sessionToken=null,sd=null,couponData=null,bizDisc=null;
const notesCache={},daysCache={},artModes={};
let selMode='sachbearbeiter';
let _dragPid=null,_dragSid=null;

/* helpers */
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function escA(s){return s?String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'):''}
function toast(msg){var t=document.getElementById('toast');t.innerHTML=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600)}
function showErr(msg){document.getElementById('app').innerHTML='<div class="card"><div class="err-box">&#9888; '+msg+'</div></div>'}

/* mode */
function getArtMode(id){return artModes[id]||selMode}
function getArtMult(id){return MODES[getArtMode(id)]?.mult||1}
function setArtMode(id,m){
  artModes[id]=m;
  if(m==='sachbearbeiter'&&sd?.articles){
    sd.articles.forEach(a=>{if(a.id===id&&a.lp_booked){a.lp_booked=false;saveLPField(id,{lp_booked:false});}});
  }
  render();
}
function setMode(m){
  selMode=m;
  if(sd?.articles){
    var n=sd.articles.filter(a=>artModes[a.id]&&artModes[a.id]!==m).length;
    if(n>0)toast('&#8505;&#65039; '+n+' Position'+(n>1?'en haben':' hat')+' eigenen Modus');
  }
  render();
}
function getArtDays(id){return daysCache[id]||3}

/* pricing:
   MIT LP:   LP-Kosten x KI-Modus (Analyse inkludiert)
   OHNE LP:  (1€ Foto + 0.25€ je extra + Tage-Extra) x KI-Modus
   Auftragsgebühr: 1€ einmalig für ganzen Auftrag */
function calcArtPrice(a){
  var pics=(a.vk_photos||[]).length;
  if(!pics)return 0;
  var mult=getArtMult(a.id);
  if(a.lp_booked&&(a.lp_days||0)>0){
    var r=a.lp_has_bot?1.00:0.40;
    return Math.round((a.lp_days||7)*r*mult*100)/100;
  }
  var v=1.00+Math.max(0,pics-1)*0.25;
  var d=getArtDays(a.id);
  if(d>3)v+=Math.floor(d/7)*1.00;
  return Math.round(v*mult*100)/100;
}
function calcTotal(arts){
  var t=1.00;
  arts.forEach(a=>t+=calcArtPrice(a));
  return Math.round(t*100)/100;
}
function dispTotal(t){
  if(bizDisc?.has_discount){if(bizDisc.percent>=100)return 0;return Math.max(.50,Math.round((t-t*bizDisc.percent/100)*100)/100);}
  if(couponData)return Math.max(0,Math.round((t-(couponData.discount||0))*100)/100);
  return t;
}

/* init */
(function(){
  sessionToken=new URLSearchParams(location.search).get('s');
  if(!sessionToken){showErr('Kein Auftrag gefunden.');return;}
  loadSession();
})();

async function loadSession(){
  try{
    var r=await fetch(API+'/api/vk/session/'+sessionToken);
    if(!r.ok)throw new Error('Session nicht gefunden');
    sd=await r.json();
    if(new URLSearchParams(location.search).get('paid')==='1'&&sd.status==='open'){showAnalyzing();pollStatus();return;}
    try{var dr=await fetch(API+'/api/vk/session/'+sessionToken+'/discount');var dd=await dr.json();if(dd.has_discount)bizDisc=dd;}catch(e){}
    if(sd.ai_mode&&MODES[sd.ai_mode])selMode=sd.ai_mode;
    render();
  }catch(e){showErr('Fehler: '+e.message);}
}
function showAnalyzing(){
  document.getElementById('app').innerHTML='<div class="card" style="text-align:center;padding:40px;"><div class="ring" style="margin:0 auto 16px;"></div><div style="font-weight:600;color:#2d7a4f;margin-bottom:8px;">&#10003; Zahlung erhalten!</div><div style="color:#6b7280;">Analyse l&auml;uft...</div></div>';
}
async function pollStatus(){
  try{await fetch(API+'/api/vk/check-payment',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:sessionToken})});}catch(e){}
  var attempts=0,iv=setInterval(async()=>{
    attempts++;
    try{var r=await fetch(API+'/api/vk/session/'+sessionToken);var d=await r.json();if(d.status==='analyzing'||d.status==='done'){clearInterval(iv);location.href='ergebnis.html?s='+sessionToken;}}catch(e){}
    if(attempts>=60)clearInterval(iv);
  },5000);
}
function render(){
  if(!sd)return;
  if(sd.status==='done'||sd.status==='analyzing'){location.href='ergebnis.html?s='+sessionToken;return;}
  document.getElementById('app').innerHTML=buildPage();
  attachEvents();setupDrag();
}

/* ── Page Builder ── */
function buildPage(){
  var arts=sd.articles||[];
  var total=calcTotal(arts);
  var html='';
  if(bizDisc?.has_discount)
    html+='<div style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:12px 16px;margin-bottom:12px;font-size:.88rem;color:#15803d;font-weight:700;">&#127970; Firmenrabatt: <strong>'+bizDisc.percent+'%</strong>'+(bizDisc.company?' f&uuml;r '+esc(bizDisc.company):'')+'</div>';
  html+='<div class="card"><div class="card-title">Dein Auftrag</div>';
  html+='<div style="display:flex;justify-content:space-between;font-size:.88rem;padding:4px 0;"><span style="color:#9ca3af">Status</span><span style="background:#fef3c7;color:#92400e;padding:2px 10px;border-radius:10px;font-weight:700;font-size:.8rem;">'+({open:'Offen',paid:'Bezahlt',analyzing:'Analyse',done:'Fertig'}[sd.status]||sd.status)+'</span></div>';
  html+='<div style="display:flex;justify-content:space-between;font-size:.88rem;padding:4px 0;"><span style="color:#9ca3af">Telefon</span><span>+'+(sd.phone||'')+'</span></div>';
  html+='</div>';
  html+='<div class="card"><div class="card-title">Artikel &amp; Fotos</div>';
  var isMass=selMode==='abteilungsleiter'||selMode==='experte';
  if(isMass){
    var tp=arts.reduce((s,a)=>s+(a.vk_photos||[]).length,0);
    html+='<div class="hint"><strong>&#128248; Massen-Upload aktiv</strong>Lade alle Fotos auf einmal hoch.</div>';
    html+='<div style="border:2.5px dashed #86efac;border-radius:12px;background:#f0fdf4;padding:24px;text-align:center;cursor:pointer;margin-bottom:12px;" onclick="trigBulk()" ondragover="event.preventDefault()" ondrop="dropBulk(event)">';
    html+='<div style="font-size:2rem;margin-bottom:6px;">&#128248;</div><div style="font-weight:800;color:#15803d;margin-bottom:4px;">Fotos hier ablegen oder antippen</div>';
    if(tp>0)html+='<div style="font-size:.78rem;font-weight:700;color:#15803d;margin-top:6px;">&#10003; '+tp+' Foto(s) bereit</div>';
    html+='</div>';
    if(tp>0)html+='<button style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border:2px solid #7c3aed;border-radius:10px;background:#faf5ff;color:#7c3aed;font-size:.88rem;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:12px;" onclick="autoGroup()">&#129302; Fotos automatisch gruppieren</button>';
  }else{
    html+='<div class="hint"><strong>&#128248; Tipps f&uuml;r gute Fotos</strong>Vorderseite, R&uuml;ckseite, Details, Typenschild, Seriennummer.</div>';
  }
  if(arts.length>1)html+='<div style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:.78rem;color:#15803d;">&#8596; <strong>Foto verschieben:</strong> Auf anderen Artikel ziehen</div>';
  arts.forEach((a,i)=>{html+=buildArt(a,i);});
  html+='<button class="btn-add" onclick="addPos()"><span style="font-size:1.3rem">+</span> Neue Position</button>';
  html+='</div>';
  html+='<div class="card"><div class="card-title">Standard-Modus f&uuml;r neue Positionen</div>'+buildModeSelector();
  html+='<div class="card-title" style="margin-top:4px">Zusammenfassung</div>'+buildSummary(arts,total);
  if(!(bizDisc?.has_discount))html+='<div id="cpnsec">'+buildCoupon()+'</div>';
  html+=buildPayBtn(total)+'</div>';
  return html;
}

function buildModeSelector(){
  var h='<div class="mode-sel">';
  Object.keys(MODES).forEach(k=>{
    var m=MODES[k],on=selMode===k;
    h+='<button class="mode-btn'+(on?' on':'')+'" onclick="setMode(\''+k+'\')">';
    h+='<span class="mode-icon">'+m.icon+'</span><span class="mode-name">'+m.name+'</span><span class="mode-sub">'+m.sub+'</span></button>';
  });
  return h+'</div>';
}

function buildArt(a,idx){
  var pics=(a.vk_photos||[]).slice().sort((x,y)=>(x.sort_order||0)-(y.sort_order||0));
  var aMode=getArtMode(a.id),aMult=getArtMult(a.id),aPrice=calcArtPrice(a);
  var notes=notesCache[a.id]!==undefined?notesCache[a.id]:(a.notes||'');
  var h='<div class="art" id="art-'+a.id+'">';
  /* header */
  h+='<div class="art-head">';
  h+='<span class="art-num">#'+(idx+1)+'</span>';
  h+='<input class="art-name" value="'+escA(a.title||'Artikel '+(idx+1))+'" onblur="saveTitle(\''+a.id+'\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()">';
  if(pics.length>0)h+='<span class="badge">'+pics.length+' Foto'+(pics.length!==1?'s':'')+'</span>';
  h+='</div>';
  /* KI chips */
  h+='<div class="ki-row">';
  [{k:'sachbearbeiter',cls:'ki-s'},{k:'abteilungsleiter',cls:'ki-a'},{k:'experte',cls:'ki-e'}].forEach(c=>{
    var on=aMode===c.k;
    h+='<button class="ki-chip'+(on?' '+c.cls:'')+'" onclick="setArtMode(\''+a.id+'\',\''+c.k+'\')">'+(on?'&#128100;&#128202;&#127919;'.split('&#').filter(Boolean).map(x=>'&#'+x)[{sachbearbeiter:0,abteilungsleiter:1,experte:2}[c.k]]:'')+MODES[c.k].name+(on?' &#10003;':'')+'</button>';
  });
  h+='</div>';
  /* photos */
  var photoHTML=pics.map(p=>{
    var onLP=p.show_on_lp!==false;
    return '<div class="photo-wrap" draggable="true" data-pid="'+p.id+'" data-sid="'+a.id+'">'
      +'<img class="photo-thumb'+(onLP?'':' hidden-lp')+'" src="'+p.public_url+'" draggable="false">'
      +'<div class="photo-del" onclick="delPhoto(\''+p.id+'\')">&#10005;</div></div>';
  }).join('');
  var addBtn='<div class="photo-add" onclick="trigUpload(\''+a.id+'\')"><span>+</span>'+(pics.length===0?'Fotos':'Mehr')+'</div>';
  h+='<div class="photo-row" id="pr-'+a.id+'" data-zid="'+a.id+'">'+photoHTML+addBtn+'</div>';
  /* photo controls */
  if(pics.length>0){
    h+='<div class="photo-controls">';
    pics.forEach((p,pi)=>{
      var onLP=p.show_on_lp!==false;
      h+='<div class="photo-ctrl">';
      h+='<div class="photo-ord-row">';
      if(pi>0)h+='<button class="ord-btn" onclick="movePhotoOrd(\''+a.id+'\','+pi+','+(pi-1)+')">&#8592;</button>';
      else h+='<span style="width:20px"></span>';
      h+='<span class="ord-num">'+(pi+1)+'</span>';
      if(pi<pics.length-1)h+='<button class="ord-btn" onclick="movePhotoOrd(\''+a.id+'\','+pi+','+(pi+1)+')">&#8594;</button>';
      h+='</div>';
      h+='<button class="lp-vis-btn '+(onLP?'lp-vis-on':'lp-vis-off')+'" onclick="togPhotoLP(\''+p.id+'\','+onLP+')">'+(onLP?'&#128065; LP':'&#128683; LP')+'</button>';
      h+='</div>';
    });
    h+='</div>';
  }
  /* notes */
  h+='<div style="font-size:.75rem;font-weight:600;color:#9ca3af;margin-bottom:4px;">&#8505;&#65039; Zusatzinfos f&uuml;r die KI (optional)</div>';
  h+='<textarea class="notes-ta" id="nt-'+a.id+'" placeholder="z.B. Gr&ouml;&szlig;e M, Baujahr 2019..." onblur="saveNotes(\''+a.id+'\',this.value)" oninput="notesCache[\''+a.id+'\']=this.value">'+esc(notes)+'</textarea>';
  /* footer */
  h+=buildDaySel(a);
  h+=buildLP(a);
  /* article total */
  if(pics.length>0){
    h+='<div class="art-total"><span style="font-size:.82rem;font-weight:700;color:#6b7280;">Artikelposition Gesamt</span><span style="font-size:1.05rem;font-weight:800;color:#1b4332;">&euro;'+aPrice.toFixed(2)+'</span></div>';
  }
  h+='</div>';
  return h;
}

function buildDaySel(a){
  if(a.lp_booked)return '<div style="font-size:.78rem;color:#15803d;font-weight:700;padding:8px 0;">Bericht verf&uuml;gbar: In Landingpage enthalten</div>';
  var cur=getArtDays(a.id);
  var h='<div style="margin-bottom:12px;"><div class="art-meta">Bericht verf&uuml;gbar:</div><div class="day-row">';
  [{d:3,l:'3 Tage',s:'3 Tage inkl.'},{d:7,l:'7 Tage',s:'+&euro;1.00'},{d:14,l:'14 Tage',s:'+&euro;2.00'},{d:21,l:'21 Tage',s:'+&euro;3.00'}].forEach(o=>{
    h+='<button class="day-btn'+(cur===o.d?' on':'')+'" onclick="setDays(\''+a.id+'\','+o.d+')">'+o.l+'<span class="day-sub">'+o.s+'</span></button>';
  });
  h+='</div></div>';
  return h;
}

function buildLP(a){
  var artMode=getArtMode(a.id);
  if(artMode==='sachbearbeiter'&&!(bizDisc?.has_discount))return '';
  if(!(a.vk_photos||[]).length)return '';
  var booked=!!a.lp_booked,days=a.lp_days||7,bot=!!a.lp_has_bot;
  var mult=getArtMult(a.id);
  var lpR=bot?1.00:0.40,lpCost=Math.round(days*lpR*mult*100)/100;
  var h='<div class="lp-sec">';
  h+='<div class="lp-hd" onclick="togLP(\''+a.id+'\','+booked+')">';
  h+='<div style="display:flex;align-items:center;gap:8px;"><span style="font-size:1.1rem;">&#127760;</span><span style="font-size:.88rem;font-weight:700;color:'+(booked?'#15803d':'#374151')+';">Landingpage mitbuchen</span>'+(booked?'<span style="background:#d1fae5;color:#065f46;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:10px;">&euro;'+lpCost.toFixed(2)+'</span>':'')+'</div>';
  h+='<div class="sw" style="background:'+(booked?'#25D366':'#d1d5db')+';" onclick="event.stopPropagation();togLP(\''+a.id+'\','+booked+')"><div class="sw-k" style="left:'+(booked?'20':'2')+'px;"></div></div>';
  h+='</div>';
  if(booked){
    h+='<div style="font-size:.7rem;font-weight:700;color:#9ca3af;margin-bottom:6px;">LAUFZEIT</div>';
    h+='<div class="lp-days-row">';
    [7,14,21,30].forEach(d=>{h+='<button class="lpd-btn'+(days===d?' on':'')+'" onclick="updLP(\''+a.id+'\',{lp_days:'+d+'})">'+(d)+' Tage<span class="day-sub">&euro;'+(d*lpR*mult).toFixed(2)+'</span></button>';});
    h+='</div>';
    h+='<div class="bot-card'+(bot?' on':'')+'" onclick="updLP(\''+a.id+'\',{lp_has_bot:'+!bot+'})">';
    h+='<div style="display:flex;align-items:center;gap:8px;"><span style="font-size:1.1rem;">&#129302;</span><div><div style="font-size:.82rem;font-weight:700;color:'+(bot?'#6d28d9':'#374151')+';">Digitaler Kundenberater</div><div style="font-size:.72rem;color:#9ca3af;">Automatisch Angebote verhandeln</div></div></div>';
    h+='<div style="display:flex;align-items:center;gap:8px;"><span style="font-size:.75rem;font-weight:600;color:'+(bot?'#7c3aed':'#9ca3af')+';">+&euro;0.60/Tag</span>';
    h+='<div class="sw" style="background:'+(bot?'#7c3aed':'#d1d5db')+'"><div class="sw-k" style="left:'+(bot?'20':'2')+'px;"></div></div></div></div>';
    /* LP summary */
    var lpo=Math.round(days*0.40*mult*100)/100,bto=Math.round(days*0.60*mult*100)/100;
    h+='<div class="lp-sum">';
    h+='<div class="lp-sr"><span>Landingpage</span><span>&euro;0.40&thinsp;/Tag</span><span>&euro;'+lpo.toFixed(2)+'</span></div>';
    if(bot)h+='<div class="lp-sr"><span>Digitaler Kundenberater</span><span>&euro;0.60&thinsp;/Tag</span><span>&euro;'+bto.toFixed(2)+'</span></div>';
    h+='<div class="lp-div"></div>';
    var gtot=bot?Math.round((lpo+bto)*100)/100:lpo;
    var grate=bot?(lpR*mult).toFixed(2):(0.40*mult).toFixed(2);
    h+='<div class="lp-sr" style="font-weight:800;"><span style="color:#15803d;">Gesamt</span><span style="color:#15803d;">&euro;'+grate+'&thinsp;/Tag</span><span>&euro;'+gtot.toFixed(2)+'</span></div>';
    h+='<div style="font-size:.7rem;color:#9ca3af;margin-top:4px;">'+days+' Tage Laufzeit</div>';
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function buildSummary(arts,total){
  var h='';
  h+='<div class="pr-row"><span style="font-weight:700;">Auftragsgebühr</span><span style="font-weight:700;">€1.00</span></div>';
  arts.forEach(a=>{
    var ap=calcArtPrice(a),aMult=getArtMult(a.id);
    if(!(a.vk_photos||[]).length)return;
    var modeTag=' <span style="font-size:.68rem;color:#9ca3af;">'+MODES[getArtMode(a.id)].name+' &times;'+aMult+'</span>';
    h+='<div class="pr-row pr-sub"><span>'+esc(a.title||'Artikel')+modeTag+'</span><span style="font-weight:700;">&euro;'+ap.toFixed(2)+'</span></div>';
  });
  if(bizDisc?.has_discount){
    var disc=Math.round(total*bizDisc.percent/100*100)/100;
    h+='<div class="pr-row" style="color:#059669;"><span>&#127970; Firmenrabatt ('+bizDisc.percent+'%)</span><span>-&euro;'+disc.toFixed(2)+'</span></div>';
  }
  if(couponData?.discount>0)h+='<div class="pr-row" style="color:#059669;"><span>&#127967; Gutschein</span><span>-&euro;'+couponData.discount.toFixed(2)+'</span></div>';
  var ft=dispTotal(total);
  h+='<div class="pr-row"><span style="font-weight:700;">Gesamt</span><span style="font-size:1.1rem;font-weight:700;color:#2d7a4f;">&euro;'+ft.toFixed(2)+'</span></div>';
  return h;
}
function buildCoupon(){return '<div class="cpn-row"><input type="text" id="cpn-in" placeholder="Gutschein-Code" maxlength="20"><button class="cpn-btn" onclick="valCoupon()">Einl&ouml;sen</button></div><div id="cpn-msg" style="font-size:.82rem;margin-top:6px;"></div>';}
function buildPayBtn(t){
  if(bizDisc?.percent>=100)return '<button class="btn-pay" style="background:#059669;" onclick="redeemFree()">&#127881; Kostenlos einl&ouml;sen (Firmenrabatt)</button>';
  return '<button class="btn-pay" onclick="startPay()">&euro;'+dispTotal(t).toFixed(2)+' &nbsp;&#128179; Jetzt bezahlen</button>';
}

/* days / LP */
function setDays(id,d){daysCache[id]=d;render();}
function togLP(id,cur){updLP(id,{lp_booked:!cur});}
function updLP(id,upd){
  if(sd?.articles)sd.articles.forEach(a=>{if(a.id===id)Object.assign(a,upd);});
  saveLPField(id,upd);render();
}
async function saveLPField(id,upd){
  try{await fetch(API+'/api/vk/article/'+id+'/notes',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(upd)});}catch(e){}
}

/* photo ordering */
function movePhotoOrd(artId,fi,ti){
  if(!sd?.articles)return;
  sd.articles.forEach(a=>{
    if(a.id!==artId)return;
    var pics=(a.vk_photos||[]).slice().sort((x,y)=>(x.sort_order||0)-(y.sort_order||0));
    if(fi<0||ti<0||fi>=pics.length||ti>=pics.length)return;
    var tmp=pics[fi];pics[fi]=pics[ti];pics[ti]=tmp;
    pics.forEach((p,i)=>{p.sort_order=i;});
    a.vk_photos=pics;
    pics.forEach((p,i)=>fetch(API+'/api/vk/photo/'+p.id+'/order',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({sort_order:i})}).catch(()=>{}));
  });
  render();toast('&#8646; Reihenfolge aktualisiert');
}

/* LP visibility */
function togPhotoLP(pid,cur){
  if(!sd?.articles)return;
  sd.articles.forEach(a=>(a.vk_photos||[]).forEach(p=>{if(p.id===pid)p.show_on_lp=!cur;}));
  fetch(API+'/api/vk/photo/'+pid+'/lp',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({show_on_lp:!cur})}).catch(()=>{});
  render();toast(!cur?'&#128065; Auf LP sichtbar':'&#128683; Nicht auf LP');
}

/* drag between articles */
function setupDrag(){
  document.querySelectorAll('.photo-wrap').forEach(w=>{
    w.addEventListener('dragstart',e=>{_dragPid=w.dataset.pid;_dragSid=w.dataset.sid;e.dataTransfer.effectAllowed='move';setTimeout(()=>w.classList.add('dragging'),0);});
    w.addEventListener('dragend',()=>{w.classList.remove('dragging');document.querySelectorAll('.photo-row').forEach(z=>z.classList.remove('drag-over'));_dragPid=null;_dragSid=null;});
  });
  document.querySelectorAll('.photo-row').forEach(z=>{
    z.addEventListener('dragover',e=>{if(!_dragPid)return;e.preventDefault();z.classList.add('drag-over');});
    z.addEventListener('dragleave',e=>{if(e.relatedTarget&&z.contains(e.relatedTarget))return;z.classList.remove('drag-over');});
    z.addEventListener('drop',e=>{
      e.preventDefault();z.classList.remove('drag-over');
      var tid=z.dataset.zid;
      if(!_dragPid||!tid||tid===_dragSid)return;
      movePhoto(_dragPid,tid,_dragSid);
    });
  });
}

async function movePhoto(pid,tid,sid){
  toast('&#8987; Wird verschoben...');
  try{
    var r=await fetch(API+'/api/vk/photo/'+pid+'/move',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({article_id:tid})});
    if(!r.ok)throw new Error();
    var r2=await fetch(API+'/api/vk/session/'+sessionToken);sd=await r2.json();render();toast('&#10003; Foto verschoben');
  }catch(e){toast('&#10007; Fehler');}
}

/* uploads */
function trigUpload(id){
  var inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.multiple=true;
  inp.onchange=async()=>{if(inp.files)await uploadPhotos(id,Array.from(inp.files));};inp.click();
}
function trigBulk(){
  var inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.multiple=true;
  inp.onchange=async()=>{if(inp.files)await handleBulk(Array.from(inp.files));};inp.click();
}
function dropBulk(e){
  e.preventDefault();
  var files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));
  if(files.length)handleBulk(files);
}
async function handleBulk(files){
  var arts=sd.articles||[];
  if(!arts.length){
    await fetch(API+'/api/vk/article',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:sessionToken,title:'Artikel 1'})});
    var r=await fetch(API+'/api/vk/session/'+sessionToken);sd=await r.json();arts=sd.articles||[];
  }
  await uploadPhotos(arts[0].id,files);
}
async function uploadPhotos(artId,files){
  toast('&#8987; '+files.length+' Fotos werden hochgeladen...');
  for(var i=0;i<files.length;i++){
    try{
      var b64=await new Promise((res,rej)=>{var rd=new FileReader();rd.onload=()=>res(rd.result.split(',')[1]);rd.onerror=rej;rd.readAsDataURL(files[i]);});
      await fetch(API+'/api/vk/photo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({article_id:artId,session_id:sd.id,image_base64:b64,content_type:files[i].type||'image/jpeg'})});
    }catch(e){}
  }
  var r=await fetch(API+'/api/vk/session/'+sessionToken);sd=await r.json();render();
  toast('&#10003; '+files.length+' Fotos hochgeladen!');
}
async function autoGroup(){
  toast('&#8987; KI gruppiert...');
  try{
    var r=await fetch(API+'/api/vk/auto-group',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:sessionToken,ai_mode:selMode})});
    if(r.ok){var d=await r.json();toast('&#10003; '+(d.groups||0)+' Artikel erkannt!');var r2=await fetch(API+'/api/vk/session/'+sessionToken);sd=await r2.json();render();}
    else toast('Auto-Gruppierung folgt');
  }catch(e){toast('Auto-Gruppierung folgt');}
}

/* article actions */
async function addPos(){
  try{
    var r=await fetch(API+'/api/vk/article',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:sessionToken,title:'Neuer Artikel'})});
    var d=await r.json();var r2=await fetch(API+'/api/vk/session/'+sessionToken);sd=await r2.json();render();
    setTimeout(()=>{var el=document.getElementById('art-'+d.article?.id);if(el)el.scrollIntoView({behavior:'smooth',block:'center'});},100);
  }catch(e){alert('Fehler: '+e.message);}
}
async function saveTitle(id,title){
  if(!title.trim())return;
  if(sd?.articles)sd.articles.forEach(a=>{if(a.id===id)a.title=title.trim();});
  try{await fetch(API+'/api/vk/article/'+id+'/notes',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:title.trim()})});}catch(e){}
}
function saveNotes(id,notes){
  notesCache[id]=notes;
  fetch(API+'/api/vk/article/'+id+'/notes',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({notes})}).catch(()=>{});
}
async function delPhoto(pid){
  if(!confirm('Foto löschen?'))return;
  try{var r=await fetch(API+'/api/vk/photo/'+pid,{method:'DELETE'});if(!r.ok)throw new Error();var r2=await fetch(API+'/api/vk/session/'+sessionToken);sd=await r2.json();render();}
  catch(e){alert('Fehler: '+e.message);}
}
async function delArt(id){
  if(!confirm('Position löschen?'))return;
  try{var r=await fetch(API+'/api/vk/article/'+id,{method:'DELETE'});if(!r.ok)throw new Error();var r2=await fetch(API+'/api/vk/session/'+sessionToken);sd=await r2.json();render();}
  catch(e){alert('Fehler: '+e.message);}
}

/* coupon */
function attachEvents(){
  var inp=document.getElementById('cpn-in');
  if(inp){inp.addEventListener('input',()=>inp.value=inp.value.toUpperCase());inp.addEventListener('keydown',e=>{if(e.key==='Enter')valCoupon();});}
}
async function valCoupon(){
  var inp=document.getElementById('cpn-in'),msg=document.getElementById('cpn-msg');
  if(!inp||!msg)return;var code=inp.value.trim().toUpperCase();if(!code)return;
  try{
    var r=await fetch(API+'/api/vk/coupon/validate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code,token:sessionToken})});
    var d=await r.json();
    if(!r.ok||!d.coupon){msg.style.color='#991b1b';msg.textContent=d.error||'Ungültiger Code';return;}
    couponData={code,discount:d.coupon.discount};msg.style.color='#065f46';msg.textContent='✓ Rabatt: €'+d.coupon.discount.toFixed(2);render();
  }catch(e){msg.style.color='#991b1b';msg.textContent='Fehler: '+e.message;}
}

/* payment */
async function startPay(){
  try{
    var artDays={},artModeMap={};
    (sd.articles||[]).forEach(a=>{artDays[a.id]=getArtDays(a.id);artModeMap[a.id]=getArtMode(a.id);});
    var body={token:sessionToken,ai_mode:selMode,article_days:artDays,article_modes:artModeMap};
    if(couponData)body.coupon_code=couponData.code;
    var r=await fetch(API+'/api/vk/checkout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    var d=await r.json();if(!r.ok||!d.url)throw new Error(d.error||'Fehler');
    location.href=d.url;
  }catch(e){alert('Fehler: '+e.message);}
}
async function redeemFree(){
  try{
    var artModeMap={};(sd.articles||[]).forEach(a=>{artModeMap[a.id]=getArtMode(a.id);});
    var r=await fetch(API+'/api/vk/business-free',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:sessionToken,ai_mode:selMode,article_modes:artModeMap})});
    var d=await r.json();if(!r.ok)throw new Error(d.error||'Fehler');
    location.href='ergebnis.html?s='+sessionToken;
  }catch(e){alert('Fehler: '+e.message);}
}
</script>
</body>
